name: 'Check OpenWRT Versions'
description: 'Fetch and determine supported OpenWRT versions from endoflife.date'

inputs:
  min-eol-date:
    description: 'Minimum end-of-life date to consider a version supported (YYYY-MM-DD format)'
    required: false
    default: '2025-08-04'
  force-check:
    description: 'Force check for new versions even if local cache exists'
    required: false
    default: 'false'
  output-dir:
    description: 'Directory to store version information'
    required: false
    default: 'external_profiles'

outputs:
  latest-version:
    description: 'Latest supported OpenWRT version'
    value: ${{ steps.check.outputs.latest_version }}
  all-supported-versions:
    description: 'All supported OpenWRT versions as JSON array'
    value: ${{ steps.check.outputs.supported_versions }}
  needs-update:
    description: 'Whether existing profiles need to be updated to a newer version'
    value: ${{ steps.check.outputs.needs_update }}

runs:
  using: 'composite'
  steps:
    - name: Check for supported OpenWRT versions
      id: check
      shell: bash
      run: |
        WORKSPACE_DIR="${GITHUB_WORKSPACE}"
        OUTPUT_DIR="${WORKSPACE_DIR}/${{ inputs.output-dir }}"
        MIN_EOL_DATE="${{ inputs.min-eol-date }}"
        FORCE_CHECK="${{ inputs.force-check }}"
        
        mkdir -p "$OUTPUT_DIR"
        
        # File to store version information
        VERSIONS_FILE="${OUTPUT_DIR}/openwrt_versions.json"
        
        # Check if we need to download or can use cache
        DOWNLOAD_VERSIONS=true
        if [ -f "$VERSIONS_FILE" ] && [ "$FORCE_CHECK" != "true" ]; then
          FILE_AGE=$(( $(date +%s) - $(stat -c %Y "$VERSIONS_FILE" 2>/dev/null || stat -f %m "$VERSIONS_FILE") ))
          # Use cached version if less than 24 hours old
          if [ "$FILE_AGE" -lt 86400 ]; then
            echo "✅ Using cached OpenWRT version information (less than 24h old)"
            DOWNLOAD_VERSIONS=false
          fi
        fi
        
        # Download version information if needed
        if [ "$DOWNLOAD_VERSIONS" = "true" ]; then
          echo "🔍 Checking for OpenWRT versions from endoflife.date API..."
          
          API_URL="https://endoflife.date/api/openwrt.json"
          curl -s "$API_URL" -o "$VERSIONS_FILE"
          
          if [ ! -s "$VERSIONS_FILE" ]; then
            echo "❌ Failed to fetch OpenWRT version information"
            exit 1
          fi
          
          echo "✅ Downloaded latest OpenWRT version information"
        fi
        
        # Find all supported versions (not EOL or EOL after min date)
        echo "🔍 Finding supported OpenWRT versions (EOL >= $MIN_EOL_DATE)..."
        
        # Create a JSON array of supported versions
        SUPPORTED_VERSIONS=$(jq -c '[.[] | select(.eol == false or .eol >= "'$MIN_EOL_DATE'") | .latest] | sort_by(.)' "$VERSIONS_FILE")
        
        # Get the latest supported version
        LATEST_VERSION=$(echo "$SUPPORTED_VERSIONS" | jq -r '.[-1]')
        
        # Pretty print supported versions for logging
        echo "📊 Supported versions: $(echo "$SUPPORTED_VERSIONS" | jq -r '. | join(", ")')"
        echo "📊 Latest supported version: $LATEST_VERSION"
        
        # Check if we need to update existing profiles
        NEEDS_UPDATE=false
        VERSIONS_IN_DIR=$(find "$OUTPUT_DIR" -mindepth 1 -maxdepth 1 -type d | grep -v "^\." | xargs -n1 basename 2>/dev/null | sort -V)
        
        if [ -n "$VERSIONS_IN_DIR" ]; then
          CURRENT_VERSION=$(echo "$VERSIONS_IN_DIR" | sort -V | tail -n1)
          echo "📊 Current latest version in directory: $CURRENT_VERSION"
          
          if [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            echo "🔄 New version available: $LATEST_VERSION > $CURRENT_VERSION"
            NEEDS_UPDATE=true
          else
            echo "✅ Current version is up to date"
          fi
        else
          echo "⚠️ No existing version directories found"
          NEEDS_UPDATE=true
        fi
        
        # Store all versions in a file for reference
        echo "$SUPPORTED_VERSIONS" > "${OUTPUT_DIR}/supported_versions.json"
        
        # Set outputs
        echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
        echo "supported_versions=$SUPPORTED_VERSIONS" >> $GITHUB_OUTPUT
        echo "needs_update=$NEEDS_UPDATE" >> $GITHUB_OUTPUT