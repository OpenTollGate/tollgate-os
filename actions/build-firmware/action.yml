name: 'Build OpenWRT Image'
description: 'Builds an OpenWRT firmware image with TollGate packages'
author: 'c03rad0r'

branding:
  color: orange
  icon: box

inputs:
  model:
    description: 'The device model to build for'
    required: true
  version:
    description: 'OpenWRT version'
    default: '23.05.5'
    required: false
  nostr_secret_key:
    description: 'Nostr secret key'
    required: true
  nostr_public_key:
    description: 'Nostr public key'
    required: true
  nostr_relays:
    description: 'Comma-separated list of Nostr relays'
    default: 'wss://relay.damus.io,wss://nos.lol,wss://nostr.mom'
  base_packages:
    description: 'Additional base packages to include'
    default: ''
  files_path:
    description: 'Path to custom files directory'
    default: 'tollgate-image-builder/files'
    required: false
  nsecbech:
    description: 'Nostr secret key (bech32) for Blossom upload'
    required: true
  nsec:
    description: 'Nostr secret key for metadata signing'
    required: true

outputs:
  firmware_path:
    description: 'Path to the built firmware file'
    value: ${{ steps.find-firmware.outputs.firmware_path }}
  firmware_name:
    description: 'Name of the built firmware file'
    value: ${{ steps.find-firmware.outputs.firmware_name }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install System Dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          gawk \
          build-essential \
          curl \
          zstd \
          libssl-dev \
          jq
        python -m pip install --upgrade pip
        pip install nostr

    - name: Set Build Variables
      id: vars
      shell: bash
      run: |
        # Create build directory first
        mkdir -p /tmp/openwrt-build
        
        # Dynamic router profile discovery
        echo "🔍 Searching for profile: ${{ inputs.model }}"
        MODEL_FOUND=0
        VERSION="${{ inputs.version }}"
        
        # Debug: Show all available profiles.json files first
        echo "📋 Available profiles.json files:"
        find "${GITHUB_WORKSPACE}/external_profiles" -type f -name "profiles.json" | sort
        
        # Search for the model in all profiles.json files
        for PROFILE_PATH in $(find "${GITHUB_WORKSPACE}/external_profiles" -type f -name "profiles.json"); do
          # Skip empty files or invalid JSON
          if [ ! -s "$PROFILE_PATH" ] || ! jq empty "$PROFILE_PATH" 2>/dev/null; then
            echo "⚠️ Skipping invalid or empty profile: $PROFILE_PATH"
            continue
          fi
          
          # Check if this file contains our model
          if jq -e --arg model "${{ inputs.model }}" '.profiles[$model]' "$PROFILE_PATH" > /dev/null 2>&1; then
            MODEL_FOUND=1
            echo "✅ Found profile in: $PROFILE_PATH"
            
            # Extract platform and type from path (e.g., external_profiles/23.05.5/ramips/mt7621/profiles.json)
            REL_PATH=${PROFILE_PATH#${GITHUB_WORKSPACE}/external_profiles/}
            
            # Safely extract path components
            PATH_PARTS=()
            IFS='/' read -ra PATH_PARTS <<< "$REL_PATH"
            
            # Make sure we have enough parts
            if [ ${#PATH_PARTS[@]} -ge 3 ]; then
              VERSION=${PATH_PARTS[0]}
              PLATFORM=${PATH_PARTS[1]}
              TYPE=${PATH_PARTS[2]}
              
              echo "📌 Version: $VERSION"
              echo "📌 Platform: $PLATFORM"
              echo "📌 Type: $TYPE"
              
              # Use jq to properly extract all information from profiles.json
              MODEL="${{ inputs.model }}"
              
              # Extract architecture and packages - with better error handling
              ARCH=$(jq -r '.arch_packages // "unknown"' "$PROFILE_PATH")
              DEFAULT_PKGS=$(jq -r '.default_packages // [] | join(" ")' "$PROFILE_PATH")
              DEVICE_PKGS=$(jq -r --arg p "$MODEL" '.profiles[$p].device_packages // [] | join(" ")' "$PROFILE_PATH")
              
              # Extract device information
              DEVICE_IMAGE_PREFIX=$(jq -r --arg p "$MODEL" '.profiles[$p].image_prefix // "unknown"' "$PROFILE_PATH")
              DEVICE_SUPPORTED=$(jq -r --arg p "$MODEL" '.profiles[$p].supported_devices // [] | join(", ")' "$PROFILE_PATH")
              DEVICE_VENDOR=$(jq -r --arg p "$MODEL" '.profiles[$p].titles[0].vendor // "unknown"' "$PROFILE_PATH")
              DEVICE_MODEL=$(jq -r --arg p "$MODEL" '.profiles[$p].titles[0].model // "unknown"' "$PROFILE_PATH")
              
              echo "📌 Architecture: $ARCH"
              echo "📌 Device packages: $DEVICE_PKGS"
              echo "📌 Device model: $DEVICE_MODEL"
              echo "📌 Device vendor: $DEVICE_VENDOR"
              
              # Print all extracted variables in a formatted table for clarity
              echo "=================================================="
              echo "📋 EXTRACTED BUILD VARIABLES FOR $MODEL"
              echo "=================================================="
              echo "PLATFORM:          $PLATFORM"
              echo "TYPE:              $TYPE"
              echo "PROFILE:           $MODEL"
              echo "ARCH:              $ARCH"
              echo "--------------------------------------------------"
              echo "DEVICE INFO:"
              echo "VENDOR:            $DEVICE_VENDOR"
              echo "MODEL:             $DEVICE_MODEL"
              echo "IMAGE PREFIX:      $DEVICE_IMAGE_PREFIX"
              echo "SUPPORTED DEVICES: $DEVICE_SUPPORTED"
              echo "--------------------------------------------------"
              echo "PACKAGES:"
              echo "DEFAULT PACKAGES:  $DEFAULT_PKGS"
              echo "DEVICE PACKAGES:   $DEVICE_PKGS"
              echo "=================================================="
              
              # Set environment variables for build
              echo "PLATFORM=$PLATFORM" >> $GITHUB_ENV
              echo "TYPE=$TYPE" >> $GITHUB_ENV
              echo "TARGET_DEVICE=$PLATFORM-$TYPE" >> $GITHUB_ENV
              echo "PROFILE=$MODEL" >> $GITHUB_ENV
              echo "ARCH=$ARCH" >> $GITHUB_ENV
              
              # Standard package configuration
              WIFI_REMOVE="-wpad -wpad-basic -wpad-basic-wolfssl -wpad-mini -wpad-basic-mbedtls -wpad-mesh-openssl -wpad-mesh-wolfssl"
              DHCP_REMOVE="-odhcpd -odhcpd-ipv6only"
              TOLLGATE_REMOVED="$WIFI_REMOVE $DHCP_REMOVE"
              echo "🔄 Removing packages: $TOLLGATE_REMOVED"
              
              WIFI_ADD="wpad-wolfssl"
              TOLLGATE_ADDED="luci luci-ssl iwinfo $WIFI_ADD"
              echo "➕ Adding packages: $TOLLGATE_ADDED"
              
              # Compose final package list: TollGate → Device → Base → user extras
              PACKAGES="$TOLLGATE_REMOVED $TOLLGATE_ADDED $DEVICE_PKGS $DEFAULT_PKGS ${{ inputs.base_packages }}"
              echo "PACKAGES=$PACKAGES" >> $GITHUB_ENV
              echo "REMOVED_PACKAGES=$TOLLGATE_REMOVED" >> $GITHUB_ENV
              
              break
            else
              echo "⚠️ Unexpected profiles.json path format: $PROFILE_PATH"
            fi
          fi
        done
        
        if [ $MODEL_FOUND -eq 0 ]; then
          echo "❌ ERROR: Could not find router profile for '${{ inputs.model }}'"
          echo "❌ Available profiles:"
          for PROFILE_PATH in $(find "${GITHUB_WORKSPACE}/external_profiles" -name "profiles.json"); do
            if [ -s "$PROFILE_PATH" ]; then
              echo "  - $PROFILE_PATH:"
              jq -r '.profiles | keys[]' "$PROFILE_PATH" 2>/dev/null | sed 's/^/    - /' || echo "    (Invalid JSON or no profiles)"
            fi
          done
          echo "❌ Please ensure the profile exists in one of the external_profiles files"
          echo "❌ If needed, run the download_profiles.sh script to update profiles"
          exit 1
        fi
        
        echo "BUILDDIR=/tmp/openwrt-build" >> $GITHUB_ENV

    - name: Setup Build Directory
      shell: bash
      run: |
        mkdir -p $BUILDDIR
        
        if [ "${{ inputs.version }}" = "snapshot" ]; then
          IMAGEBUILDER_NAME="openwrt-imagebuilder-${PLATFORM}-${TYPE}.Linux-x86_64"
          DOWNLOAD_URL="https://downloads.openwrt.org/snapshots/targets/${PLATFORM}/${TYPE}/${IMAGEBUILDER_NAME}.tar.zst"
          echo "ARCHIVE_EXT=tar.zst" >> $GITHUB_ENV
        elif [ "${PLATFORM}" = "ath79" ] && [ "${TYPE}" = "nand" ]; then
          IMAGEBUILDER_NAME="openwrt-imagebuilder-${{ inputs.version }}-ath79-nand.Linux-x86_64"
          DOWNLOAD_URL="https://downloads.openwrt.org/releases/${{ inputs.version }}/targets/${PLATFORM}/${TYPE}/${IMAGEBUILDER_NAME}.tar.xz"
          echo "ARCHIVE_EXT=tar.xz" >> $GITHUB_ENV
        else
          IMAGEBUILDER_NAME="openwrt-imagebuilder-${{ inputs.version }}-${TARGET_DEVICE}.Linux-x86_64"
          DOWNLOAD_URL="https://downloads.openwrt.org/releases/${{ inputs.version }}/targets/${PLATFORM}/${TYPE}/${IMAGEBUILDER_NAME}.tar.xz"
          echo "ARCHIVE_EXT=tar.xz" >> $GITHUB_ENV
        fi
        
        echo "IMAGEBUILDER_NAME=${IMAGEBUILDER_NAME}" >> $GITHUB_ENV
        echo "DOWNLOAD_URL=${DOWNLOAD_URL}" >> $GITHUB_ENV

    - name: Download and Extract ImageBuilder
      shell: bash
      run: |
        cd $BUILDDIR
        if curl --output /dev/null --silent --head --fail "$DOWNLOAD_URL"; then
          curl -L -C - -O "$DOWNLOAD_URL"
          if [ "${{ inputs.version }}" = "snapshot" ]; then
            tar --zstd -xf "${IMAGEBUILDER_NAME}.${ARCHIVE_EXT}"
          else
            tar xfJ "${IMAGEBUILDER_NAME}.${ARCHIVE_EXT}"
          fi
        else
          echo "Error: URL $DOWNLOAD_URL does not exist"
          exit 1
        fi
        
        echo "BUILDDIR=$BUILDDIR/${IMAGEBUILDER_NAME}" >> $GITHUB_ENV

    - name: Setup Custom Files and Packages
      shell: bash
      env:
        NOSTR_SECRET_KEY: ${{ inputs.nostr_secret_key }}
        NOSTR_PUBLIC_KEY: ${{ inputs.nostr_public_key }}
        NOSTR_RELAYS: ${{ inputs.nostr_relays }}
      run: |
        mkdir -p $BUILDDIR/files
        if [ -d "${{ inputs.files_path }}" ]; then
          cp -r ${{ inputs.files_path }}/* $BUILDDIR/files/
        fi
        PACKAGES_DIR="${BUILDDIR}/packages/local"
        mkdir -p "${PACKAGES_DIR}"
        
        # Add U-Boot config for supported devices
        # MediaTek Filogic devices typically need U-Boot env config
        if [[ "$PLATFORM" == "mediatek" && "$TYPE" == "filogic" ]]; then
          echo "Creating U-Boot environment config for MediaTek Filogic device"
          mkdir -p $BUILDDIR/files/etc
          echo "/dev/mtd1 0x0 0x1000 0x10000" > $BUILDDIR/files/etc/fw_env.config
        fi

    - name: Download TollGate Packages
      shell: bash
      run: |
        # Create packages directory if it doesn't exist
        PACKAGES_DIR="${BUILDDIR}/packages/local"
        mkdir -p "${PACKAGES_DIR}"
        
        # Note: We're using a two-step build process to work around a package conflict.
        # The tollgate-module-basic-go package and base-files package both try to install /etc/banner
        # A better long-term solution would be to modify the tollgate-module-basic-go package
        # to not overwrite the banner file or use a different file name.
        echo "⚠️ Note: Using two-step build to work around package file conflicts (/etc/banner)"
        
        # Parse release.json and download all packages for this architecture
        echo "🔍 Looking for packages for architecture: ${ARCH}"
        DOWNLOADED_PACKAGES=""
        
        # Check if release.json exists
        if [ -f "${GITHUB_WORKSPACE}/files/etc/tollgate/release.json" ]; then
          for MODULE_NAME in $(jq -r '.modules[].name' ${GITHUB_WORKSPACE}/files/etc/tollgate/release.json); do
            echo "📦 Processing module: ${MODULE_NAME}"
            
            # Extract URL for this module and architecture
            PACKAGE_URL=$(jq -r --arg module "$MODULE_NAME" --arg arch "$ARCH" \
              '.modules[] | select(.name == $module) | .versions[0].architectures[$arch].url' \
              ${GITHUB_WORKSPACE}/files/etc/tollgate/release.json)
              
            # Skip placeholder URLs
            if [[ "$PACKAGE_URL" == *"[HASH]"* || "$PACKAGE_URL" == "null" || -z "$PACKAGE_URL" ]]; then
              echo "⚠️ No package available for ${MODULE_NAME} (${ARCH})"
              continue
            fi
            
            # Download the package with retry logic
            PACKAGE_FILENAME="tollgate-module-${MODULE_NAME}-go_${ARCH}.ipk"
            echo "⬇️ Downloading ${MODULE_NAME} from ${PACKAGE_URL}"
            
            # Try up to 3 times with increasing timeouts
            for ATTEMPT in {1..3}; do
              echo "Download attempt $ATTEMPT for ${MODULE_NAME}"
              if curl -L -f --connect-timeout 30 --max-time 120 -o "${PACKAGES_DIR}/${PACKAGE_FILENAME}" "${PACKAGE_URL}"; then
                echo "✅ Successfully downloaded ${PACKAGE_FILENAME}"
                DOWNLOADED_PACKAGES="${DOWNLOADED_PACKAGES} tollgate-module-${MODULE_NAME}-go"
                break
              else
                echo "⚠️ Attempt $ATTEMPT failed for ${PACKAGE_FILENAME}"
                if [ $ATTEMPT -eq 3 ]; then
                  echo "❌ Failed to download ${PACKAGE_FILENAME} after 3 attempts"
                fi
                sleep 5
              fi
            done
          done
          
          # Generate package index
          echo "📑 Generating package index"
          touch "${PACKAGES_DIR}/Packages"
          
          # Use mkhash helper function for package index generation
          sudo bash -c 'mkhash() { if [ "$1" = "sha256" ]; then sha256sum "$2" | cut -d" " -f1; else sha256sum "$1" | cut -d" " -f1; fi; }; \
          export -f mkhash; \
          export MKHASH=mkhash; \
          cd "'"${BUILDDIR}"'" && \
          if [ -x "./scripts/ipkg-make-index.sh" ]; then \
            ./scripts/ipkg-make-index.sh packages/local > packages/local/Packages; \
          else \
            echo "WARNING: ipkg-make-index.sh not found, creating minimal Packages file"; \
            for PKG in packages/local/*.ipk; do \
              [ -f "$PKG" ] || continue; \
              FILENAME=$(basename "$PKG"); \
              echo "Package: $(echo $FILENAME | sed -e '"'"'s/_.*//'\')" >> packages/local/Packages; \
              echo "Filename: $FILENAME" >> packages/local/Packages; \
              echo "" >> packages/local/Packages; \
            done; \
          fi && \
          gzip -9c packages/local/Packages > packages/local/Packages.gz'
          
          # Add the downloaded packages to build environment
          if [ -n "${DOWNLOADED_PACKAGES}" ]; then
            echo "🔧 Adding TollGate packages to build: ${DOWNLOADED_PACKAGES}"
            echo "TOLLGATE_PACKAGES=${DOWNLOADED_PACKAGES}" >> $GITHUB_ENV
          else
            echo "⚠️ No TollGate packages were downloaded successfully"
            echo "TOLLGATE_PACKAGES=" >> $GITHUB_ENV
          fi
        else
          echo "⚠️ release.json not found, skipping TollGate package download"
          echo "TOLLGATE_PACKAGES=" >> $GITHUB_ENV
          touch "${PACKAGES_DIR}/Packages"
          gzip -9c "${PACKAGES_DIR}/Packages" > "${PACKAGES_DIR}/Packages.gz"
        fi

    - name: Build base firmware
      shell: bash
      run: |
        set -euo pipefail
        cd "$BUILDDIR"
        echo "🔨 Building base firmware for $PROFILE"
        echo "📦 Using packages: $PACKAGES"
        
        # First build: just the base packages without TollGate modules
        FORCE=1 make image \
          PROFILE="$PROFILE" \
          PACKAGES="$PACKAGES" \
          FILES="files" \
          EXTRA_IMAGE_NAME="base"
        
        # Check if base build was successful
        if ! find "$BUILDDIR/bin/targets/${PLATFORM}/${TYPE}" -name "*base-sysupgrade.bin" | grep -q .; then
          echo "❌ Base firmware build failed"
          exit 1
        else
          echo "✅ Base firmware built successfully"
        fi
        
    - name: Build firmware with TollGate modules
      shell: bash
      id: build-tollgate
      run: |
        set -euo pipefail
        cd "$BUILDDIR"
        
        # If we have TollGate packages to add
        if [ -n "${TOLLGATE_PACKAGES:-}" ]; then
          echo "🔨 Building firmware with TollGate modules"
          echo "📦 Adding packages: ${TOLLGATE_PACKAGES}"
          
          # Clean the build directory to prepare for second build
          make clean
          
          # Second build: add TollGate packages
          FORCE=1 make image \
            PROFILE="$PROFILE" \
            PACKAGES="$PACKAGES ${TOLLGATE_PACKAGES}" \
            FILES="files" \
            EXTRA_IMAGE_NAME="tollgate-os"
          
          # Check if TollGate build was successful
          if find "$BUILDDIR/bin/targets/${PLATFORM}/${TYPE}" -name "*tollgate-os-sysupgrade.bin" | grep -q .; then
            echo "✅ TollGate firmware built successfully"
            echo "BUILD_TYPE=TOLLGATE" >> $GITHUB_ENV
          else
            echo "❌ ERROR: TollGate firmware build failed! No firmware with TollGate modules was produced."
            echo "This is likely due to package conflicts. Check build logs for details."
            exit 1
          fi
        else
          echo "⚠️ No TollGate packages were specified or downloaded."
          echo "BUILD_TYPE=BASE" >> $GITHUB_ENV
        fi

    - name: Find firmware
      id: find-firmware
      shell: bash
      run: |
        set -euo pipefail
        
        # Find the firmware based on build type
        if [ "${BUILD_TYPE}" = "TOLLGATE" ]; then
          # Look specifically for the TollGate firmware
          F=$(find "$BUILDDIR/bin/targets/${PLATFORM}/${TYPE}" -name "*tollgate-os-sysupgrade.bin" | head -1)
          
          if [ -f "$F" ]; then
            echo "✅ Found TollGate firmware: $(basename "$F")"
          else
            echo "❌ ERROR: TollGate firmware was supposedly built but can't be found"
            exit 1
          fi
        else
          # Only for the case when no TollGate packages were available
          F=$(find "$BUILDDIR/bin/targets/${PLATFORM}/${TYPE}" -name "*base-sysupgrade.bin" | head -1)
          
          if [ -f "$F" ]; then
            echo "ℹ️ Using base firmware (no TollGate packages were available): $(basename "$F")"
          else
            echo "❌ ERROR: Base firmware can't be found"
            exit 1
          fi
        fi
        
        # Calculate hash for metadata
        FIRMWARE_HASH=$(sha256sum "$F" | cut -d' ' -f1)
        echo "FIRMWARE_HASH=${FIRMWARE_HASH}" >> $GITHUB_ENV
        echo "FIRMWARE_SIZE=$(stat -c%s "$F")" >> $GITHUB_ENV
        
        echo "firmware_path=$F" >> $GITHUB_OUTPUT
        echo "firmware_name=$(basename "$F")" >> $GITHUB_OUTPUT

    - name: Upload firmware to Blossom
      id: upload
      uses: c03rad0r/cli-blossom-uploader-go@main
      with:
        host:            'https://blossom.swissdash.site'
        filePath:        ${{ steps.find-firmware.outputs.firmware_path }}
        nostrPrivateKey: ${{ inputs.nsecbech }}

    - name: Publish NIP‑94 metadata
      id: publish
      uses: OpenTollGate/nostr-publish-file-metadata-action/python@main
      with:
        relays:       ${{ inputs.nostr_relays }}
        url:          ${{ steps.upload.outputs.url }}
        mimeType:     'application/octet-stream'
        fileHash:     ${{ steps.upload.outputs.hash }}
        originalHash: ${{ env.FIRMWARE_HASH }}
        filename:     ${{ steps.find-firmware.outputs.firmware_name }}
        content:      "TollGate OS for ${{ inputs.model }} (OpenWRT ${{ inputs.version }})"
        nsec:         ${{ inputs.nsec }}
        size:         ${{ env.FIRMWARE_SIZE }}
        architecture: ${{ env.ARCH }}
        model:        ${{ inputs.model }}
        version:      ${{ inputs.version }}

    - name: Verify publication
      uses: OpenTollGate/nostr-publish-file-metadata-action/python/verify@main
      with:
        eventId: ${{ steps.publish.outputs.eventId }}
        relays:   ${{ inputs.nostr_relays }}
