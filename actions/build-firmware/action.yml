name: 'Build TollGate OpenWrt Image'
description: >
  Builds an OpenWRT firmware image with TollGate packages.
  This action follows the standard OpenWrt build process:
  1. Identifies the target device profile
  2. Downloads the appropriate OpenWrt ImageBuilder
  3. Adds TollGate packages
  4. Creates a flashable firmware image with all required kernel modules included
author: 'c03rad0r'

branding:
  color: orange
  icon: box

inputs:
  model:
    description: 'The device model to build for'
    required: true
  version:
    description: 'OpenWRT version'
    default: '23.05.5'
    required: false
  nostr_secret_key:
    description: 'Nostr secret key'
    required: true
  nostr_public_key:
    description: 'Nostr public key'
    required: true
  nostr_relays:
    description: 'Comma-separated list of Nostr relays'
    default: 'wss://relay.damus.io,wss://nos.lol,wss://nostr.mom'
  base_packages:
    description: 'Additional base packages to include'
    default: ''
  files_path:
    description: 'Path to custom files directory'
    default: 'tollgate-image-builder/files'
    required: false
  nsecbech:
    description: 'Nostr secret key (bech32) for Blossom upload'
    required: true
  nsec:
    description: 'Nostr secret key for metadata signing'
    required: true
  firmware_type:
    description: 'Type of firmware to build (sysupgrade, factory, kernel, all)'
    default: 'sysupgrade'
    required: false

outputs:
  firmware_path:
    description: 'Path to the built firmware file'
    value: ${{ steps.find-firmware.outputs.firmware_path }}
  firmware_name:
    description: 'Name of the built firmware file'
    value: ${{ steps.find-firmware.outputs.firmware_name }}
  all_firmware_paths:
    description: 'JSON string containing paths to all built firmware files'
    value: ${{ steps.find-firmware.outputs.all_firmware_paths }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install System Dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y gawk build-essential curl zstd libssl-dev jq
        python -m pip install --upgrade pip
        pip install nostr

    - name: Find Router Profile
      id: profile
      shell: bash
      run: |
        # Create build directory
        export BUILDDIR="/tmp/openwrt-build"
        mkdir -p "$BUILDDIR"
        echo "BUILDDIR=$BUILDDIR" >> $GITHUB_ENV

        MODEL="${{ inputs.model }}"
        VERSION="${{ inputs.version }}"
        MODEL_FOUND=0
        
        echo "🔍 Searching for profile: $MODEL"
        
        # Find profile for the model
        for PROFILE_PATH in $(find "${GITHUB_WORKSPACE}/external_profiles" -type f -name "profiles.json" | sort); do
          # Skip invalid profiles
          if [ ! -s "$PROFILE_PATH" ] || ! jq empty "$PROFILE_PATH" 2>/dev/null; then
            continue
          fi
          
          # Check if this file contains our model
          if jq -e --arg model "$MODEL" '.profiles | has($model)' "$PROFILE_PATH" > /dev/null 2>&1; then
            MODEL_FOUND=1
            echo "✅ Found profile in: $PROFILE_PATH"
            
            # Extract path components: external_profiles/VERSION/PLATFORM/TYPE/profiles.json
            REL_PATH=${PROFILE_PATH#${GITHUB_WORKSPACE}/external_profiles/}
            PATH_PARTS=()
            IFS='/' read -ra PATH_PARTS <<< "$REL_PATH"
            
            if [ ${#PATH_PARTS[@]} -ge 3 ]; then
              VERSION=${PATH_PARTS[0]}
              PLATFORM=${PATH_PARTS[1]}
              TYPE=${PATH_PARTS[2]}
              
              echo "📌 Version: $VERSION, Platform: $PLATFORM, Type: $TYPE"
              
              # Extract all required build information
              ARCH=$(jq -r '.arch_packages // "unknown"' "$PROFILE_PATH")
              DEFAULT_PKGS=$(jq -r '.default_packages // [] | join(" ")' "$PROFILE_PATH")
              DEVICE_PKGS=$(jq -r --arg p "$MODEL" '.profiles[$p].device_packages // [] | join(" ")' "$PROFILE_PATH")
              
              # Device information for metadata
              DEVICE_IMAGE_PREFIX=$(jq -r --arg p "$MODEL" '.profiles[$p].image_prefix // "unknown"' "$PROFILE_PATH")
              DEVICE_SUPPORTED=$(jq -r --arg p "$MODEL" '.profiles[$p].supported_devices // [] | join(", ")' "$PROFILE_PATH")
              DEVICE_VENDOR=$(jq -r --arg p "$MODEL" '.profiles[$p].titles[0].vendor // "unknown"' "$PROFILE_PATH")
              DEVICE_MODEL=$(jq -r --arg p "$MODEL" '.profiles[$p].titles[0].model // "unknown"' "$PROFILE_PATH")
              
              # Extract available image types
              AVAILABLE_TYPES=$(jq -r --arg p "$MODEL" '.profiles[$p].images | map(.type) | unique | join(",")' "$PROFILE_PATH")
              echo "AVAILABLE_IMAGE_TYPES=${AVAILABLE_TYPES}" >> $GITHUB_ENV
              echo "📌 Available image types: $AVAILABLE_TYPES"
              
              echo "📌 Architecture: $ARCH"
              echo "📌 Device: $DEVICE_VENDOR $DEVICE_MODEL"
              echo "📌 Supported devices: $DEVICE_SUPPORTED"
              
              # Set environment variables
              echo "PLATFORM=$PLATFORM" >> $GITHUB_ENV
              echo "TYPE=$TYPE" >> $GITHUB_ENV
              echo "TARGET_DEVICE=$PLATFORM-$TYPE" >> $GITHUB_ENV
              echo "PROFILE=$MODEL" >> $GITHUB_ENV
              echo "ARCH=$ARCH" >> $GITHUB_ENV
              echo "DEVICE_VENDOR=$DEVICE_VENDOR" >> $GITHUB_ENV
              echo "DEVICE_MODEL=$DEVICE_MODEL" >> $GITHUB_ENV
              
              # Configure packages
              WIFI_REMOVE="-wpad -wpad-basic -wpad-basic-wolfssl -wpad-mini -wpad-basic-mbedtls -wpad-mesh-openssl -wpad-mesh-wolfssl"
              DHCP_REMOVE="-odhcpd -odhcpd-ipv6only"
              WIFI_ADD="wpad-wolfssl"
              TOLLGATE_ADDED="luci luci-ssl iwinfo $WIFI_ADD"
              
              # Final package list
              PACKAGES="$WIFI_REMOVE $DHCP_REMOVE $TOLLGATE_ADDED $DEVICE_PKGS $DEFAULT_PKGS ${{ inputs.base_packages }}"
              echo "PACKAGES=$PACKAGES" >> $GITHUB_ENV
              
              break
            fi
          fi
        done
        
        # If direct key lookup failed, handle specific cases like glinet_gl-ar300m-nand
        if [ $MODEL_FOUND -eq 0 ]; then
          echo "⚠️ Direct profile match not found, checking special cases..."
          
          # Check specifically for ath79/nand if requested model includes 'nand'
          if [[ "$MODEL" == *"nand"* ]]; then
            TARGET_PATH="${GITHUB_WORKSPACE}/external_profiles/${{ inputs.version }}/ath79/nand/profiles.json"
            
            if [ -f "$TARGET_PATH" ]; then
              echo "🔍 Checking specifically: $TARGET_PATH"
              
              if jq -e --arg model "$MODEL" '.profiles | has($model)' "$TARGET_PATH" > /dev/null 2>&1; then
                echo "✅ Found profile for $MODEL in ath79/nand path"
                MODEL_FOUND=1
                
                VERSION="${{ inputs.version }}"
                PLATFORM="ath79"
                TYPE="nand"
                
                echo "📌 Version: $VERSION, Platform: $PLATFORM, Type: $TYPE"
                
                # Extract all required build information
                ARCH=$(jq -r '.arch_packages // "unknown"' "$TARGET_PATH")
                DEFAULT_PKGS=$(jq -r '.default_packages // [] | join(" ")' "$TARGET_PATH")
                DEVICE_PKGS=$(jq -r --arg p "$MODEL" '.profiles[$p].device_packages // [] | join(" ")' "$TARGET_PATH")
                
                # Device information for metadata
                DEVICE_IMAGE_PREFIX=$(jq -r --arg p "$MODEL" '.profiles[$p].image_prefix // "unknown"' "$TARGET_PATH")
                DEVICE_SUPPORTED=$(jq -r --arg p "$MODEL" '.profiles[$p].supported_devices // [] | join(", ")' "$TARGET_PATH")
                DEVICE_VENDOR=$(jq -r --arg p "$MODEL" '.profiles[$p].titles[0].vendor // "unknown"' "$TARGET_PATH")
                DEVICE_MODEL=$(jq -r --arg p "$MODEL" '.profiles[$p].titles[0].model // "unknown"' "$TARGET_PATH")
                
                # Extract available image types
                AVAILABLE_TYPES=$(jq -r --arg p "$MODEL" '.profiles[$p].images | map(.type) | unique | join(",")' "$TARGET_PATH")
                echo "AVAILABLE_IMAGE_TYPES=${AVAILABLE_TYPES}" >> $GITHUB_ENV
                echo "📌 Available image types: $AVAILABLE_TYPES"
                
                echo "📌 Architecture: $ARCH"
                echo "📌 Device: $DEVICE_VENDOR $DEVICE_MODEL"
                echo "📌 Supported devices: $DEVICE_SUPPORTED"
                
                # Set environment variables
                echo "PLATFORM=$PLATFORM" >> $GITHUB_ENV
                echo "TYPE=$TYPE" >> $GITHUB_ENV
                echo "TARGET_DEVICE=$PLATFORM-$TYPE" >> $GITHUB_ENV
                echo "PROFILE=$MODEL" >> $GITHUB_ENV
                echo "ARCH=$ARCH" >> $GITHUB_ENV
                echo "DEVICE_VENDOR=$DEVICE_VENDOR" >> $GITHUB_ENV
                echo "DEVICE_MODEL=$DEVICE_MODEL" >> $GITHUB_ENV
                
                # Configure packages
                WIFI_REMOVE="-wpad -wpad-basic -wpad-basic-wolfssl -wpad-mini -wpad-basic-mbedtls -wpad-mesh-openssl -wpad-mesh-wolfssl"
                DHCP_REMOVE="-odhcpd -odhcpd-ipv6only"
                WIFI_ADD="wpad-wolfssl"
                TOLLGATE_ADDED="luci luci-ssl iwinfo $WIFI_ADD"
                
                # Final package list
                PACKAGES="$WIFI_REMOVE $DHCP_REMOVE $TOLLGATE_ADDED $DEVICE_PKGS $DEFAULT_PKGS ${{ inputs.base_packages }}"
                echo "PACKAGES=$PACKAGES" >> $GITHUB_ENV
              else
                echo "⚠️ Profile $MODEL not found in $TARGET_PATH"
              fi
            else
              echo "⚠️ Special path not found: $TARGET_PATH"
            fi
          fi
        fi
        
        if [ $MODEL_FOUND -eq 0 ]; then
          echo "❌ ERROR: Could not find router profile for '$MODEL'"
          echo "❌ Available models by platform/type:"
          for PROFILE_PATH in $(find "${GITHUB_WORKSPACE}/external_profiles" -name "profiles.json"); do
            if [ -s "$PROFILE_PATH" ]; then
              REL_PATH=${PROFILE_PATH#${GITHUB_WORKSPACE}/external_profiles/}
              PATH_PARTS=()
              IFS='/' read -ra PATH_PARTS <<< "$REL_PATH"
              
              if [ ${#PATH_PARTS[@]} -ge 3 ]; then
                PROFILE_PATH_INFO="${PATH_PARTS[1]}/${PATH_PARTS[2]}"
                echo "  - $PROFILE_PATH_INFO:"
                jq -r '.profiles | keys[]' "$PROFILE_PATH" 2>/dev/null | head -10 | sed 's/^/    - /' || echo "    (Invalid JSON)"
                TOTAL_MODELS=$(jq -r '.profiles | keys | length' "$PROFILE_PATH" 2>/dev/null || echo 0)
                if [ "$TOTAL_MODELS" -gt 10 ]; then
                  REMAINING=$((TOTAL_MODELS - 10))
                  echo "      ... and $REMAINING more"
                fi
              fi
            fi
          done
          exit 1
        fi

    - name: Setup ImageBuilder
      shell: bash
      run: |
        # Set up base variables for OpenWrt downloads
        VERSION="${{ inputs.version }}"
        BASE_URL="https://downloads.openwrt.org"
        
        # Determine build path and archive type based on version and target
        if [ "$VERSION" = "snapshot" ]; then
          RELEASE_PATH="snapshots"
          DEFAULT_ARCHIVE_EXT="tar.zst"
        else
          RELEASE_PATH="releases/$VERSION"
          DEFAULT_ARCHIVE_EXT="tar.xz"
        fi
        
        # Build the target directory URL
        TARGET_URL="${BASE_URL}/${RELEASE_PATH}/targets/${PLATFORM}/${TYPE}"
        
        echo "🔍 Looking for ImageBuilder in: ${TARGET_URL}"
        
        # Get directory listing to find the ImageBuilder
        LISTING=$(curl -s "${TARGET_URL}/")
        
        # Extract the ImageBuilder filename from the listing
        IB_ARCHIVE=$(echo "$LISTING" | grep -o "openwrt-imagebuilder[^\"]*\.tar\.${DEFAULT_ARCHIVE_EXT##*.}" | head -1)
        
        if [ -n "$IB_ARCHIVE" ]; then
          echo "✅ Found ImageBuilder archive: $IB_ARCHIVE"
          DOWNLOAD_URL="${TARGET_URL}/${IB_ARCHIVE}"
          IB_NAME="${IB_ARCHIVE%.*.*}" # Remove the .tar.xz or .tar.zst extension
        else
          echo "⚠️ Could not find ImageBuilder in directory listing, trying default naming"
          
          # Construct standard name based on version/platform
          if [ "$VERSION" = "snapshot" ]; then
            IB_NAME="openwrt-imagebuilder-${PLATFORM}-${TYPE}.Linux-x86_64"
          else
            IB_NAME="openwrt-imagebuilder-${VERSION}-${PLATFORM}-${TYPE}.Linux-x86_64"
          fi
          
          DOWNLOAD_URL="${TARGET_URL}/${IB_NAME}.${DEFAULT_ARCHIVE_EXT}"
        fi
        
        echo "IMAGEBUILDER_NAME=${IB_NAME}" >> $GITHUB_ENV
        
        # Download and extract ImageBuilder
        cd $BUILDDIR
        echo "⬇️ Downloading ImageBuilder from $DOWNLOAD_URL"
        
        # Check if the URL exists
        if curl --output /dev/null --silent --head --fail "$DOWNLOAD_URL"; then
          curl -L -C - -O "$DOWNLOAD_URL"
          
          # Extract the archive based on its type
          ARCHIVE_FILE=$(basename "$DOWNLOAD_URL")
          echo "📦 Extracting ${ARCHIVE_FILE}..."
          
          if [[ "$ARCHIVE_FILE" == *.tar.zst ]]; then
            tar --zstd -xf "$ARCHIVE_FILE"
          elif [[ "$ARCHIVE_FILE" == *.tar.xz ]]; then
            tar xfJ "$ARCHIVE_FILE"
          else
            echo "❌ Unknown archive format: $ARCHIVE_FILE"
            exit 1
          fi
          
          echo "✅ ImageBuilder extracted successfully"
          echo "BUILDDIR=$BUILDDIR/${IB_NAME}" >> $GITHUB_ENV
        else
          echo "❌ Error: ImageBuilder not found at $DOWNLOAD_URL"
          exit 1
        fi

    - name: Setup Build Environment
      shell: bash
      env:
        NOSTR_SECRET_KEY: ${{ inputs.nostr_secret_key }}
        NOSTR_PUBLIC_KEY: ${{ inputs.nostr_public_key }}
        NOSTR_RELAYS: ${{ inputs.nostr_relays }}
      run: |
        # Setup files directory
        mkdir -p $BUILDDIR/files
        if [ -d "${{ inputs.files_path }}" ]; then
          cp -r ${{ inputs.files_path }}/* $BUILDDIR/files/
        fi
        
        # Setup packages directory
        PACKAGES_DIR="${BUILDDIR}/packages/local"
        mkdir -p "${PACKAGES_DIR}"
        
        # Add U-Boot config for supported devices (MediaTek Filogic)
        if [[ "$PLATFORM" == "mediatek" && "$TYPE" == "filogic" ]]; then
          echo "Creating U-Boot environment config for MediaTek Filogic device"
          mkdir -p $BUILDDIR/files/etc
          echo "/dev/mtd1 0x0 0x1000 0x10000" > $BUILDDIR/files/etc/fw_env.config
        fi
        
        # Determine which firmware types to build based on input and available types
        REQ_FIRMWARE_TYPE="${{ inputs.firmware_type }}"
        AVAILABLE_TYPES="${AVAILABLE_IMAGE_TYPES}"
        
        # Default to sysupgrade if requested type is not available or not specified
        if [[ "$REQ_FIRMWARE_TYPE" == "all" ]]; then
          echo "BUILD_TYPES=${AVAILABLE_TYPES}" >> $GITHUB_ENV
          echo "🔨 Will build all available image types: ${AVAILABLE_TYPES}"
        elif [[ "$AVAILABLE_TYPES" == *"$REQ_FIRMWARE_TYPE"* ]]; then
          echo "BUILD_TYPES=${REQ_FIRMWARE_TYPE}" >> $GITHUB_ENV
          echo "🔨 Will build requested image type: ${REQ_FIRMWARE_TYPE}"
        else
          echo "⚠️ Requested firmware type '${REQ_FIRMWARE_TYPE}' not available for this device"
          # Default to sysupgrade, or factory if sysupgrade not available
          if [[ "$AVAILABLE_TYPES" == *"sysupgrade"* ]]; then
            echo "BUILD_TYPES=sysupgrade" >> $GITHUB_ENV
            echo "🔨 Defaulting to 'sysupgrade' image type"
          elif [[ "$AVAILABLE_TYPES" == *"factory"* ]]; then
            echo "BUILD_TYPES=factory" >> $GITHUB_ENV
            echo "🔨 Defaulting to 'factory' image type"
          else
            echo "BUILD_TYPES=${AVAILABLE_TYPES%%,*}" >> $GITHUB_ENV
            echo "🔨 Defaulting to first available type: ${AVAILABLE_TYPES%%,*}"
          fi
        fi

    - name: Download TollGate Packages
      id: packages
      shell: bash
      run: |
        # Setup local packages directory
        PACKAGES_DIR="${BUILDDIR}/packages/local"
        mkdir -p "${PACKAGES_DIR}"
        DOWNLOADED_PACKAGES=""
        
        # Check if release.json exists
        if [ -f "${GITHUB_WORKSPACE}/files/etc/tollgate/release.json" ]; then
          echo "📦 Processing TollGate modules from release.json"
          echo "🔍 Looking for packages for architecture: ${ARCH}"
          
          # Process each module in the release.json file
          module_count=$(jq '.modules | length' "${GITHUB_WORKSPACE}/files/etc/tollgate/release.json")
          for ((i=0; i<$module_count; i++)); do
            # Extract module information
            MODULE_NAME=$(jq -r ".modules[$i].name" "${GITHUB_WORKSPACE}/files/etc/tollgate/release.json")
            echo "📦 Processing module: ${MODULE_NAME}"
            
            # Try to extract URL for this architecture
            PACKAGE_URL=$(jq -r --arg arch "$ARCH" ".modules[$i].versions[0].architectures[\$arch].url // \"\"" \
              "${GITHUB_WORKSPACE}/files/etc/tollgate/release.json")
            
            # Skip packages without valid URLs
            if [ -z "$PACKAGE_URL" ] || [ "$PACKAGE_URL" = "null" ] || [[ "$PACKAGE_URL" == *"[HASH]"* ]]; then
              echo "⚠️ No package available for ${MODULE_NAME} (${ARCH})"
              continue
            fi
            
            # Determine package filename - try to extract from URL or use standard format
            if [[ "$PACKAGE_URL" =~ /([^/]+\.ipk)$ ]]; then
              # Extract filename from URL
              PACKAGE_FILENAME="${BASH_REMATCH[1]}"
              echo "📄 Using filename from URL: ${PACKAGE_FILENAME}"
            else
              # Use standard naming convention
              PACKAGE_FILENAME="tollgate-module-${MODULE_NAME}-go_${ARCH}.ipk"
              echo "📄 Using standard filename: ${PACKAGE_FILENAME}"
            fi
            
            # Download the package
            echo "⬇️ Downloading ${MODULE_NAME} from ${PACKAGE_URL}"
            
            if curl -L -f --connect-timeout 30 --max-time 120 -o "${PACKAGES_DIR}/${PACKAGE_FILENAME}" "${PACKAGE_URL}"; then
              echo "✅ Successfully downloaded ${PACKAGE_FILENAME}"
              
              # Extract package name without version and architecture
              PKG_BASE_NAME="tollgate-module-${MODULE_NAME}-go"
              DOWNLOADED_PACKAGES="${DOWNLOADED_PACKAGES} ${PKG_BASE_NAME}"
            else
              echo "❌ Failed to download ${PACKAGE_FILENAME}"
            fi
          done
          
          # Create package index if packages were downloaded
          if [ -n "${DOWNLOADED_PACKAGES}" ]; then
            echo "📦 Adding TollGate packages to build: ${DOWNLOADED_PACKAGES}"
            echo "TOLLGATE_PACKAGES=${DOWNLOADED_PACKAGES}" >> $GITHUB_ENV
            
            echo "📑 Creating package index"
            # Generate proper package index using opkg-make-index if available
            if command -v opkg-make-index >/dev/null 2>&1; then
              echo "📑 Using opkg-make-index for package indexing"
              opkg-make-index -p "${PACKAGES_DIR}/Packages" "${PACKAGES_DIR}"
            else
              echo "📑 Creating basic package index"
              touch "${PACKAGES_DIR}/Packages"
              # Create a minimal package index with just enough information
              for PKG in "${PACKAGES_DIR}"/*.ipk; do
                if [ -f "$PKG" ]; then
                  FILENAME=$(basename "$PKG")
                  # Extract package name (everything before first underscore)
                  PKG_NAME=$(echo "$FILENAME" | sed 's/_.*//g')
                  echo "Package: $PKG_NAME" >> "${PACKAGES_DIR}/Packages"
                  echo "Filename: $FILENAME" >> "${PACKAGES_DIR}/Packages"
                  echo "" >> "${PACKAGES_DIR}/Packages"
                fi
              done
            fi
            
            # Compress the package index
            gzip -9c "${PACKAGES_DIR}/Packages" > "${PACKAGES_DIR}/Packages.gz"
          else
            echo "⚠️ No TollGate packages were downloaded successfully"
            echo "TOLLGATE_PACKAGES=" >> $GITHUB_ENV
          fi
        else
          echo "⚠️ release.json not found at ${GITHUB_WORKSPACE}/files/etc/tollgate/release.json"
          echo "TOLLGATE_PACKAGES=" >> $GITHUB_ENV
        fi
        
        # Create empty package index if needed
        if [ ! -f "${PACKAGES_DIR}/Packages" ]; then
          touch "${PACKAGES_DIR}/Packages"
          gzip -9c "${PACKAGES_DIR}/Packages" > "${PACKAGES_DIR}/Packages.gz"
        fi

    - name: Build Firmware
      id: build
      shell: bash
      run: |
        cd "$BUILDDIR"
        
        # Display device and build information
        echo "🔨 Building firmware for ${DEVICE_VENDOR} ${DEVICE_MODEL} (${PROFILE})"
        echo "📦 Architecture: ${ARCH}, Platform: ${PLATFORM}/${TYPE}"
        
        # Determine which image types to build
        IFS=',' read -ra TYPES_TO_BUILD <<< "${BUILD_TYPES}"
        echo "🔨 Building image types: ${TYPES_TO_BUILD[*]}"
        
        # Step 1: Build base firmware (without TollGate packages)
        echo "🔨 Building base firmware"
        
        # For each type, build the firmware
        for TYPE_TO_BUILD in "${TYPES_TO_BUILD[@]}"; do
          echo "🔨 Building base firmware with type: ${TYPE_TO_BUILD}"
          
          # Additional flags based on type
          ADDITIONAL_FLAGS=""
          if [ "$TYPE_TO_BUILD" = "kernel" ]; then
            ADDITIONAL_FLAGS="CONFIG_TARGET_KERNEL_PARTSIZE=64 CONFIG_TARGET_ROOTFS_PARTSIZE=256"
          elif [ "$TYPE_TO_BUILD" = "factory" ]; then
            ADDITIONAL_FLAGS="CONFIG_TARGET_ROOTFS_PARTSIZE=256"
          fi
          
          # Build command
          FORCE=1 make image \
            PROFILE="$PROFILE" \
            PACKAGES="$PACKAGES" \
            FILES="files" \
            EXTRA_IMAGE_NAME="base-${TYPE_TO_BUILD}" \
            $ADDITIONAL_FLAGS
        done
        
        # Check if base builds succeeded
        BASE_BUILD_SUCCESS=0
        for TYPE_TO_BUILD in "${TYPES_TO_BUILD[@]}"; do
          # Pattern depends on type
          if [ "$TYPE_TO_BUILD" = "kernel" ]; then
            PATTERN="*base-${TYPE_TO_BUILD}*kernel.bin"
          else
            PATTERN="*base-${TYPE_TO_BUILD}*${TYPE_TO_BUILD}.bin"
            # Special case for factory images that may be .img
            if [ "$TYPE_TO_BUILD" = "factory" ]; then
              if ! find "$BUILDDIR/bin/targets/${PLATFORM}/${TYPE}" -name "$PATTERN" | grep -q .; then
                PATTERN="*base-${TYPE_TO_BUILD}*${TYPE_TO_BUILD}.img"
              fi
            fi
          fi
          
          if find "$BUILDDIR/bin/targets/${PLATFORM}/${TYPE}" -name "$PATTERN" | grep -q .; then
            echo "✅ Base ${TYPE_TO_BUILD} firmware built successfully"
            BASE_BUILD_SUCCESS=1
          else
            echo "⚠️ Base ${TYPE_TO_BUILD} firmware build not found with pattern: $PATTERN"
          fi
        done
        
        if [ $BASE_BUILD_SUCCESS -eq 0 ]; then
          echo "❌ All base firmware builds failed"
          exit 1
        fi
        
        # Step 2: Build firmware with TollGate modules if available
        if [ -n "${TOLLGATE_PACKAGES:-}" ]; then
          echo "🔨 Building TollGate firmware with modules: ${TOLLGATE_PACKAGES}"
          
          make clean
          
          # For each type, build the TollGate firmware
          for TYPE_TO_BUILD in "${TYPES_TO_BUILD[@]}"; do
            echo "🔨 Building TollGate firmware with type: ${TYPE_TO_BUILD}"
            
            # Additional flags based on type
            ADDITIONAL_FLAGS=""
            if [ "$TYPE_TO_BUILD" = "kernel" ]; then
              ADDITIONAL_FLAGS="CONFIG_TARGET_KERNEL_PARTSIZE=64 CONFIG_TARGET_ROOTFS_PARTSIZE=256"
            elif [ "$TYPE_TO_BUILD" = "factory" ]; then
              ADDITIONAL_FLAGS="CONFIG_TARGET_ROOTFS_PARTSIZE=256"
            fi
            
            # Build command
            FORCE=1 make image \
              PROFILE="$PROFILE" \
              PACKAGES="$PACKAGES ${TOLLGATE_PACKAGES}" \
              FILES="files" \
              EXTRA_IMAGE_NAME="tollgate-os-${TYPE_TO_BUILD}" \
              $ADDITIONAL_FLAGS
          done
          
          # Check if TollGate builds succeeded
          TOLLGATE_BUILD_SUCCESS=0
          for TYPE_TO_BUILD in "${TYPES_TO_BUILD[@]}"; do
            # Pattern depends on type
            if [ "$TYPE_TO_BUILD" = "kernel" ]; then
              PATTERN="*tollgate-os-${TYPE_TO_BUILD}*kernel.bin"
            else
              PATTERN="*tollgate-os-${TYPE_TO_BUILD}*${TYPE_TO_BUILD}.bin"
              # Special case for factory images that may be .img
              if [ "$TYPE_TO_BUILD" = "factory" ]; then
                if ! find "$BUILDDIR/bin/targets/${PLATFORM}/${TYPE}" -name "$PATTERN" | grep -q .; then
                  PATTERN="*tollgate-os-${TYPE_TO_BUILD}*${TYPE_TO_BUILD}.img"
                fi
              fi
            fi
            
            if find "$BUILDDIR/bin/targets/${PLATFORM}/${TYPE}" -name "$PATTERN" | grep -q .; then
              echo "✅ TollGate ${TYPE_TO_BUILD} firmware built successfully"
              TOLLGATE_BUILD_SUCCESS=1
            else
              echo "⚠️ TollGate ${TYPE_TO_BUILD} firmware build not found with pattern: $PATTERN"
            fi
          done
          
          if [ $TOLLGATE_BUILD_SUCCESS -eq 1 ]; then
            echo "BUILD_TYPE=TOLLGATE" >> $GITHUB_ENV
          else
            echo "⚠️ All TollGate firmware builds failed, using base firmware"
            echo "BUILD_TYPE=BASE" >> $GITHUB_ENV
          fi
        else
          echo "ℹ️ No TollGate packages to add, using base firmware"
          echo "BUILD_TYPE=BASE" >> $GITHUB_ENV
        fi

    - name: Find Firmware
      id: find-firmware
      shell: bash
      run: |
        # Create JSON object to store all firmware paths
        echo "{" > /tmp/firmware_paths.json
        FIRST_ENTRY=1
        
        # Find the appropriate firmware files for each requested type
        IFS=',' read -ra TYPES_TO_BUILD <<< "${BUILD_TYPES}"
        
        # Primary firmware (first in the list) for main output
        PRIMARY_FIRMWARE=""
        PRIMARY_FIRMWARE_NAME=""
        
        for TYPE_TO_BUILD in "${TYPES_TO_BUILD[@]}"; do
          echo "🔍 Looking for ${TYPE_TO_BUILD} firmware..."
          
          # Pattern depends on build type and image type
          if [ "${BUILD_TYPE}" = "TOLLGATE" ]; then
            PREFIX="tollgate-os"
          else
            PREFIX="base"
          fi
          
          if [ "$TYPE_TO_BUILD" = "kernel" ]; then
            PATTERN="*${PREFIX}-${TYPE_TO_BUILD}*kernel.bin"
          else
            PATTERN="*${PREFIX}-${TYPE_TO_BUILD}*${TYPE_TO_BUILD}.bin"
            # Special case for factory images that may be .img
            if [ "$TYPE_TO_BUILD" = "factory" ] && ! find "$BUILDDIR/bin/targets/${PLATFORM}/${TYPE}" -name "$PATTERN" | grep -q .; then
              PATTERN="*${PREFIX}-${TYPE_TO_BUILD}*${TYPE_TO_BUILD}.img"
            fi
          fi
          
          # Find the firmware file
          F=$(find "$BUILDDIR/bin/targets/${PLATFORM}/${TYPE}" -name "$PATTERN" | head -1)
          
          # If not found with PREFIX, try generic pattern
          if [ ! -f "$F" ]; then
            if [ "$TYPE_TO_BUILD" = "kernel" ]; then
              PATTERN="*kernel.bin"
            else
              PATTERN="*${TYPE_TO_BUILD}.bin"
              # Special case for factory images that may be .img
              if [ "$TYPE_TO_BUILD" = "factory" ] && ! find "$BUILDDIR/bin/targets/${PLATFORM}/${TYPE}" -name "$PATTERN" | grep -q .; then
                PATTERN="*${TYPE_TO_BUILD}.img"
              fi
            fi
            
            F=$(find "$BUILDDIR/bin/targets/${PLATFORM}/${TYPE}" -name "$PATTERN" | head -1)
          fi
          
          if [ -f "$F" ]; then
            echo "✅ Found ${TYPE_TO_BUILD} firmware: $(basename "$F")"
            
            # Calculate hash and size
            FIRMWARE_HASH=$(sha256sum "$F" | cut -d' ' -f1)
            FIRMWARE_SIZE=$(stat -c%s "$F")
            
            # Add to JSON output
            if [ "$FIRST_ENTRY" -eq 0 ]; then
              echo "," >> /tmp/firmware_paths.json
            fi
            FIRST_ENTRY=0
            
            echo "  \"${TYPE_TO_BUILD}\": {" >> /tmp/firmware_paths.json
            echo "    \"path\": \"$F\"," >> /tmp/firmware_paths.json
            echo "    \"name\": \"$(basename "$F")\"," >> /tmp/firmware_paths.json
            echo "    \"hash\": \"$FIRMWARE_HASH\"," >> /tmp/firmware_paths.json
            echo "    \"size\": $FIRMWARE_SIZE" >> /tmp/firmware_paths.json
            echo "  }" >> /tmp/firmware_paths.json
            
            # Set primary firmware if not set yet
            if [ -z "$PRIMARY_FIRMWARE" ]; then
              PRIMARY_FIRMWARE="$F"
              PRIMARY_FIRMWARE_NAME="$(basename "$F")"
              echo "FIRMWARE_HASH=${FIRMWARE_HASH}" >> $GITHUB_ENV
              echo "FIRMWARE_SIZE=${FIRMWARE_SIZE}" >> $GITHUB_ENV
            fi
          else
            echo "⚠️ ${TYPE_TO_BUILD} firmware not found with pattern: $PATTERN"
          fi
        done
        
        # Close JSON
        echo "}" >> /tmp/firmware_paths.json
        
        # Check if at least one firmware was found
        if [ -z "$PRIMARY_FIRMWARE" ]; then
          echo "❌ No firmware files found"
          exit 1
        fi
        
        # Set outputs
        echo "firmware_path=$PRIMARY_FIRMWARE" >> $GITHUB_OUTPUT
        echo "firmware_name=$PRIMARY_FIRMWARE_NAME" >> $GITHUB_OUTPUT
        echo "all_firmware_paths=$(cat /tmp/firmware_paths.json)" >> $GITHUB_OUTPUT

    - name: Upload firmware to Blossom
      id: upload
      uses: c03rad0r/cli-blossom-uploader-go@main
      with:
        host:            'https://blossom.swissdash.site'
        filePath:        ${{ steps.find-firmware.outputs.firmware_path }}
        nostrPrivateKey: ${{ inputs.nsecbech }}

    - name: Publish NIP‑94 metadata
      id: publish
      uses: OpenTollGate/nostr-publish-file-metadata-action/python@main
      with:
        relays:       ${{ inputs.nostr_relays }}
        url:          ${{ steps.upload.outputs.url }}
        mimeType:     'application/octet-stream'
        fileHash:     ${{ steps.upload.outputs.hash }}
        originalHash: ${{ env.FIRMWARE_HASH }}
        filename:     ${{ steps.find-firmware.outputs.firmware_name }}
        content:      "TollGate OS for ${{ env.DEVICE_VENDOR }} ${{ env.DEVICE_MODEL }} (${{ inputs.model }}, OpenWRT ${{ inputs.version }})"
        nsec:         ${{ inputs.nsec }}
        size:         ${{ env.FIRMWARE_SIZE }}
        architecture: ${{ env.ARCH }}
        model:        ${{ inputs.model }}
        version:      ${{ inputs.version }}
        availableTypes: ${{ env.BUILD_TYPES }}
        allPaths:     ${{ steps.find-firmware.outputs.all_firmware_paths }}

    - name: Verify publication
      uses: OpenTollGate/nostr-publish-file-metadata-action/python/verify@main
      with:
        eventId: ${{ steps.publish.outputs.eventId }}
        relays:   ${{ inputs.nostr_relays }}
