name: 'Build OpenWRT Image'
description: 'Builds an OpenWRT firmware image with TollGate packages'
author: 'c03rad0r'

branding:
  color: orange
  icon: box

inputs:
  model:
    description: 'The device model to build for'
    required: true
  version:
    description: 'OpenWRT version'
    default: '23.05.5'
    required: false
  nostr_secret_key:
    description: 'Nostr secret key'
    required: true
  nostr_public_key:
    description: 'Nostr public key'
    required: true
  nostr_relays:
    description: 'Comma-separated list of Nostr relays'
    default: 'wss://relay.damus.io,wss://nos.lol,wss://nostr.mom'
  base_packages:
    description: 'Additional base packages to include'
    default: ''
  files_path:
    description: 'Path to custom files directory'
    default: 'tollgate-image-builder/files'
    required: false
  nsecbech:
    description: 'Nostr secret key (bech32) for Blossom upload'
    required: true
  nsec:
    description: 'Nostr secret key for metadata signing'
    required: true

outputs:
  firmware_path:
    description: 'Path to the built firmware file'
    value: ${{ steps.find-firmware.outputs.firmware_path }}
  firmware_name:
    description: 'Name of the built firmware file'
    value: ${{ steps.find-firmware.outputs.firmware_name }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install System Dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          gawk \
          build-essential \
          curl \
          zstd \
          libssl-dev \
          jq
        python -m pip install --upgrade pip
        pip install nostr

    - name: Set Build Variables
      id: vars
      shell: bash
      run: |
        # Create build directory first
        mkdir -p /tmp/openwrt-build
        
        case "${{ inputs.model }}" in
          "gl-mt3000")
            echo "PLATFORM=mediatek" >> $GITHUB_ENV
            echo "TYPE=filogic" >> $GITHUB_ENV
            echo "TARGET_DEVICE=mediatek-filogic" >> $GITHUB_ENV
            echo "PROFILE=glinet_gl-mt3000" >> $GITHUB_ENV
            echo "BLOSSOM_ARCH=aarch64_cortex-a53" >> $GITHUB_ENV
            echo "EXTRA_PACKAGES=kmod-usb2 kmod-usb-core kmod-usb-storage luci luci-ssl iwinfo wpad-wolfssl" >> $GITHUB_ENV
            echo "REMOVED_PACKAGES=-odhcpd -odhcpd-ipv6only -wpad-basic-wolfssl -wpad-basic-mbedtls -wpad-mini" >> $GITHUB_ENV
            ;;
          "gl-mt6000")
            echo "PLATFORM=mediatek" >> $GITHUB_ENV
            echo "TYPE=filogic" >> $GITHUB_ENV
            echo "TARGET_DEVICE=mediatek-filogic" >> $GITHUB_ENV
            echo "PROFILE=glinet_gl-mt6000" >> $GITHUB_ENV
            echo "BLOSSOM_ARCH=aarch64_cortex-a53" >> $GITHUB_ENV
            echo "EXTRA_PACKAGES=kmod-usb2 kmod-usb-core kmod-usb-storage luci luci-ssl iwinfo wpad-wolfssl" >> $GITHUB_ENV
            echo "REMOVED_PACKAGES=-odhcpd -odhcpd-ipv6only -wpad-basic-wolfssl -wpad-basic-mbedtls -wpad-mini" >> $GITHUB_ENV
            ;;
          "gl-ar300m-nand")
            echo "PLATFORM=ath79" >> $GITHUB_ENV
            echo "TYPE=nand" >> $GITHUB_ENV
            echo "TARGET_DEVICE=ath79-nand" >> $GITHUB_ENV
            echo "PROFILE=glinet_gl-ar300m-nand" >> $GITHUB_ENV
            echo "BLOSSOM_ARCH=mips_24kc" >> $GITHUB_ENV
            echo "EXTRA_PACKAGES=kmod-usb2 kmod-usb-core kmod-usb-storage luci luci-ssl iwinfo wpad-wolfssl" >> $GITHUB_ENV
            echo "REMOVED_PACKAGES=-odhcpd -odhcpd-ipv6only -wpad-basic-wolfssl -wpad-basic-mbedtls -wpad-mini" >> $GITHUB_ENV
            ;;
          *)
            echo "Unsupported model: ${{ inputs.model }}" >> $GITHUB_ENV
            exit 1
            ;;
        esac
        echo "BUILDDIR=/tmp/openwrt-build" >> $GITHUB_ENV

    - name: Extract from profiles.json
      shell: bash
      run: |
        set -euo pipefail
        
        echo "🔍 Starting build variable extraction for ${{ inputs.model }}..."
        
        # Set profile name based on input model
        MODEL="${PROFILE}"
        echo "📌 Target device set to OpenWRT profile name: $MODEL"
        
        VERSION="${{ inputs.version }}"
        echo "📌 Using OpenWRT version: $VERSION"
        
        # Path to profiles in repository
        PROFILES_DIR="${GITHUB_WORKSPACE}/external_profiles/$VERSION"
        PROFILE_PATH="$PROFILES_DIR/${PLATFORM}/${TYPE}/profiles.json"
        echo "📄 Looking for profile at: $PROFILE_PATH"
        
        if [ ! -f "$PROFILE_PATH" ]; then
          echo "❌ ERROR: Could not find profiles.json at $PROFILE_PATH"
          echo "❌ Please ensure the external_profiles directory is properly populated"
          exit 1
        fi
        
        echo "✅ Found profile file: $PROFILE_PATH"
        
        # Check if the model exists in this profiles.json
        if ! jq -e --arg p "$MODEL" '.profiles[$p]?' "$PROFILE_PATH" > /dev/null; then
          echo "❌ ERROR: Profile '$MODEL' not found in $PROFILE_PATH"
          echo "❌ The device profile is missing from the profiles.json file"
          
          # List available profiles to help debugging
          echo "Available profiles in this file:"
          jq -r '.profiles | keys[]' "$PROFILE_PATH" | sort
          exit 1
        fi
        
        echo "✅ Confirmed $MODEL profile exists in profiles.json"
        
        # Extract variables from profiles.json
        ARCH=$(jq -r '.arch_packages' "$PROFILE_PATH")
        DEFAULT_PKGS=$(jq -r '.default_packages | join(" ")' "$PROFILE_PATH")
        
        # Get specific device packages
        DEVICE_PKGS=$(jq -r --arg p "$MODEL" '.profiles[$p].device_packages // [] | join(" ")' "$PROFILE_PATH")
        
        # Also extract and display detailed device info for verification
        DEVICE_IMAGE_PREFIX=$(jq -r --arg p "$MODEL" '.profiles[$p].image_prefix // "unknown"' "$PROFILE_PATH")
        DEVICE_SUPPORTED=$(jq -r --arg p "$MODEL" '.profiles[$p].supported_devices // [] | join(", ")' "$PROFILE_PATH")
        DEVICE_VENDOR=$(jq -r --arg p "$MODEL" '.profiles[$p].titles[0].vendor // "unknown"' "$PROFILE_PATH")
        DEVICE_MODEL=$(jq -r --arg p "$MODEL" '.profiles[$p].titles[0].model // "unknown"' "$PROFILE_PATH")
        
        # Print all extracted variables in a formatted table for clarity
        echo "✅ Successfully parsed profiles.json for $MODEL"
        echo "=================================================="
        echo "📋 EXTRACTED BUILD VARIABLES FOR ${{ inputs.model }}"
        echo "=================================================="
        echo "PLATFORM:          $PLATFORM"
        echo "TYPE:              $TYPE"
        echo "PROFILE:           $MODEL"
        echo "ARCH:              $ARCH"
        echo "--------------------------------------------------"
        echo "DEVICE INFO:"
        echo "VENDOR:            $DEVICE_VENDOR"
        echo "MODEL:             $DEVICE_MODEL"
        echo "IMAGE PREFIX:      $DEVICE_IMAGE_PREFIX"
        echo "SUPPORTED DEVICES: $DEVICE_SUPPORTED"
        echo "--------------------------------------------------"
        echo "PACKAGES:"
        echo "DEFAULT PACKAGES:  $DEFAULT_PKGS"
        echo "DEVICE PACKAGES:   $DEVICE_PKGS"
        echo "=================================================="
        
        # TollGate WiFi/DHCP removals and standard additions already set in previous step
        WIFI_REMOVE="-wpad -wpad-basic -wpad-basic-wolfssl -wpad-mini -wpad-basic-mbedtls -wpad-mesh-openssl -wpad-mesh-wolfssl"
        DHCP_REMOVE="-odhcpd -odhcpd-ipv6only"
        TOLLGATE_REMOVED="$WIFI_REMOVE $DHCP_REMOVE"
        echo "🔄 Removing packages: $TOLLGATE_REMOVED"
        
        WIFI_ADD="wpad-wolfssl"
        TOLLGATE_ADDED="luci luci-ssl iwinfo $WIFI_ADD"
        echo "➕ Adding packages: $TOLLGATE_ADDED"
        
        # Compose final package list: TollGate → Device → Base → user extras
        PACKAGES="$TOLLGATE_REMOVED $TOLLGATE_ADDED $DEVICE_PKGS $DEFAULT_PKGS ${{ inputs.base_packages }}"
        
        # Export environment for downstream steps
        echo "PACKAGES=$PACKAGES" >> $GITHUB_ENV
        echo "ARCH=$ARCH" >> $GITHUB_ENV
        
        echo "✅ Build variables exported to environment"

    - name: Setup Build Directory
      shell: bash
      run: |
        mkdir -p $BUILDDIR
        
        if [ "${{ inputs.version }}" = "snapshot" ]; then
          IMAGEBUILDER_NAME="openwrt-imagebuilder-${PLATFORM}-${TYPE}.Linux-x86_64"
          DOWNLOAD_URL="https://downloads.openwrt.org/snapshots/targets/${PLATFORM}/${TYPE}/${IMAGEBUILDER_NAME}.tar.zst"
          echo "ARCHIVE_EXT=tar.zst" >> $GITHUB_ENV
        elif [ "${PLATFORM}" = "ath79" ] && [ "${TYPE}" = "nand" ]; then
          IMAGEBUILDER_NAME="openwrt-imagebuilder-${{ inputs.version }}-ath79-nand.Linux-x86_64"
          DOWNLOAD_URL="https://downloads.openwrt.org/releases/${{ inputs.version }}/targets/${PLATFORM}/${TYPE}/${IMAGEBUILDER_NAME}.tar.xz"
          echo "ARCHIVE_EXT=tar.xz" >> $GITHUB_ENV
        else
          IMAGEBUILDER_NAME="openwrt-imagebuilder-${{ inputs.version }}-${TARGET_DEVICE}.Linux-x86_64"
          DOWNLOAD_URL="https://downloads.openwrt.org/releases/${{ inputs.version }}/targets/${PLATFORM}/${TYPE}/${IMAGEBUILDER_NAME}.tar.xz"
          echo "ARCHIVE_EXT=tar.xz" >> $GITHUB_ENV
        fi
        
        echo "IMAGEBUILDER_NAME=${IMAGEBUILDER_NAME}" >> $GITHUB_ENV
        echo "DOWNLOAD_URL=${DOWNLOAD_URL}" >> $GITHUB_ENV

    - name: Download and Extract ImageBuilder
      shell: bash
      run: |
        cd $BUILDDIR
        if curl --output /dev/null --silent --head --fail "$DOWNLOAD_URL"; then
          curl -L -C - -O "$DOWNLOAD_URL"
          if [ "${{ inputs.version }}" = "snapshot" ]; then
            tar --zstd -xf "${IMAGEBUILDER_NAME}.${ARCHIVE_EXT}"
          else
            tar xfJ "${IMAGEBUILDER_NAME}.${ARCHIVE_EXT}"
          fi
        else
          echo "Error: URL $DOWNLOAD_URL does not exist"
          exit 1
        fi
        
        echo "BUILDDIR=$BUILDDIR/${IMAGEBUILDER_NAME}" >> $GITHUB_ENV

    - name: Setup Custom Files and Packages
      shell: bash
      env:
        NOSTR_SECRET_KEY: ${{ inputs.nostr_secret_key }}
        NOSTR_PUBLIC_KEY: ${{ inputs.nostr_public_key }}
        NOSTR_RELAYS: ${{ inputs.nostr_relays }}
      run: |
        mkdir -p $BUILDDIR/files
        if [ -d "${{ inputs.files_path }}" ]; then
          cp -r ${{ inputs.files_path }}/* $BUILDDIR/files/
        fi
        PACKAGES_DIR="${BUILDDIR}/packages/local"
        mkdir -p "${PACKAGES_DIR}"
        
        # Add U-Boot config for supported devices
        case "${{ inputs.model }}" in
          "gl-mt3000"|"gl-mt6000")
            echo "Creating U-Boot environment config"
            mkdir -p $BUILDDIR/files/etc
            echo "/dev/mtd1 0x0 0x1000 0x10000" > $BUILDDIR/files/etc/fw_env.config
            ;;
        esac

    - name: Download TollGate Packages
      shell: bash
      run: |
        # Create packages directory if it doesn't exist
        PACKAGES_DIR="${BUILDDIR}/packages/local"
        mkdir -p "${PACKAGES_DIR}"
        
        # Convert BLOSSOM_ARCH (if needed)
        TARGET_ARCH="${BLOSSOM_ARCH}"
        
        echo "🔍 Looking for packages for architecture: ${TARGET_ARCH}"
        
        # Create an empty Packages file to prevent build failures if no packages are downloaded
        touch "${PACKAGES_DIR}/Packages"
        
        # Parse release.json and download all packages for this architecture
        DOWNLOADED_PACKAGES=""
        if [ -f "files/etc/tollgate/release.json" ]; then
          for MODULE_NAME in $(jq -r '.modules[].name' files/etc/tollgate/release.json); do
            echo "📦 Processing module: ${MODULE_NAME}"
            
            # Extract URL for this module and architecture
            PACKAGE_URL=$(jq -r --arg module "$MODULE_NAME" --arg arch "$TARGET_ARCH" \
              '.modules[] | select(.name == $module) | .versions[0].architectures[$arch].url' files/etc/tollgate/release.json)
              
            # Skip placeholder URLs
            if [[ "$PACKAGE_URL" == *"[HASH]"* || "$PACKAGE_URL" == "null" ]]; then
              echo "⚠️ No package available for ${MODULE_NAME} (${TARGET_ARCH})"
              continue
            fi
            
            # Download the package with retry logic
            PACKAGE_FILENAME="${MODULE_NAME}-${TARGET_ARCH}.ipk"
            echo "⬇️ Downloading ${MODULE_NAME} from ${PACKAGE_URL}"
            
            # Try up to 3 times with increasing timeouts
            for ATTEMPT in {1..3}; do
              echo "Download attempt $ATTEMPT for ${MODULE_NAME}"
              if curl -L -f --connect-timeout 30 --max-time 120 -o "${PACKAGES_DIR}/${PACKAGE_FILENAME}" "${PACKAGE_URL}"; then
                echo "✅ Successfully downloaded ${PACKAGE_FILENAME}"
                DOWNLOADED_PACKAGES="${DOWNLOADED_PACKAGES} tollgate-module-${MODULE_NAME}-go"
                break
              else
                echo "⚠️ Attempt $ATTEMPT failed for ${PACKAGE_FILENAME}"
                if [ $ATTEMPT -eq 3 ]; then
                  echo "❌ Failed to download ${PACKAGE_FILENAME} after 3 attempts"
                fi
                sleep 5
              fi
            done
          done
        else
          echo "⚠️ release.json not found in files/etc/tollgate/"
        fi
        
        # Add the downloaded packages to the build package list
        if [ -n "${DOWNLOADED_PACKAGES}" ]; then
          echo "🔧 Adding packages to build: ${DOWNLOADED_PACKAGES}"
          echo "TOLLGATE_PACKAGES=${DOWNLOADED_PACKAGES}" >> $GITHUB_ENV
          PACKAGES="$PACKAGES $DOWNLOADED_PACKAGES"
          echo "PACKAGES=$PACKAGES" >> $GITHUB_ENV
        else
          echo "⚠️ No packages were downloaded successfully"
          echo "TOLLGATE_PACKAGES=" >> $GITHUB_ENV
        fi
        
        # Generate package index
        sudo bash -c 'mkhash() { if [ "$1" = "sha256" ]; then sha256sum "$2" | cut -d" " -f1; else sha256sum "$1" | cut -d" " -f1; fi; }; \
        export -f mkhash; \
        export MKHASH=mkhash; \
        '"${BUILDDIR}"'/scripts/ipkg-make-index.sh '"${PACKAGES_DIR}"' > '"${PACKAGES_DIR}"'/Packages && \
        gzip -9c '"${PACKAGES_DIR}"'/Packages > '"${PACKAGES_DIR}"'/Packages.gz'

    - name: Build firmware
      shell: bash
      run: |
        set -euo pipefail
        cd "$BUILDDIR"
        echo "🔨 Building firmware for $PROFILE"
        echo "📦 Using packages: $PACKAGES"
        
        # Simple approach: use FORCE=1 to bypass prerequisite checks
        FORCE=1 make image \
          PROFILE="$PROFILE" \
          PACKAGES="$PACKAGES" \
          FILES="files" \
          EXTRA_IMAGE_NAME="tollgate-os"

    - name: Find firmware
      id: find-firmware
      shell: bash
      run: |
        set -euo pipefail
        F=$(find "$BUILDDIR/bin/targets/${PLATFORM}/${TYPE}" -name "*sysupgrade.bin" | head -1)
        if [ ! -f "$F" ]; then
          echo "❌ Firmware not found"
          exit 1
        fi
        
        # Calculate hash for metadata
        FIRMWARE_HASH=$(sha256sum "$F" | cut -d' ' -f1)
        echo "FIRMWARE_HASH=${FIRMWARE_HASH}" >> $GITHUB_ENV
        echo "FIRMWARE_SIZE=$(stat -c%s "$F")" >> $GITHUB_ENV
        
        echo "✅ Firmware built successfully: $(basename "$F")"
        echo "firmware_path=$F" >> $GITHUB_OUTPUT
        echo "firmware_name=$(basename "$F")" >> $GITHUB_OUTPUT

    - name: Upload firmware to Blossom
      id: upload
      uses: c03rad0r/cli-blossom-uploader-go@main
      with:
        host:            'https://blossom.swissdash.site'
        filePath:        ${{ steps.find-firmware.outputs.firmware_path }}
        nostrPrivateKey: ${{ inputs.nsecbech }}

    - name: Publish NIP‑94 metadata
      id: publish
      uses: OpenTollGate/nostr-publish-file-metadata-action/python@main
      with:
        relays:       ${{ inputs.nostr_relays }}
        url:          ${{ steps.upload.outputs.url }}
        mimeType:     'application/octet-stream'
        fileHash:     ${{ steps.upload.outputs.hash }}
        originalHash: ${{ env.FIRMWARE_HASH }}
        filename:     ${{ steps.find-firmware.outputs.firmware_name }}
        content:      "TollGate OS for ${{ inputs.model }} (OpenWRT ${{ inputs.version }})"
        nsec:         ${{ inputs.nsec }}
        size:         ${{ env.FIRMWARE_SIZE }}
        architecture: ${{ env.BLOSSOM_ARCH }}
        model:        ${{ inputs.model }}
        version:      ${{ inputs.version }}

    - name: Verify publication
      uses: OpenTollGate/nostr-publish-file-metadata-action/python/verify@main
      with:
        eventId: ${{ steps.publish.outputs.eventId }}
        relays:   ${{ inputs.nostr_relays }}
