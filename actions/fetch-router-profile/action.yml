name: 'Fetch Router Profile'
description: 'Download and cache the specific profiles.json file for a target architecture using GitHub Actions cache API'

inputs:
  target:
    description: 'Target architecture (e.g., mediatek/filogic)'
    required: true
  version:
    description: 'OpenWRT version to use'
    required: true
  output-dir:
    description: 'Directory to store profile files'
    required: false
    default: 'external_profiles'
  force-download:
    description: 'Force download even if profile file already exists'
    required: false
    default: 'false'
  cache-key-prefix:
    description: 'Prefix for the cache key'
    required: false
    default: 'openwrt-profile'

outputs:
  profile-path:
    description: 'Path to the downloaded profiles.json file'
    value: ${{ steps.fetch.outputs.profile_path }}
  mapping-path:
    description: 'Path to the generated profiles-mapping.txt file'
    value: ${{ steps.fetch.outputs.mapping_path }}
  device-count:
    description: 'Number of device profiles in the target'
    value: ${{ steps.fetch.outputs.device_count }}
  success:
    description: 'Whether the profile was successfully retrieved'
    value: ${{ steps.fetch.outputs.success }}
  cache-hit:
    description: 'Whether the profile file was retrieved from cache'
    value: ${{ steps.cache-profile.outputs.cache-hit }}

runs:
  using: 'composite'
  steps:
    - name: Set up Cache variables
      id: cache-vars
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        TARGET="${{ inputs.target }}"
        # Split target into platform and subtarget
        PLATFORM=$(echo $TARGET | cut -d'/' -f1)
        SUBTARGET=$(echo $TARGET | cut -d'/' -f2)
        
        if [ -z "$PLATFORM" ] || [ -z "$SUBTARGET" ]; then
          echo "❌ Invalid target format: $TARGET. Expected format: platform/subtarget"
          exit 1
        fi
        
        WORKSPACE_DIR="${GITHUB_WORKSPACE}"
        OUTPUT_DIR="${WORKSPACE_DIR}/${{ inputs.output-dir }}"
        TARGET_DIR="${OUTPUT_DIR}/${VERSION}/${PLATFORM}/${SUBTARGET}"
        
        # Create directory structure
        mkdir -p "$TARGET_DIR"
        
        # Cache key includes version and target to be specific
        CACHE_KEY="${{ inputs.cache-key-prefix }}-$VERSION-${PLATFORM}-${SUBTARGET}"
        
        # Set output variables for use in later steps
        echo "cache-key=$CACHE_KEY" >> $GITHUB_OUTPUT
        echo "profile-file=$TARGET_DIR/profiles.json" >> $GITHUB_OUTPUT
        echo "mapping-file=$TARGET_DIR/profiles-mapping.txt" >> $GITHUB_OUTPUT
        echo "platform=$PLATFORM" >> $GITHUB_OUTPUT
        echo "subtarget=$SUBTARGET" >> $GITHUB_OUTPUT
        echo "target-dir=$TARGET_DIR" >> $GITHUB_OUTPUT
    
    # Try to restore the profiles.json and mapping file from cache first
    - name: Restore profiles from cache
      id: cache-profile
      uses: actions/cache/restore@v3
      with:
        path: |
          ${{ steps.cache-vars.outputs.profile-file }}
          ${{ steps.cache-vars.outputs.mapping-file }}
        key: ${{ steps.cache-vars.outputs.cache-key }}
        restore-keys: |
          ${{ inputs.cache-key-prefix }}-${{ inputs.version }}-${{ steps.cache-vars.outputs.platform }}-${{ steps.cache-vars.outputs.subtarget }}
    
    - name: Fetch target profile
      id: fetch
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        TARGET="${{ inputs.target }}"
        PLATFORM="${{ steps.cache-vars.outputs.platform }}"
        SUBTARGET="${{ steps.cache-vars.outputs.subtarget }}"
        TARGET_DIR="${{ steps.cache-vars.outputs.target-dir }}"
        PROFILE_FILE="${{ steps.cache-vars.outputs.profile-file }}"
        MAPPING_FILE="${{ steps.cache-vars.outputs.mapping-file }}"
        FORCE_DOWNLOAD="${{ inputs.force-download }}"
        CACHE_HIT="${{ steps.cache-profile.outputs.cache-hit }}"
        
        # Check if we need to download or can use cache
        if [ "$CACHE_HIT" == "true" ] && [ -f "$PROFILE_FILE" ] && [ -s "$PROFILE_FILE" ] && [ "$FORCE_DOWNLOAD" != "true" ]; then
          echo "✅ Using cached profiles for $TARGET (OpenWRT $VERSION)"
        else
          echo "🔍 Downloading profiles for $TARGET (OpenWRT $VERSION)..."
          
          # URL for the profiles file
          URL="https://downloads.openwrt.org/releases/${VERSION}/targets/${PLATFORM}/${SUBTARGET}/profiles.json"
          
          # Try to download with retries
          MAX_RETRIES=3
          SUCCESS=false
          
          for ATTEMPT in $(seq 1 $MAX_RETRIES); do
            echo "  • Download attempt $ATTEMPT of $MAX_RETRIES"
            
            if curl -s -f -o "$PROFILE_FILE" "$URL"; then
              if [ -s "$PROFILE_FILE" ] && grep -q "\"profiles\":" "$PROFILE_FILE" 2>/dev/null; then
                SUCCESS=true
                break
              else
                echo "⚠️ Downloaded file is invalid. Retrying..."
                rm -f "$PROFILE_FILE"
              fi
            else
              echo "⚠️ Download attempt $ATTEMPT failed"
            fi
            
            if [ "$ATTEMPT" -lt "$MAX_RETRIES" ]; then
              sleep 3
            fi
          done
          
          if [ "$SUCCESS" != "true" ]; then
            echo "❌ Failed to download profiles for $TARGET (OpenWRT $VERSION)"
            echo "success=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          echo "✅ Downloaded profiles for $TARGET (OpenWRT $VERSION)"
          
          # Generate mapping file after successful download
          echo "📝 Generating device mapping for $TARGET..."
          
          echo "# Device ID to Name mapping" > "$MAPPING_FILE"
          echo "# Format: device_id | vendor | model | full_name" >> "$MAPPING_FILE"
          echo "# Generated from: $PROFILE_FILE" >> "$MAPPING_FILE"
          echo "# Generated on: $(date)" >> "$MAPPING_FILE"
          echo "" >> "$MAPPING_FILE"
          
          # Extract all profile IDs and details
          jq -r '.profiles | keys[]' "$PROFILE_FILE" 2>/dev/null | while read id; do
            vendor=$(jq -r --arg id "$id" '.profiles[$id].titles[0].vendor // "Unknown"' "$PROFILE_FILE")
            model=$(jq -r --arg id "$id" '.profiles[$id].titles[0].model // "Unknown"' "$PROFILE_FILE")
            variant=$(jq -r --arg id "$id" '.profiles[$id].titles[0].variant // ""' "$PROFILE_FILE")
            
            # Construct full name
            if [ -n "$variant" ] && [ "$variant" != "null" ]; then
              full_name="$vendor $model ($variant)"
            else
              full_name="$vendor $model"
            fi
            
            # Add to mapping file
            echo "$id | $vendor | $model | $full_name" >> "$MAPPING_FILE"
          done
          
          echo "✅ Generated mapping file: $(basename "$MAPPING_FILE")"
        fi
        
        # Count the number of devices
        DEVICE_COUNT=$(jq '.profiles | length' "$PROFILE_FILE" 2>/dev/null || echo 0)
        echo "📊 Found $DEVICE_COUNT device profiles for $TARGET"
        
        # Set outputs
        echo "profile_path=$PROFILE_FILE" >> $GITHUB_OUTPUT
        echo "mapping_path=$MAPPING_FILE" >> $GITHUB_OUTPUT
        echo "device_count=$DEVICE_COUNT" >> $GITHUB_OUTPUT
        echo "success=true" >> $GITHUB_OUTPUT
    
    # Save the profiles.json and mapping file to cache for future use
    - name: Save profiles to cache
      id: save-cache
      uses: actions/cache/save@v3
      if: steps.cache-profile.outputs.cache-hit != 'true'
      with:
        path: |
          ${{ steps.cache-vars.outputs.profile-file }}
          ${{ steps.cache-vars.outputs.mapping-file }}
        key: ${{ steps.cache-vars.outputs.cache-key }}