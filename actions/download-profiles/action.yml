name: 'Download OpenWRT Profiles'
description: 'Download OpenWRT profiles for different router platforms and architectures'
inputs:
  version:
    description: 'OpenWRT version to download profiles for, or "latest" for latest supported version'
    required: false
    default: 'latest'
  platform:
    description: 'Specific platform/target to download (format: platform/target, e.g. ramips/mt7621)'
    required: false
    default: ''
  output-dir:
    description: 'Directory to store downloaded profiles'
    required: false
    default: 'external_profiles'
  force-download:
    description: 'Force download even if profiles already exist'
    required: false
    default: 'false'
  min-eol-date:
    description: 'Minimum end-of-life date to consider a version supported (YYYY-MM-DD format)'
    required: false
    default: '2025-08-04'

runs:
  using: 'composite'
  steps:
    - name: Set up environment
      shell: bash
      run: |
        # Make sure jq is installed
        if ! command -v jq &> /dev/null; then
          echo "Error: jq is required but not installed"
          exit 1
        fi

    - name: Download profiles
      id: download
      shell: bash
      run: |
        # Run the download script with provided inputs
        "${{ github.action_path }}/download_profiles.sh" \
          "${{ inputs.version }}" \
          "${{ inputs.platform }}" \
          "${{ inputs.output-dir }}" \
          "${{ inputs.force-download }}"
      
outputs:
  profile-count:
    description: 'Total number of device profiles'
    value: ${{ steps.download.outputs.count }}
  skipped-count:
    description: 'Number of profiles skipped (already exist)'
    value: ${{ steps.download.outputs.skipped }}
  downloaded-count:
    description: 'Number of profiles downloaded'
    value: ${{ steps.download.outputs.downloaded }}
  version:
    description: 'The OpenWRT version that was processed'
    value: ${{ steps.download.outputs.version }}