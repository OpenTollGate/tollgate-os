name: 'Update Release JSON from NIP-94 Events'
description: 'Updates release.json based on NIP-94 events, using only the newest event per architecture'
author: 'OpenTollGate'

inputs:
  artifacts_path:
    description: 'Path to the directory containing NIP-94 event files'
    required: true
  release_json_path:
    description: 'Path to the release.json file to update'
    required: true
  target_branch:
    description: 'Branch to push changes to'
    required: false
    default: 'develop'
  github_token:
    description: 'GitHub token for authentication'
    required: true
  commit_message:
    description: 'Commit message for the update'
    required: false
    default: 'Update release.json with all NIP-94 events'

runs:
  using: 'composite'
  steps:
    - name: Process NIP-94 Events
      shell: bash
      run: |
        echo "Looking for NIP-94 events in ${{ inputs.artifacts_path }}"
        ls -la ${{ inputs.artifacts_path }}
        
        # Create a backup of the original file
        cp ${{ inputs.release_json_path }} ${{ inputs.release_json_path }}.bak
        
        echo "Processing NIP-94 events from ${{ inputs.artifacts_path }}"
        
        # Count event files
        EVENT_FILES=$(find ${{ inputs.artifacts_path }} -name "*.json" | wc -l)
        echo "Found $EVENT_FILES event files to process"
        
        if [ "$EVENT_FILES" -eq 0 ]; then
          echo "Warning: No event files found!"
          exit 0
        fi
        
        # Sort events by creation timestamp for each module-arch combination 
        mkdir -p sorted_events
        
        for EVENT_FILE in ${{ inputs.artifacts_path }}/*.json; do
          # Extract event details
          CREATED_AT=$(jq -r '.created_at' "$EVENT_FILE")
          URL=$(jq -r '.tags[] | select(.[0] == "url") | .[1]' "$EVENT_FILE")
          HASH=$(jq -r '.tags[] | select(.[0] == "x") | .[1]' "$EVENT_FILE")
          ARCH=$(jq -r '.tags[] | select(.[0] == "arch") | .[1]' "$EVENT_FILE")
          FILENAME=$(jq -r '.tags[] | select(.[0] == "filename") | .[1]' "$EVENT_FILE")
          EVENT_ID=$(jq -r '.id' "$EVENT_FILE")
          
          # Skip events with missing data
          if [[ -z "$URL" || -z "$HASH" || -z "$ARCH" || -z "$FILENAME" ]]; then
            echo "⚠️ Skipping event with missing data: $EVENT_FILE"
            continue
          fi
          
          # Extract module name from filename
          MODULE=""
          if [[ "$FILENAME" =~ ^([^-]+)- ]]; then
            MODULE="${BASH_REMATCH[1]}"
          elif [[ "$FILENAME" =~ tollgate-module-(.+)-go ]]; then
            MODULE="${BASH_REMATCH[1]}"
          fi
          
          if [[ -n "$MODULE" ]]; then
            # Create a sorted output file
            TIMESTAMP=$(printf "%020d" $CREATED_AT)
            KEY="${MODULE}-${ARCH}"
            OUT_FILE="sorted_events/${TIMESTAMP}_${KEY}.txt"
            echo "MODULE=$MODULE" > "$OUT_FILE"
            echo "ARCH=$ARCH" >> "$OUT_FILE"
            echo "URL=$URL" >> "$OUT_FILE"
            echo "HASH=$HASH" >> "$OUT_FILE"
            echo "EVENT_ID=$EVENT_ID" >> "$OUT_FILE"
            echo "CREATED_AT=$CREATED_AT" >> "$OUT_FILE"
            echo "Saved event data for $KEY (created at $CREATED_AT) to $OUT_FILE"
          else
            echo "⚠️ Couldn't extract module name from filename: $FILENAME"
          fi
        done
        
        # Process the latest event for each module-arch pair
        declare -A SEEN_KEYS
        for UPDATE_FILE in $(ls -r sorted_events/*.txt 2>/dev/null || echo ""); do
          # Extract the key from filename (after timestamp)
          FILENAME=$(basename "$UPDATE_FILE")
          KEY=$(echo "$FILENAME" | sed -E 's/^[0-9]+_(.+)\.txt$/\1/')
          
          # Skip if we've already processed this key (module-arch pair)
          if [[ -n "${SEEN_KEYS[$KEY]}" ]]; then
            echo "⏭️ Skipping older event for $KEY"
            continue
          fi
          
          SEEN_KEYS[$KEY]=1
          echo "Processing newest event for $KEY from $UPDATE_FILE"
          
          # Source the variables from the file
          source "$UPDATE_FILE"
          echo "Event data: MODULE=$MODULE, ARCH=$ARCH, EVENT_ID=$EVENT_ID"
          echo "URL=$URL, HASH=$HASH"
          
          # Use Python for the entire update process
          python3 -c "
import json
import os

# Load the release.json
release_path = '${{ inputs.release_json_path }}'
with open(release_path, 'r') as f:
    data = json.load(f)

# Create the new architecture entry
arch_entry = {
    'url': '$URL',
    'hash': 'sha256:$HASH',
    'eventId': '$EVENT_ID'
}

# Update the JSON structure
updated = False
for module in data['modules']:
    if module['name'] == '$MODULE':
        for version in module['versions']:
            # Create architecture entry if not exists
            if '$ARCH' not in version['architectures']:
                version['architectures']['$ARCH'] = {}
            # Update with new values
            version['architectures']['$ARCH'].update(arch_entry)
            updated = True

if updated:
    # Write back the updated JSON
    with open(release_path, 'w') as f:
        json.dump(data, f, indent=2)
    print('✅ Successfully updated $MODULE/$ARCH in release.json')
else:
    print('❌ Failed to find module $MODULE in release.json')

# Validate the final JSON
try:
    with open(release_path, 'r') as f:
        json.load(f)
    print('JSON validation successful')
except json.JSONDecodeError as e:
    print(f'JSON validation failed: {e}')
    exit(1)
          "
          
          # Clean up temp files
          rm -f "$ARCH_FILE" "$TMP_JSON"
        done
        
        # Show changes
        echo "Changes to release.json:"
        diff -u ${{ inputs.release_json_path }}.bak ${{ inputs.release_json_path }} || echo "No changes detected"
    
    - name: Commit and Push Changes
      shell: bash
      run: |
        # Configure git
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Check if there are changes
        if git diff --exit-code ${{ inputs.release_json_path }}; then
          echo "No changes to commit."
          exit 0
        fi
        
        # Add, commit and push changes
        git add ${{ inputs.release_json_path }}
        git commit -m "${{ inputs.commit_message }}"
        echo "Pushing changes to ${{ inputs.target_branch }} branch..."
        git push https://${{ inputs.github_token }}@github.com/${{ github.repository }}.git HEAD:${{ inputs.target_branch }}