name: 'OpenWrt Router Info'
description: >
  Given a router ID (and optionally an OpenWrt version), fetch all the
  metadata your build system needs: version, target, packages, kernel info, etc.
author: Your Name <you@example.com>

inputs:
  router_id:
    description: 'The .overview.json `id` of the router profile (e.g. checkpoint_l-50)'
    required: true
  openwrt_version:
    description: 'Optional override of the OpenWrt release (e.g. 24.10.1). If omitted, fetches latest supported.'
    required: false

outputs:
  openwrt_version:
    description: 'The OpenWrt release used (e.g. 24.10.1)'
    value: ${{ steps.version.outputs.openwrt_version }}
  target:
    description: 'The download target triple (e.g. kirkwood/generic)'
    value: ${{ steps.overview.outputs.target }}
  arch_packages:
    description: 'arch_packages from profiles.json'
    value: ${{ steps.profiles.outputs.arch_packages }}
  default_packages:
    description: 'default_packages from profiles.json as comma-separated list'
    value: ${{ steps.profiles.outputs.default_packages }}
  metadata_version:
    description: 'metadata_version from profiles.json'
    value: ${{ steps.profiles.outputs.metadata_version }}
  source_date_epoch:
    description: 'source_date_epoch from profiles.json'
    value: ${{ steps.profiles.outputs.source_date_epoch }}
  linux_kernel_release:
    description: 'linux_kernel.release'
    value: ${{ steps.profiles.outputs.linux_kernel_release }}
  linux_kernel_version:
    description: 'linux_kernel.version'
    value: ${{ steps.profiles.outputs.linux_kernel_version }}
  linux_kernel_vermagic:
    description: 'linux_kernel.vermagic'
    value: ${{ steps.profiles.outputs.linux_kernel_vermagic }}
  supported_image_types:
    description: 'Comma-separated list of supported firmware image types (sysupgrade, factory, etc.)'
    value: ${{ steps.profiles.outputs.supported_image_types }}
  supported_filesystems:
    description: 'Comma-separated list of supported filesystems (squashfs, ubifs, etc.)'
    value: ${{ steps.profiles.outputs.supported_filesystems }}
  uses_ubi:
    description: 'Whether this device uses UBI (true/false)'
    value: ${{ steps.profiles.outputs.uses_ubi }}
  image_prefix:
    description: 'Image file prefix for this router model'
    value: ${{ steps.profiles.outputs.image_prefix }}
  profile_json:
    description: 'Full profile object for router_id (JSON‑encoded)'
    value: ${{ steps.profiles.outputs.profile_json }}
  device_packages:
    description: 'device_packages array for router_id as comma-separated list'
    value: ${{ steps.profiles.outputs.device_packages }}

runs:
  using: 'composite'
  steps:
    - name: Install dependencies
      shell: bash
      run: |
        set -e
        # jq + curl should already be present on ubuntu-latest,
        # but install to be safe if runner image changes:
        if ! command -v jq >/dev/null; then
          sudo apt-get update
          sudo apt-get install -y jq curl
        fi

    - name: Determine OpenWrt version
      id: version
      shell: bash
      run: |
        set -euo pipefail
        if [ -z "${{ inputs.openwrt_version }}" ]; then
          echo "🚀 No version provided; fetching latest supported from endoflife.date..."
          openwrt_version=$(curl -fsSL https://endoflife.date/api/openwrt.json \
            | jq -r '[.[] | select(.support == true)][0].latest')
        else
          openwrt_version="${{ inputs.openwrt_version }}"
        fi
        echo "Using OpenWrt version: $openwrt_version"
        echo "openwrt_version=$openwrt_version" >> "$GITHUB_OUTPUT"

    - name: Fetch overview.json and extract target
      id: overview
      shell: bash
      run: |
        set -euo pipefail
        OV_URL="https://downloads.openwrt.org/releases/${{ steps.version.outputs.openwrt_version }}/.overview.json"
        echo "Downloading $OV_URL"
        overview_json=$(curl -fsSL "$OV_URL")
        
        # Find the profile matching our router_id
        profile_entry=$(echo "$overview_json" \
          | jq -c --arg id "${{ inputs.router_id }}" \
               '.profiles[] | select(.id == $id)')
        
        # Check if we found it
        if [ -z "$profile_entry" ] || [ "$profile_entry" = "null" ]; then
          echo "❌ Router ID '${{ inputs.router_id }}' not found in overview.json"
          exit 1
        fi
        
        # Extract the target
        target=$(echo "$profile_entry" | jq -r '.target')
        echo "Found target: $target"
        
        # Extract the architecture from target
        # This is important as packages are now organized by architecture, not target board
        arch=$(echo "$profile_entry" | jq -r '.arch // ""')
        if [ -z "$arch" ]; then
          # If arch isn't directly available, try to determine it from target
          case "$target" in
            *"x86"*) arch="x86_64" ;;
            *"aarch64"*) arch="aarch64_generic" ;;
            *"arm"*) arch="arm_generic" ;;
            *"mips"*) arch="mips_24kc" ;;
            *"mipsel"*) arch="mipsel_24kc" ;;
            *) arch=$(echo "$target" | cut -d'/' -f1) ;;
          esac
          echo "Determined architecture from target: $arch"
        else
          echo "Found architecture: $arch"
        fi
        
        # Display just the relevant profile for our router_id
        echo "📱 Router profile information:"
        echo "$profile_entry" | jq '.'
        
        # Export to GitHub Action outputs
        echo "target=$target" >> "$GITHUB_OUTPUT"
        echo "arch=$arch" >> "$GITHUB_OUTPUT"
        
        # Store the profile entry for future reference in a way that's compatible with multiline outputs
        echo "profile_entry<<EOF" >> "$GITHUB_OUTPUT"
        echo "$profile_entry"
        echo "EOF" >> "$GITHUB_OUTPUT"
        
        # Debug - print to verify what's being set
        echo "DEBUG: Set target output to: $target"
        
        # Make sure this information is available for later steps
        echo "$target" > /tmp/openwrt_target.txt
        echo "$arch" > /tmp/openwrt_arch.txt

    - name: Fetch profiles.json and extract all fields
      id: profiles
      shell: bash
      run: |
        set -euo pipefail
        
        # Ensure we can retrieve values set by previous steps
        if [ -f /tmp/openwrt_target.txt ]; then
          TG=$(cat /tmp/openwrt_target.txt)
        else
          TG="${{ steps.overview.outputs.target }}"
        fi
        
        PV="${{ steps.version.outputs.openwrt_version }}"
        URL="https://downloads.openwrt.org/releases/$PV/targets/$TG/profiles.json"
        echo "🔍 Downloading profiles.json from $URL"
        raw=$(curl -fsSL "$URL")
        
        # Debug: Show the structure of profiles.json
        echo "📊 profiles.json structure contains these keys:"
        echo "$raw" | jq -r 'keys'
        echo "📝 Checking for router ID: ${{ inputs.router_id }}"
        
        # Debug: Check if router ID exists in profiles
        if echo "$raw" | jq -e --arg id "${{ inputs.router_id }}" '.profiles[$id]' >/dev/null; then
          echo "✅ Router ID '${{ inputs.router_id }}' found in profiles.json"
        else
          echo "⚠️ Router ID not found with direct key access, trying to check all profile keys..."
          echo "$raw" | jq -r '.profiles | keys[]' | grep -i "${{ inputs.router_id }}" || echo "No matching profile found"
        fi

        # Pull out all the top-level fields from profiles.json
        arch=$(echo "$raw" | jq -r '.arch_packages')
        defaults=$(echo "$raw" | jq -r '.default_packages | join(",")')
        meta=$(echo "$raw" | jq -r '.metadata_version')
        source_date_epoch=$(echo "$raw" | jq -r '.source_date_epoch // "unknown"')
        lin_rel=$(echo "$raw" | jq -r '.linux_kernel.release // "unknown"')
        lin_ver=$(echo "$raw" | jq -r '.linux_kernel.version // "unknown"')
        lin_vmg=$(echo "$raw" | jq -r '.linux_kernel.vermagic // "unknown"')
        
        # Fix: Access the specific profile using .profiles object key syntax
        prof=$(echo "$raw" \
          | jq -c --arg id "${{ inputs.router_id }}" \
               '.profiles[$id] // empty')
               
        # If the profile is empty, log error but don't fail
        if [ -z "$prof" ] || [ "$prof" = "null" ]; then
          echo "⚠️ Could not find profile for ${{ inputs.router_id }} in profiles.json"
          echo "Available profiles (first 10):"
          echo "$raw" | jq -r '.profiles | keys[]' | head -10
          echo "...and more"
          # Create empty object as fallback
          prof="{}"
          dev_pkgs=""
        else
          # Extract device packages as comma-separated list
          dev_pkgs=$(echo "$prof" | jq -r '.device_packages | join(",") // ""')
          
          # Extract image prefix
          image_prefix=$(echo "$prof" | jq -r '.image_prefix // ""')
          
          # Extract supported image types
          supported_types=$(echo "$prof" | jq -r '.images[] | .type' | sort | uniq | tr '\n' ',' | sed 's/,$//')
          
          # Extract supported filesystems from image names
          supported_fs=$(echo "$prof" | jq -r '.images[] | .filesystem' | sort | uniq | tr '\n' ',' | sed 's/,$//')
          
          # Detect if device uses UBI - First try profiles.json approach
          uses_ubi="false"
          if echo "$prof" | jq -r '.images[] | .name' | grep -q "ubi"; then
            uses_ubi="true"
            echo "✅ UBI filesystem detected from image names in profiles.json"
          elif echo "$prof" | jq -r '.images[] | .filesystem' | grep -q "ubifs"; then
            uses_ubi="true"
            echo "✅ UBIFS filesystem detected in profiles.json"
          else
            echo "ℹ️ No UBI/UBIFS indicators found in profiles.json"
          fi
          
          # Display the profile for our router
          echo "📱 Router profile details from profiles.json:"
          echo "$prof" | jq '.'
          
          # Display supported image types
          echo "📷 Supported firmware image types: $supported_types"
          echo "📂 Supported filesystems: $supported_fs"
          echo "🗄️ Uses UBI: $uses_ubi"
          
          # Verify sysupgrade is supported
          if echo "$supported_types" | grep -q "sysupgrade"; then
            echo "✅ 'sysupgrade' firmware type is supported for this device"
          else
            echo "⚠️ WARNING: 'sysupgrade' firmware type does NOT appear to be supported for this device!"
            echo "⚠️ Available types are: $supported_types"
          fi
        fi

        # Export to GitHub Actions outputs
        echo "arch_packages=$arch" >> "$GITHUB_OUTPUT"
        echo "default_packages=$defaults" >> "$GITHUB_OUTPUT"
        echo "metadata_version=$meta" >> "$GITHUB_OUTPUT"
        echo "source_date_epoch=$source_date_epoch" >> "$GITHUB_OUTPUT"
        echo "linux_kernel_release=$lin_rel" >> "$GITHUB_OUTPUT"
        echo "linux_kernel_version=$lin_ver" >> "$GITHUB_OUTPUT"
        echo "linux_kernel_vermagic=$lin_vmg" >> "$GITHUB_OUTPUT"
        echo "device_packages=$dev_pkgs" >> "$GITHUB_OUTPUT"
        echo "image_prefix=$image_prefix" >> "$GITHUB_OUTPUT"
        echo "supported_image_types=$supported_types" >> "$GITHUB_OUTPUT"
        echo "supported_filesystems=$supported_fs" >> "$GITHUB_OUTPUT"
        echo "uses_ubi=$uses_ubi" >> "$GITHUB_OUTPUT"
        
        # Store profile JSON in a way that's compatible with multiline outputs
        echo "profile_json<<EOF" >> "$GITHUB_OUTPUT"
        echo "$prof"
        echo "EOF" >> "$GITHUB_OUTPUT"
        
        # Debug - print to verify what's being set
        echo "DEBUG: Set arch_packages output to: $arch"
        echo "DEBUG: Set default_packages output to: $defaults"
        echo "DEBUG: Set device_packages output to: $dev_pkgs"
        
        # Make sure this information is available for later steps
        mkdir -p /tmp/openwrt_info/
        echo "$arch" > /tmp/openwrt_info/arch_packages.txt
        echo "$defaults" > /tmp/openwrt_info/default_packages.txt
        echo "$dev_pkgs" > /tmp/openwrt_info/device_packages.txt
        echo "$prof" > /tmp/openwrt_info/profile.json
        echo "$supported_types" > /tmp/openwrt_info/supported_image_types.txt
        echo "$supported_fs" > /tmp/openwrt_info/supported_filesystems.txt
        echo "$uses_ubi" > /tmp/openwrt_info/uses_ubi.txt
        
        # Also write out combined outputs file for debugging
        echo "{\"target\":\"$(cat /tmp/openwrt_target.txt)\",\"arch_packages\":\"$arch\",\"default_packages\":\"$defaults\",\"device_packages\":\"$dev_pkgs\",\"supported_image_types\":\"$supported_types\",\"supported_filesystems\":\"$supported_fs\",\"uses_ubi\":\"$uses_ubi\"}" > /tmp/openwrt_info/outputs.json
