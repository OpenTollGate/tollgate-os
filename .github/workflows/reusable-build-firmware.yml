name: Reusable Firmware Build

on:
  workflow_call:
    inputs:
      device_id:
        description: 'Device ID to build firmware for'
        type: string
        required: true
      device_name:
        description: 'User-friendly device name'
        type: string
        required: false
      platform:
        description: 'Device platform'
        type: string
        required: false
      firmware_type:
        description: 'Type of firmware to build'
        default: 'all'
        type: string
        required: false
      version:
        description: 'OpenWRT version'
        default: '23.05.5'
        type: string
        required: false
    secrets:
      NOSTR_SECRET_KEY:
        required: true
      NOSTR_PUBLIC_KEY:
        required: true
      NSECBECH:
        required: true
      NSEC:
        required: true
    outputs:
      build_success:
        description: 'Whether the build succeeded'
        value: ${{ jobs.build.outputs.success }}
      firmware_path:
        description: 'Path to the built firmware'
        value: ${{ jobs.build.outputs.firmware_path }}

jobs:
  build:
    runs-on: ubuntu-22.04
    name: Build firmware for ${{ inputs.device_name || inputs.device_id }}
    outputs:
      success: ${{ steps.build-status.outputs.success }}
      firmware_path: ${{ steps.build-openwrt-image.outputs.firmware_path }}
      
    steps:
      - uses: actions/checkout@v4
      
      # Set build status to track success/failure
      - name: Initialize build status
        id: build-status
        run: echo "success=false" >> $GITHUB_OUTPUT
      
      # Download OpenWrt profiles for each target platform
      - name: Fetch OpenWrt profiles
        run: |
          echo "===== FETCHING OPENWRT PROFILES ====="
          mkdir -p external_profiles/${{ inputs.version }}
          
          # Find and verify existing profiles
          echo "Device search file contents:"
          grep -i "${{ inputs.device_id }}" external_profiles/${{ inputs.version }}/device-search.txt || echo "Device not found in search file"
      
      # Add debug information about the OS environment before building
      - name: Debug environment
        run: |
          echo "===== BUILD ENVIRONMENT DEBUG ====="
          echo "OS: $(uname -a)"
          echo "Available memory: $(free -h)"
          echo "Available disk space: $(df -h)"
          
          # Search for the model in profiles.json files
          echo "===== SEARCHING FOR ROUTER PROFILE: ${{ inputs.device_id }} ====="
          MODEL_FOUND=0
          
          for PROFILE_PATH in $(find external_profiles -name "profiles.json"); do
            if jq -e --arg model "${{ inputs.device_id }}" '.profiles | has($model)' "$PROFILE_PATH" > /dev/null 2>&1; then
              MODEL_FOUND=1
              echo "✅ Found profile in: $PROFILE_PATH"
              
              # Extract platform and type from path
              REL_PATH=${PROFILE_PATH#external_profiles/}
              PARTS=($(echo "$REL_PATH" | tr '/' ' '))
              VERSION=${PARTS[0]}
              PLATFORM=${PARTS[1]}
              TYPE=${PARTS[2]}
              
              echo "✅ Version: $VERSION, Platform: $PLATFORM, Type: $TYPE"
              
              # Extract available image types for this device
              AVAILABLE_TYPES=$(jq -r --arg p "${{ inputs.device_id }}" '.profiles[$p].images | map(.type) | unique | join(", ")' "$PROFILE_PATH")
              echo "✅ Available image types: $AVAILABLE_TYPES"
              
              # Show device information from profile
              DEVICE_VENDOR=$(jq -r --arg p "${{ inputs.device_id }}" '.profiles[$p].titles[0].vendor // "unknown"' "$PROFILE_PATH")
              DEVICE_MODEL=$(jq -r --arg p "${{ inputs.device_id }}" '.profiles[$p].titles[0].model // "unknown"' "$PROFILE_PATH")
              echo "📌 Device: $DEVICE_VENDOR $DEVICE_MODEL"
              
              # Set environment variables for later steps
              echo "DEVICE_VENDOR=$DEVICE_VENDOR" >> $GITHUB_ENV
              echo "DEVICE_MODEL=$DEVICE_MODEL" >> $GITHUB_ENV
              echo "ARCH=$(jq -r '.arch_packages // "unknown"' "$PROFILE_PATH")" >> $GITHUB_ENV
              
              break
            fi
          done
          
          if [ $MODEL_FOUND -eq 0 ]; then
            echo "❌ ERROR: Could not find router profile for '${{ inputs.device_id }}'"
            echo "❌ Please check the device ID and ensure it matches the OpenWrt naming convention"
            exit 1
          fi
      
      - name: Build OpenWRT Image
        id: build-openwrt-image
        uses: ./actions/build-firmware
        with:
          model: ${{ inputs.device_id }}
          nostr_secret_key: ${{ secrets.NOSTR_SECRET_KEY }}
          nostr_public_key: ${{ secrets.NOSTR_PUBLIC_KEY }}
          files_path: "./files"
          nsecbech: ${{ secrets.NSECBECH }}
          nsec: ${{ secrets.NSEC }}
          firmware_type: ${{ inputs.firmware_type || 'all' }}
      
      # Add a step to collect and display build logs if available
      - name: Collect build logs
        if: always()
        run: |
          echo "===== BUILD LOGS COLLECTION ====="
          # Create a directory for the logs
          mkdir -p build_logs
          
          # Try to find and copy any logs from the build process
          find /tmp/openwrt-build -name "*.txt" -o -name "*.log" -type f | while read file; do
            echo "Found log file: $file"
            cp "$file" build_logs/ || echo "Failed to copy $file"
          done
          
          # If there are no log files, create a placeholder
          if [ ! "$(ls -A build_logs)" ]; then
            echo "No log files found in /tmp/openwrt-build"
            echo "Build process did not generate expected log files" > build_logs/no_logs_found.txt
          fi
      
      # Extract Firmware Types Information
      - name: Extract Firmware Types Information
        id: firmware-types
        run: |
          # Parse the all_firmware_paths JSON to get image types
          ALL_PATHS='${{ steps.build-openwrt-image.outputs.all_firmware_paths }}'
          echo "ALL_PATHS JSON: $ALL_PATHS"
          
          if [ -z "$ALL_PATHS" ] || [ "$ALL_PATHS" = "null" ]; then
            echo "⚠️ No firmware paths returned from build process"
            exit 1
          fi
          
          AVAILABLE_TYPES=$(echo "$ALL_PATHS" | jq -r 'keys | join(", ")')
          echo "Available firmware types: $AVAILABLE_TYPES"
          echo "available_types=$AVAILABLE_TYPES" >> $GITHUB_OUTPUT
          
          # Create directory for all firmware files
          mkdir -p firmware_files
          
          # Extract filesystem paths from the JSON and copy them
          echo "$ALL_PATHS" | jq -r 'to_entries | .[] | .value.path' | while read -r filepath; do
            if [ -f "$filepath" ]; then
              cp "$filepath" firmware_files/
              echo "Copied $(basename "$filepath") to firmware_files/"
            else
              echo "Warning: File $filepath not found"
            fi
          done
          
          # Create a manifest file with build information
          echo "# Build Information" > firmware_files/manifest.txt
          echo "Device: ${{ inputs.device_name || inputs.device_id }}" >> firmware_files/manifest.txt
          echo "Architecture: ${ARCH}" >> firmware_files/manifest.txt
          echo "OpenWrt Version: ${{ inputs.version }}" >> firmware_files/manifest.txt
          echo "Build Date: $(date)" >> firmware_files/manifest.txt
          echo "" >> firmware_files/manifest.txt
          echo "## Firmware Files" >> firmware_files/manifest.txt
          find firmware_files -type f -not -name "manifest.txt" | sort | while read -r file; do
            echo "- $(basename "$file")" >> firmware_files/manifest.txt
          done
      
      # Upload all firmware files as a single artifact 
      - name: Upload All Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ inputs.device_id }}
          path: firmware_files/
          retention-days: 30
      
      - name: Upload Base OpenWrt Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware-base-${{ inputs.device_id }}
          path: |
            firmware_files/*openwrt-*${{ inputs.device_id }}*sysupgrade.bin
            firmware_files/*openwrt-*${{ inputs.device_id }}*factory*
          retention-days: 5

      - name: Upload TollGate Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware-tollgate-${{ inputs.device_id }}
          path: |
            firmware_files/*openwrt-*${{ inputs.device_id }}*tollgate*sysupgrade.bin
            firmware_files/*openwrt-*${{ inputs.device_id }}*tollgate*factory*
          retention-days: 5

      # Upload each firmware type to Blossom and publish metadata
      - name: Upload Multiple Firmware Types
        id: multi-upload
        run: |
          # Parse the JSON from the build output
          ALL_PATHS='${{ steps.build-openwrt-image.outputs.all_firmware_paths }}'
          
          # Process each firmware type
          echo "$ALL_PATHS" | jq -r 'to_entries | .[] | @json' | while read -r json_entry; do
            # Extract information from the JSON entry
            TYPE=$(echo "$json_entry" | jq -r '.key')
            FILE_PATH=$(echo "$json_entry" | jq -r '.value.path')
            FILE_NAME=$(echo "$json_entry" | jq -r '.value.name')
            FILE_HASH=$(echo "$json_entry" | jq -r '.value.hash')
            FILE_SIZE=$(echo "$json_entry" | jq -r '.value.size')
            
            echo "Processing $TYPE firmware: $FILE_NAME"
            
            if [ -f "$FILE_PATH" ]; then
              echo "✅ Found file: $FILE_PATH"
              
              # Only upload and publish sysupgrade type
              if [ "$TYPE" = "sysupgrade" ]; then
                UPLOADER="/home/runner/work/tollgate-os/tollgate-os/actions/update-from-nip94/blossom-uploader"
                if [ -x "$UPLOADER" ]; then
                  echo "📤 Uploading sysupgrade firmware to Blossom..."
                  # Perform upload using the CLI tool (if needed)
                  UPLOAD_RESULT=$(cd /tmp && \
                    NSEC="${{ secrets.NSECBECH }}" \
                    "$UPLOADER" \
                    -f "$FILE_PATH" \
                    -u "https://blossom.swissdash.site")
                  echo "Upload result: $UPLOAD_RESULT"
                  # Extract URL and hash from the JSON result
                  BLOSSOM_URL=$(echo "$UPLOAD_RESULT" | jq -r '.url')
                  BLOSSOM_HASH=$(echo "$UPLOAD_RESULT" | jq -r '.hash')
                  if [ -n "$BLOSSOM_URL" ] && [ "$BLOSSOM_URL" != "null" ]; then
                    echo "✅ Uploaded sysupgrade firmware to $BLOSSOM_URL"
                    # Publish NIP-94 metadata
                    echo "📝 Publishing NIP-94 metadata for sysupgrade firmware..."
                    python3 /home/runner/work/tollgate-os/tollgate-os/actions/update-from-nip94/publish_metadata.py \
                      --relays "${{ inputs.nostr_relays }}" \
                      --url "$BLOSSOM_URL" \
                      --mime-type "application/octet-stream" \
                      --file-hash "$BLOSSOM_HASH" \
                      --original-hash "$FILE_HASH" \
                      --filename "$FILE_NAME" \
                      --content "TollGate OS sysupgrade firmware for ${{ env.DEVICE_VENDOR }} ${{ env.DEVICE_MODEL }} (${{ inputs.device_id }}, OpenWRT ${{ inputs.version }})" \
                      --nsec "${{ secrets.NSEC }}" \
                      --size "$FILE_SIZE" \
                      --architecture "${{ env.ARCH }}" \
                      --model "${{ inputs.device_id }}" \
                      --version "${{ inputs.version }}" \
                      --firmware-type "$TYPE"
                    echo "✅ Published metadata for sysupgrade firmware"
                  else
                    echo "❌ Failed to upload sysupgrade firmware"
                  fi
                else
                  echo "⚠️ Blossom uploader not found at $UPLOADER, skipping upload."
                fi
              else
                echo "ℹ️ Skipping upload for $TYPE firmware (only sysupgrade is processed)"
              fi
            else
              echo "⚠️ File not found: $FILE_PATH"
            fi
          done
      
      # Mark the build as successful
      - name: Set build success status
        id: build-success
        if: success()
        run: echo "success=true" >> $GITHUB_OUTPUT
        
      # Set the job output to capture build success
      - name: Set job outputs
        id: build-status
        if: always()
        run: |
          if [ -f "firmware_files/*" ]; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
          fi