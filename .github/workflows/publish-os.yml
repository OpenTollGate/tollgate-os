name: Build and Publish TollGate OS

on:
  workflow_dispatch:
    inputs:
      override_tollgate_wrt_version:
        description: 'Version override tollgate-wrt package'
        required: false
        type: string
      override_tollgate_wrt_author:
        description: 'Author pubkey override tollgate-wrt package'
        required: false
        type: string
      full_compression:
        description: 'Build all UPX compression variants (overrides the branch gate)'
        type: boolean
        default: false
  repository_dispatch:
    types: [build-os]
  # push:

## Add global env vars for the whole workflow
env:
  DEBUG: "true"

jobs:
  define-matrix:
    runs-on: ubuntu-latest
    needs: [determine-versioning]
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Install nak
        shell: bash
        run: |
          echo "Downloading nak for linux-amd64..."
          curl -L "https://github.com/fiatjaf/nak/releases/download/v0.16.2/nak-v0.16.2-linux-amd64" -o /usr/local/bin/nak
          chmod +x /usr/local/bin/nak
          nak --version

      - id: set-matrix
        shell: bash
        env:
          RELAYS: "wss://relay.damus.io wss://nos.lol wss://nostr.mom wss://relay.tollgate.me"
        run: |
          # Set GITHUB_OUTPUT to a temp file if not running in GitHub Actions
          : ${GITHUB_OUTPUT:=/tmp/github_output}
          
          PACKAGE_VERSION="${{ needs.determine-versioning.outputs.tollgate_wrt_version }}"
          PACKAGE_AUTHOR="${{ needs.determine-versioning.outputs.tollgate_wrt_author }}"
          
          echo "ℹ️ Discovering available packages for version $PACKAGE_VERSION"
          
          # Fetch all packages for this version and author
          EVENTS=$(nak req -k 1063 \
            -a "$PACKAGE_AUTHOR" \
            --tag n=tollgate-wrt \
            --tag v="$PACKAGE_VERSION" \
            $RELAYS | jq -s '.')
          
          # Base device configurations.
          #
          # 'format' selects which basic-go artifact to install on top of
          # the image:
          #   ipk -> OpenWrt 24.x and older (opkg, tar-gz wrapper)
          #   apk -> OpenWrt 25.x and newer (apk-tools v3, ADB format)
          #
          # apk coverage in basic-go today is mediatek-filogic only, so
          # only the cortex-a53 devices have a 25.x row. Add other
          # archs here once basic-go publishes apks for them.
          DEVICES='[
            {"device_id": "glinet_gl-mt3000",     "openwrt_version": "24.10.4", "format": "ipk"},
            {"device_id": "glinet_gl-mt6000",     "openwrt_version": "24.10.4", "format": "ipk"},
            {"device_id": "glinet_gl-ar300m16",   "openwrt_version": "24.10.4", "format": "ipk"},
            {"device_id": "glinet_gl-ar300m-nor", "openwrt_version": "24.10.4", "format": "ipk"},
            {"device_id": "dlink_covr-x1860-a1",  "openwrt_version": "24.10.4", "format": "ipk"},
            {"device_id": "ubnt_unifiac-pro",     "openwrt_version": "24.10.4", "format": "ipk"},

            {"device_id": "glinet_gl-mt3000",     "openwrt_version": "25.12.2", "format": "apk"},
            {"device_id": "glinet_gl-mt6000",     "openwrt_version": "25.12.2", "format": "apk"},
            {"device_id": "comfast_cf-wr632ax",   "openwrt_version": "25.12.2", "format": "apk"}
          ]'
          
          # For each device, get its architecture and find available compressions
          MATRIX_ITEMS="[]"
          
          for device_json in $(echo "$DEVICES" | jq -c '.[]'); do
            DEVICE_ID=$(echo "$device_json" | jq -r '.device_id')
            OPENWRT_VERSION=$(echo "$device_json" | jq -r '.openwrt_version')
            FORMAT=$(echo "$device_json" | jq -r '.format')

            echo "ℹ️ Processing device: $DEVICE_ID (OpenWrt $OPENWRT_VERSION, .$FORMAT)"

            # Get device architecture
            all_targets=$(curl -s "https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/.overview.json")
            current_target=$(echo "$all_targets" | jq -r --arg device "$DEVICE_ID" '.profiles[] | select(.id == $device) | .target')

            if [ -z "$current_target" ] || [ "$current_target" = "null" ]; then
              echo "⚠️  Device ID '$DEVICE_ID' not found in OpenWrt $OPENWRT_VERSION overview, skipping"
              continue
            fi

            target_profiles=$(curl -s "https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${current_target}/profiles.json")
            architecture=$(echo "$target_profiles" | jq -r '.arch_packages')

            echo "  Architecture: $architecture"

            # Find compressions available for this (architecture, format).
            # Filter on both single-letter A (architecture) and multi-letter
            # 'format' tags client-side — relays don't index multi-letter
            # tag names per NIP-01.
            ARCH_COMPRESSIONS=$(echo "$EVENTS" | jq -r --arg arch "$architecture" --arg fmt "$FORMAT" '
              [ .[]
                | select(.tags[] | select(.[0] == "A" and .[1] == $arch))
                | select(.tags[] | select(.[0] == "format" and .[1] == $fmt))
                | .tags[] | select(.[0] == "compression") | .[1]
              ] | unique | .[]
            ')

            if [ -z "$ARCH_COMPRESSIONS" ]; then
              echo "  ⚠️  No .${FORMAT} packages found for architecture $architecture"
              continue
            fi

            echo "  Available compressions (.${FORMAT}): $(echo "$ARCH_COMPRESSIONS" | tr '\n' ' ')"

            # Add device + compression combinations to matrix
            for compression in $ARCH_COMPRESSIONS; do
              MATRIX_ITEMS=$(echo "$MATRIX_ITEMS" | jq \
                --arg device "$DEVICE_ID" \
                --arg version "$OPENWRT_VERSION" \
                --arg fmt "$FORMAT" \
                --arg comp "$compression" \
                '. + [{device_id: $device, openwrt_version: $version, format: $fmt, compression: $comp}]')
            done
          done
          
          MATRIX=$(echo "{\"include\": $MATRIX_ITEMS}")

          # Compression gate (mirrors basic-go's gate). UPX variants are
          # expensive — each compressed cell builds a full firmware. Keep
          # them on shipped artifacts only:
          #   - push to main
          #   - tags matching v*
          #   - any pull_request event
          #   - workflow_dispatch with full_compression=true
          # Branch pushes get only the uncompressed (compression=none)
          # cells. The override_tollgate_wrt_version input is unaffected:
          # it picks which basic-go version to install, not how many OS
          # firmware variants to produce.
          if [[ "${{ github.event.inputs.full_compression }}" == "true" ]]; then
            echo "ℹ️ full_compression=true — keeping all variants."
          elif [[ "$GITHUB_REF" != "refs/heads/main" \
               && "$GITHUB_REF" != refs/tags/v* \
               && "$GITHUB_EVENT_NAME" != "pull_request" \
               && "$GITHUB_EVENT_NAME" != "repository_dispatch" ]]; then
            echo "ℹ️ Non-release ref ($GITHUB_REF, event=$GITHUB_EVENT_NAME) — dropping compression variants."
            MATRIX=$(echo "$MATRIX" | jq '{include: [.include[] | select(.compression == "none")]}')
          fi

          echo "ℹ️ Final matrix:"
          echo "$MATRIX" | jq .

          # Create a properly escaped JSON for GitHub output
          echo "matrix=$(echo "$MATRIX" | jq -c .)" >> $GITHUB_OUTPUT

  determine-versioning:
    runs-on: ubuntu-latest
    outputs:
      os_version: ${{ steps.determine-os-version.outputs.os_version }}
      release_channel: ${{ steps.determine-package-version.outputs.release_channel }}
      tollgate_wrt_version: ${{ steps.determine-package-version.outputs.tollgate_wrt_version }}
      tollgate_wrt_author: ${{ steps.determine-package-version.outputs.tollgate_wrt_author }}
      tollgate_wrt_compression: ${{ steps.determine-package-version.outputs.tollgate_wrt_compression }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0 # Required for commit height
          
      - id: commit-hash
        shell: bash
        run: |
          : ${GITHUB_OUTPUT:=/tmp/github_output}
          # Get short commit hash directly instead of using an action
          SHORT_HASH=$(git rev-parse --short HEAD)
          echo "short=$SHORT_HASH" >> $GITHUB_OUTPUT

      - name: Set os_version variable
        id: determine-os-version
        shell: bash
        run: |
          # Set GITHUB_OUTPUT to a temp file if not running in GitHub Actions
          : ${GITHUB_OUTPUT:=/tmp/github_output}
          
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            # If this is a tag push, use the tag name (vX.X.X)
            echo "os_version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            # If this is a branch push, use [branch].[height].[hash] format
            # Sanitize branch name by replacing forward slashes with hyphens
            SANITIZED_BRANCH_NAME=$(echo "${GITHUB_REF_NAME}" | sed 's/\//-/g')
            COMMIT_HEIGHT=$(git rev-list --count HEAD)
            echo "os_version=${SANITIZED_BRANCH_NAME}.${COMMIT_HEIGHT}.${{ steps.commit-hash.outputs.short }}" >> $GITHUB_OUTPUT
          fi
        
      - name: Read packages.json and determine package config
        id: determine-package-version
        shell: bash
        run: |
          : ${GITHUB_OUTPUT:=/tmp/github_output}
          
          # Read packages.json
          if [ ! -f "packages.json" ]; then
            echo "❌ packages.json not found"
            exit 1
          fi
          
          # Extract tollgate-wrt config from packages.json
          PACKAGES_VERSION=$(jq -r '.packages."tollgate-wrt".version' packages.json)
          PACKAGES_AUTHOR=$(jq -r '.packages."tollgate-wrt".author' packages.json)
          PACKAGES_COMPRESSION=$(jq -r '.packages."tollgate-wrt".compression // "none"' packages.json)
          
          if [ -z "$PACKAGES_VERSION" ] || [ "$PACKAGES_VERSION" = "null" ]; then
            echo "❌ tollgate-wrt version not found in packages.json"
            exit 1
          fi
          
          if [ -z "$PACKAGES_AUTHOR" ] || [ "$PACKAGES_AUTHOR" = "null" ]; then
            echo "❌ tollgate-wrt author not found in packages.json"
            exit 1
          fi
          
          echo "ℹ️ packages.json config:"
          echo "  Version: $PACKAGES_VERSION"
          echo "  Author: $PACKAGES_AUTHOR"
          echo "  Compression: $PACKAGES_COMPRESSION"
          
          # Determine version (with override support from workflow_dispatch or repository_dispatch)
          OVERRIDE_VERSION="${{ inputs.override_tollgate_wrt_version || github.event.client_payload.override_tollgate_wrt_version }}"
          if [ -n "$OVERRIDE_VERSION" ]; then
            FINAL_VERSION="$OVERRIDE_VERSION"
            echo "ℹ️ Using override version: $FINAL_VERSION"
          elif [[ $GITHUB_REF == refs/tags/* ]]; then
            # If building a tag, use the same version for the package
            FINAL_VERSION="${GITHUB_REF_NAME}"
            echo "ℹ️ Using version from OS tag: $FINAL_VERSION"
          else
            # Use version from packages.json
            FINAL_VERSION="$PACKAGES_VERSION"
            echo "ℹ️ Using version from packages.json: $FINAL_VERSION"
          fi
          
          # Determine author (with override support from workflow_dispatch or repository_dispatch)
          OVERRIDE_AUTHOR="${{ inputs.override_tollgate_wrt_author || github.event.client_payload.override_tollgate_wrt_author }}"
          if [ -n "$OVERRIDE_AUTHOR" ]; then
            FINAL_AUTHOR="$OVERRIDE_AUTHOR"
            echo "ℹ️ Using override author: $FINAL_AUTHOR"
          else
            FINAL_AUTHOR="$PACKAGES_AUTHOR"
            echo "ℹ️ Using author from packages.json: $FINAL_AUTHOR"
          fi
          
          # Determine release channel from package version
          if [[ $FINAL_VERSION =~ ^v[0-9]+\.[0-9]+\.[0-9]+-alpha ]]; then
            RELEASE_CHANNEL="alpha"
          elif [[ $FINAL_VERSION =~ ^v[0-9]+\.[0-9]+\.[0-9]+-beta ]]; then
            RELEASE_CHANNEL="beta"
          elif [[ $FINAL_VERSION =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            RELEASE_CHANNEL="stable"
          else
            RELEASE_CHANNEL="dev"
          fi
          
          echo "tollgate_wrt_version=$FINAL_VERSION" >> $GITHUB_OUTPUT
          echo "tollgate_wrt_author=$FINAL_AUTHOR" >> $GITHUB_OUTPUT
          echo "tollgate_wrt_compression=$PACKAGES_COMPRESSION" >> $GITHUB_OUTPUT
          echo "release_channel=$RELEASE_CHANNEL" >> $GITHUB_OUTPUT
          
          echo "✅ Final package config:"
          echo "  Version: $FINAL_VERSION"
          echo "  Author: $FINAL_AUTHOR"
          echo "  Compression: $PACKAGES_COMPRESSION"
          echo "  Release Channel: $RELEASE_CHANNEL"

  build-firmware:
    needs: [determine-versioning, define-matrix]
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.define-matrix.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Initialize
        run: |
          # Add compression suffix to firmware filename
          if [ "${{ matrix.compression }}" != "none" ]; then
            COMPRESSION_SUFFIX="-${{ matrix.compression }}"
          else
            COMPRESSION_SUFFIX=""
          fi
          FIRMWARE_FILENAME=tollgate-os-${{ matrix.device_id }}-${{ needs.determine-versioning.outputs.tollgate_wrt_version }}${COMPRESSION_SUFFIX}.bin
          echo "FIRMWARE_FILENAME=$FIRMWARE_FILENAME" >> $GITHUB_ENV

      - name: Get device architecture
        shell: bash
        run: |
          echo "ℹ️ Fetching target based on device id"
          all_targets=$(curl -s https://downloads.openwrt.org/releases/${{ matrix.openwrt_version }}/.overview.json)
        
          current_target=$(echo "$all_targets" | jq -r --arg device "${{ matrix.device_id }}" '.profiles[] | select(.id == $device) | .target')
          
          if [ -z "$current_target" ] || [ "$current_target" = "null" ]; then
            echo "::error::Device ID '${{ matrix.device_id }}' not found"
            exit 1
          fi
          
          target_profiles=$(curl -s https://downloads.openwrt.org/releases/${{ matrix.openwrt_version }}/targets/${current_target}/profiles.json)
          architecture=$(echo "$target_profiles" | jq -r '.arch_packages')
          
          echo "DEVICE_ARCHITECTURE=$architecture" >> $GITHUB_ENV
          echo "ℹ️ Device architecture: $architecture"

      - name: Install nak
        shell: bash
        run: |
          echo "Downloading nak for linux-amd64..."
          curl -L "https://github.com/fiatjaf/nak/releases/download/v0.16.2/nak-v0.16.2-linux-amd64" -o /usr/local/bin/nak
          chmod +x /usr/local/bin/nak
          nak --version

      - name: Fetch tollgate-wrt package from Nostr
        shell: bash
        env:
          RELAYS: "wss://relay.damus.io wss://nos.lol wss://nostr.mom wss://relay.tollgate.me"
        run: |
          PACKAGE_VERSION="${{ needs.determine-versioning.outputs.tollgate_wrt_version }}"
          PACKAGE_AUTHOR="${{ needs.determine-versioning.outputs.tollgate_wrt_author }}"
          PACKAGE_COMPRESSION="${{ matrix.compression }}"
          PACKAGE_FORMAT="${{ matrix.format }}"
          ARCHITECTURE="${{ env.DEVICE_ARCHITECTURE }}"

          echo "ℹ️ Searching for tollgate-wrt package:"
          echo "  Version: $PACKAGE_VERSION"
          echo "  Author: $PACKAGE_AUTHOR"
          echo "  Architecture: $ARCHITECTURE"
          echo "  Compression: $PACKAGE_COMPRESSION"
          echo "  Format: .$PACKAGE_FORMAT"
          
          # Search for NIP-94 events with matching author, version, and architecture
          # Using kind 1063 (file metadata), filtering by package name, version, architecture, and author pubkey
          EVENTS=$(nak req -k 1063 \
            -a "$PACKAGE_AUTHOR" \
            --tag n=tollgate-wrt \
            --tag v="$PACKAGE_VERSION" \
            --tag A="$ARCHITECTURE" \
            $RELAYS | jq -s '.')
          
          if [ "$(echo "$EVENTS" | jq 'length')" -eq 0 ]; then
            echo "❌ No package found for:"
            echo "  Author: $PACKAGE_AUTHOR"
            echo "  Version: $PACKAGE_VERSION"
            echo "  Architecture: $ARCHITECTURE"
            exit 1
          fi
          
          # Post-receive filter for compression and format. Nostr relays
          # only index single-letter tag names (NIP-01) so 'compression'
          # and 'format' must be filtered client-side. The format choice
          # comes from the matrix entry — ipk for OpenWrt 24.x devices,
          # apk for 25.x — because basic-go publishes both for the same
          # (arch, compression) and the image builder per OpenWrt version
          # consumes only one.
          FILTERED_EVENTS=$(echo "$EVENTS" \
            | jq --arg comp "$PACKAGE_COMPRESSION" --arg fmt "$PACKAGE_FORMAT" '
              [ .[] |
                select(.tags[] | select(.[0] == "compression" and .[1] == $comp)) |
                select(.tags[] | select(.[0] == "format" and .[1] == $fmt))
              ]')

          if [ "$(echo "$FILTERED_EVENTS" | jq 'length')" -eq 0 ]; then
            echo "❌ No .$PACKAGE_FORMAT package found with compression type: $PACKAGE_COMPRESSION"
            echo "ℹ️ Available (compression, format) pairs for this version+arch:"
            echo "$EVENTS" | jq -r '.[] | [(.tags[] | select(.[0] == "compression") | .[1]), (.tags[] | select(.[0] == "format") | .[1]) // "unknown"] | "  - \(.[0]) (\(.[1]))"' | sort -u
            exit 1
          fi
          
          # Get the first matching event
          EVENT=$(echo "$FILTERED_EVENTS" | jq '.[0]')
          
          # Extract download URL and hash
          PACKAGE_URL=$(echo "$EVENT" | jq -r '.tags[] | select(.[0] == "url") | .[1]')
          PACKAGE_HASH=$(echo "$EVENT" | jq -r '.tags[] | select(.[0] == "x") | .[1]')
          PACKAGE_FILENAME=$(echo "$EVENT" | jq -r '.tags[] | select(.[0] == "filename") | .[1]')
          
          echo "✅ Found package:"
          echo "  URL: $PACKAGE_URL"
          echo "  Hash: $PACKAGE_HASH"
          echo "  Filename: $PACKAGE_FILENAME"
          
          # Download the package
          mkdir -p ./custom-packages
          curl -L -o "./custom-packages/$PACKAGE_FILENAME" "$PACKAGE_URL"
          
          # Verify hash
          DOWNLOADED_HASH=$(sha256sum "./custom-packages/$PACKAGE_FILENAME" | cut -d' ' -f1)
          if [ "$DOWNLOADED_HASH" != "$PACKAGE_HASH" ]; then
            echo "❌ Hash mismatch! Expected: $PACKAGE_HASH, Got: $DOWNLOADED_HASH"
            exit 1
          fi
          
          echo "✅ Package downloaded and verified"

          # apk-tools resolves index entries by the canonical Alpine
          # filename "<name>-<version>.apk". basic-go names artifacts
          # "<name>_<branch_version>_<arch>[-<comp>].apk", which the
          # imagebuilder's mkndx step indexes by the package's internal
          # version but then can't find on disk -> "package mentioned
          # in index not found". Rename to canonical form here.
          #
          # Mirror basic-go/packaging/normalize-apk-version.sh:
          #   release tag (vN.N.N[-(alpha|beta|rc|pre)N]) -> N.N.N[_xxx]-r0
          #   anything else                                -> 0.0.0_git<HEIGHT>-r0
          # where HEIGHT is the second dot-segment of PACKAGE_VERSION
          # (i.e. branch.height.sha).
          if [ "$PACKAGE_FORMAT" = "apk" ]; then
            stripped="${PACKAGE_VERSION#v}"
            if printf '%s' "$stripped" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc|pre)[0-9]*)?$'; then
              apk_version=$(printf '%s' "$stripped" \
                | sed -e 's/-alpha/_alpha/g' \
                      -e 's/-beta/_beta/g'   \
                      -e 's/-rc/_rc/g'       \
                      -e 's/-pre/_pre/g')-r0
            else
              build_nr=$(printf '%s' "$stripped" | sed -n 's/^[^.]*\.\([0-9][0-9]*\)\..*/\1/p')
              if [ -n "$build_nr" ]; then
                apk_version="0.0.0_git${build_nr}-r0"
              else
                apk_version="0.0.0-r0"
              fi
            fi
            canonical="tollgate-wrt-${apk_version}.apk"
            echo "ℹ️ Renaming for apk indexing: $PACKAGE_FILENAME -> $canonical"
            mv "./custom-packages/$PACKAGE_FILENAME" "./custom-packages/$canonical"
            PACKAGE_FILENAME="$canonical"
          fi

          echo "TOLLGATE_WRT_PACKAGE_PATH=./custom-packages/$PACKAGE_FILENAME" >> $GITHUB_ENV

      - name: Build TollGateOS for ${{ matrix.device_id }}
        id: build-os-image
        uses: ./actions/build-os
        with:
          device_id: ${{ matrix.device_id }}
          nostr_secret_key: ${{ secrets.NOSTR_SECRET_KEY }}
          nostr_public_key: ${{ secrets.NOSTR_PUBLIC_KEY }}
          os_files_path: "./files"
          custom_packages_path: "./custom-packages"
          nsecbech: ${{ secrets.NSECBECH }}
          nsec: ${{ secrets.NSEC }}
          openwrt_version: ${{ matrix.openwrt_version }}
          package_format: ${{ matrix.format }}
          tollgate_os_version: ${{ needs.determine-versioning.outputs.os_version }}
          release_channel: ${{ needs.determine-versioning.outputs.release_channel }}
      
      - name: Copy firmware to artifacts directory
        run: |
          mkdir -p /tmp/tollgate-artifacts
          mkdir -p ./artifacts
          cp "${{ steps.build-os-image.outputs.firmware_path }}" "/tmp/tollgate-artifacts/${{ env.FIRMWARE_FILENAME }}"
          cp "${{ steps.build-os-image.outputs.firmware_path }}" "./artifacts/${{ env.FIRMWARE_FILENAME }}"

      - name: GitHub Artifact upload
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: firmware-${{ matrix.device_id }}-${{ matrix.compression }}
          path: ./artifacts/${{ env.FIRMWARE_FILENAME }}
          retention-days: 5

  publish-metadata:
    needs: [determine-versioning, build-firmware, define-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: ubuntu:latest
      options: --user root
      volumes:
        - /tmp/tollgate-artifacts:/tmp/tollgate-artifacts
    strategy:
      matrix: ${{ fromJson(needs.define-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Initialize
        run: |
          # Add compression suffix to firmware filename
          if [ "${{ matrix.compression }}" != "none" ]; then
            COMPRESSION_SUFFIX="-${{ matrix.compression }}"
          else
            COMPRESSION_SUFFIX=""
          fi
          FIRMWARE_FILENAME=tollgate-os-${{ matrix.device_id }}-${{ needs.determine-versioning.outputs.tollgate_wrt_version }}${COMPRESSION_SUFFIX}.bin
          echo "FIRMWARE_FILENAME=$FIRMWARE_FILENAME" >> $GITHUB_ENV
          echo "COMPRESSION_TYPE=${{ matrix.compression }}" >> $GITHUB_ENV

      - name: Install required tools
        run: |
          apt-get update
          apt-get install -y curl jq

      - name: Get artifact from volume (ACT) or download (GitHub)
        shell: bash
        run: |
          mkdir -p ./artifacts
          if [ "$ACT" = "true" ]; then
            # In ACT, copy from mounted volume
            cp /tmp/tollgate-artifacts/${{ env.FIRMWARE_FILENAME }} ./artifacts/
          fi

      - name: Download artifact from GitHub
        if: ${{ env.ACT != 'true' }}
        uses: actions/download-artifact@v8
        with:
          name: firmware-${{ matrix.device_id }}-${{ matrix.compression }}
          path: ./artifacts

      - name: Get firmware details
        shell: bash
        run: |
          FIRMWARE_PATH=$(find ./artifacts -name "${{ env.FIRMWARE_FILENAME }}" -type f | head -n1)
          FILE_SIZE=$(stat -c%s "$FIRMWARE_PATH")
          echo "FIRMWARE_PATH=$FIRMWARE_PATH" >> $GITHUB_ENV
          echo "FIRMWARE_SIZE=$FILE_SIZE" >> $GITHUB_ENV

      - name: Get device architecture and details
        shell: bash
        run: |
          echo "ℹ️ Fetching target based on device id"
          all_targets=$(curl -s https://downloads.openwrt.org/releases/${{ matrix.openwrt_version }}/.overview.json)
        
          # Extract target from the correct path in the JSON structure
          current_target=$(echo "$all_targets" | jq -r --arg device "${{ matrix.device_id }}" '.profiles[] | select(.id == $device) | .target')
          
          if [ -z "$current_target" ] || [ "$current_target" = "null" ]; then
            echo "::error::Device ID '${{ matrix.device_id }}' not found in the OpenWrt overview file"
            exit 1
          fi
          
          echo "ℹ️ Current device: ${{ matrix.device_id }}"
          echo "ℹ️ Current target: $current_target"

          # Get architecture details
          target_profiles=$(curl -s https://downloads.openwrt.org/releases/${{ matrix.openwrt_version }}/targets/${current_target}/profiles.json)
          architecture=$(echo "$target_profiles" | jq -r '.arch_packages')
          supported_devices=$(echo "$target_profiles" | jq -r --arg device "${{ matrix.device_id }}" '.profiles.[$device].supported_devices | map(tostring) | join(",")')

          echo "OS_ARCHITECTURE=$architecture" >> $GITHUB_ENV
          echo "OS_SUPPORTED_DEVICES=$supported_devices" >> $GITHUB_ENV

      - name: Install nak
        shell: bash
        run: |
          echo "Downloading nak for linux-amd64..."
          curl -L "https://github.com/fiatjaf/nak/releases/download/v0.16.2/nak-v0.16.2-linux-amd64" -o /usr/local/bin/nak
          chmod +x /usr/local/bin/nak
          
          # Verify installation
          if nak --version; then
            echo "✅ nak installed successfully"
          else
            echo "❌ nak installation failed"
            exit 1
          fi

      - name: Blossom Artifact upload using nak
        id: blossom_upload
        shell: bash
        env:
          BLOSSOM_SERVER: "https://cmbethpcg000e5el0ehhk5933-blossom.eggstr.com"
          NSEC_HEX: ${{ secrets.NSEC }}
        run: |
          # Upload file to Blossom using nak (redirect stdin from /dev/null to avoid pipe detection)
          UPLOAD_RESPONSE=$(nak blossom upload --server "$BLOSSOM_SERVER" --sec "$NSEC_HEX" "${{ env.FIRMWARE_PATH }}" < /dev/null)
          
          echo "Upload response:"
          echo "$UPLOAD_RESPONSE"
          
          # Extract sha256 hash from JSON response
          FILE_HASH=$(echo "$UPLOAD_RESPONSE" | jq -r '.sha256')
          
          if [ -z "$FILE_HASH" ] || [ "$FILE_HASH" = "null" ]; then
            echo "❌ Failed to extract hash from upload response"
            exit 1
          fi
          
          # Construct Blossom URL with .bin suffix so browsers save the
          # firmware with the correct extension (Blossom servers ignore the
          # suffix and resolve by sha256 hash per BUD-01).
          BLOSSOM_URL="$BLOSSOM_SERVER/$FILE_HASH.bin"
          
          echo "url=$BLOSSOM_URL" >> $GITHUB_OUTPUT
          echo "hash=$FILE_HASH" >> $GITHUB_OUTPUT
          echo "✅ Uploaded to Blossom: $BLOSSOM_URL"

      - name: Publish Firmware NIP-94 Metadata
        id: publish_firmware
        shell: bash
        env:
          RELAYS: "wss://relay.damus.io wss://nos.lol wss://nostr.mom wss://relay.tollgate.me"
          NSEC_HEX: ${{ secrets.NSEC }}
        run: |
          set -e  # Exit on any error
          
          # Create NIP-94 event
          echo "Creating NIP-94 event..."
          nak event --sec "$NSEC_HEX" -k 1063 \
            -c "TollGate OS Firmware for ${{ matrix.device_id }} (${{ env.COMPRESSION_TYPE }} compression)" \
            --tag url="${{ steps.blossom_upload.outputs.url }}" \
            --tag m="application/octet-stream" \
            --tag x="${{ steps.blossom_upload.outputs.hash }}" \
            --tag ox="${{ steps.blossom_upload.outputs.hash }}" \
            --tag size="${{ env.FIRMWARE_SIZE }}" \
            --tag filename="${{ env.FIRMWARE_FILENAME }}" \
            --tag A="${{ env.OS_ARCHITECTURE }}" \
            --tag device_id="${{ matrix.device_id }}" \
            --tag d="${{ matrix.device_id }}" \
            --tag supported_devices="${{ env.OS_SUPPORTED_DEVICES }}" \
            --tag openwrt_version="${{ matrix.openwrt_version }}" \
            --tag v="${{ needs.determine-versioning.outputs.tollgate_wrt_version }}" \
            --tag c="${{ needs.determine-versioning.outputs.release_channel }}" \
            --tag n="tollgate-os" \
            --tag compression="${{ env.COMPRESSION_TYPE }}" \
            > event.json 2> event.err
          
          NAK_EXIT=$?
          
          echo "Event creation exit code: $NAK_EXIT"
          echo "event.json size: $(wc -c < event.json 2>/dev/null || echo '0') bytes"
          echo "event.err size: $(wc -c < event.err 2>/dev/null || echo '0') bytes"
          
          if [ -s event.err ]; then
            echo "=== Event stderr ==="
            cat event.err
            echo "===================="
          fi
          
          if [ $NAK_EXIT -ne 0 ]; then
            echo "❌ Failed to create event (exit code: $NAK_EXIT)"
            cat event.json 2>/dev/null || echo "No event.json created"
            exit $NAK_EXIT
          fi
          
          if [ ! -s event.json ]; then
            echo "❌ event.json is empty"
            exit 1
          fi
          
          echo "=== Event JSON ==="
          cat event.json
          echo "=================="
          
          # Validate and extract event ID
          EVENT_ID=$(jq -r '.id' event.json)
          
          if [ -z "$EVENT_ID" ] || [ "$EVENT_ID" = "null" ]; then
            echo "❌ Failed to extract event ID"
            exit 1
          fi
          
          echo "Event created with ID: $EVENT_ID"
          
          # Step 2: Publish to relays
          echo "Publishing to relays..."
          cat event.json | nak event $RELAYS 2>&1
          
          echo "eventId=$EVENT_ID" >> $GITHUB_OUTPUT
          echo "✅ Published NIP-94 event: $EVENT_ID"

      - name: Verify Firmware NIP-94 Event
        id: verify_firmware
        if: ${{ steps.publish_firmware.outputs.eventId != '' }}
        env:
          EVENT_ID: ${{ steps.publish_firmware.outputs.eventId }}
          RELAYS: "wss://relay.damus.io wss://nos.lol wss://nostr.mom wss://relay.tollgate.me"
        run: |
          echo "Verifying event $EVENT_ID on relays..."
          FOUND=0
          for relay in $RELAYS; do
            echo "Checking $relay..."
            RESULT=$(nak req -i "$EVENT_ID" "$relay" 2>/dev/null || echo "")
            if [ -n "$RESULT" ]; then
              echo "✅ Found on $relay"
              FOUND=1
            else
              echo "⚠️  Not found on $relay"
            fi
          done
          
          if [ $FOUND -eq 0 ]; then
            echo "❌ Event not found on any relay"
            exit 1
          fi
          
          echo "✅ Event verified on at least one relay"