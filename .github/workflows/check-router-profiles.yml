name: Check Router Profiles

on:
  push:
    branches: [ main, external_profiles_2 ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run once a week on Monday at 00:00 UTC to check for new OpenWRT releases
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      force_download:
        description: 'Force download even if profiles already exist'
        required: false
        type: boolean
        default: false

jobs:
  check-profiles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl
      
      - name: Check endoflife.date API
        id: check_eol
        run: |
          mkdir -p external_profiles
          
          # Fetch OpenWRT release info from endoflife.date
          curl -s https://endoflife.date/api/openwrt.json -o external_profiles/openwrt_versions.json
          
          # Get the most recent supported version (EOL >= 2025-08-04 or eol:false)
          MIN_EOL_DATE="2025-08-04"
          LATEST_SUPPORTED=$(jq -r '[.[] | select(.eol == false or .eol >= "'$MIN_EOL_DATE'") | .latest] | sort | reverse[0]' external_profiles/openwrt_versions.json)
          
          echo "Latest supported OpenWRT version: $LATEST_SUPPORTED"
          echo "version=$LATEST_SUPPORTED" >> $GITHUB_OUTPUT
      
      - name: Check current profiles
        id: check_profiles
        run: |
          if [ -d "external_profiles" ]; then
            VERSIONS=$(find external_profiles -mindepth 1 -maxdepth 1 -type d | grep -v "^\." | xargs -n1 basename | sort -V)
            
            if [ -n "$VERSIONS" ]; then
              echo "Found existing OpenWRT versions: $VERSIONS"
              CURRENT_VERSION=$(echo "$VERSIONS" | sort -V | tail -n1)
              echo "Current latest version: $CURRENT_VERSION"
              
              # Check if we need to update
              if [ "$CURRENT_VERSION" != "${{ steps.check_eol.outputs.version }}" ]; then
                echo "New version available: ${{ steps.check_eol.outputs.version }} > $CURRENT_VERSION"
                echo "needs_update=true" >> $GITHUB_OUTPUT
              else
                echo "Current version is up to date"
                echo "needs_update=false" >> $GITHUB_OUTPUT
              fi
            else
              echo "No existing profiles found"
              echo "needs_update=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "No profiles directory found"
            echo "needs_update=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Download Default Router Profiles
        id: download_profiles
        uses: ./actions/download-profiles
        with:
          version: ${{ steps.check_eol.outputs.version }}
          # Only force download if we need an update or it's manually requested
          force-download: ${{ steps.check_profiles.outputs.needs_update == 'true' || github.event.inputs.force_download == 'true' }}
      
      - name: Report Results
        run: |
          echo "✅ Router profile check completed"
          echo "  • OpenWRT version: ${{ steps.download_profiles.outputs.version }}"
          echo "  • Total profiles available: ${{ steps.download_profiles.outputs.profile-count }}"
          echo "  • Profiles skipped (already exist): ${{ steps.download_profiles.outputs.skipped-count }}"
          echo "  • New profiles downloaded: ${{ steps.download_profiles.outputs.downloaded-count }}"
          
          if [ "${{ steps.download_profiles.outputs.downloaded-count }}" != "0" ]; then
            echo "👉 New profiles were downloaded. Consider committing them to the repository."
          else
            echo "👉 No new profiles downloaded. Everything is up to date."
          fi
      
      - name: Commit new profiles if any were downloaded
        if: ${{ steps.download_profiles.outputs.downloaded-count != '0' && github.event_name != 'pull_request' }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          
          git add external_profiles/
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update router profiles to OpenWRT ${{ steps.download_profiles.outputs.version }}"
            
            # Push changes for automated workflows, but not for manual runs
            if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event_name }}" == "push" ]]; then
              git push
              echo "✅ Changes committed and pushed."
            else
              echo "✅ Changes committed but not pushed (manual workflow)."
            fi
          fi