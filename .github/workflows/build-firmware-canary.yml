name: Build OpenWRT Firmware with Canary

on:
  push:
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      device_model:
        description: 'Device model to build (use profile ID like glinet_gl-mt3000)'
        required: false
      firmware_type:
        description: 'Type of firmware to build (sysupgrade, factory, kernel, all)'
        default: 'all' 
        required: false
  schedule:
    - cron: '0 0 * * *'  # Run at midnight UTC every day

jobs:
  # Run the canary build first
  canary_build:
    name: Canary build for D-Link COVR-X1860
    uses: ./.github/workflows/reusable-build-firmware.yml
    with:
      device_id: dlink_covr-x1860-a1
      device_name: "D-Link COVR-X1860"
      platform: ramips/mt7621
      firmware_type: ${{ github.event.inputs.firmware_type || 'all' }}
    secrets:
      NOSTR_SECRET_KEY: ${{ secrets.NOSTR_SECRET_KEY }}
      NOSTR_PUBLIC_KEY: ${{ secrets.NOSTR_PUBLIC_KEY }}
      NSECBECH: ${{ secrets.NSECBECH }}
      NSEC: ${{ secrets.NSEC }}

  # Only run other builds if canary was successful
  build_other_devices:
    name: Build other devices
    needs: canary_build
    if: ${{ needs.canary_build.outputs.build_success == 'true' }}
    strategy:
      matrix:
        device:
          - id: glinet_gl-mt3000
            name: GL.iNet GL-MT3000
            platform: mediatek/filogic
          - id: glinet_gl-mt6000
            name: GL.iNet GL-MT6000
            platform: mediatek/filogic
          - id: glinet_gl-ar300m-nor
            name: GL.iNet GL-AR300M (NOR)
            platform: ath79/nand
          - id: glinet_gl-ar300m-nand
            name: GL.iNet GL-AR300M (NAND)
            platform: ath79/nand
      fail-fast: false
    
    uses: ./.github/workflows/reusable-build-firmware.yml
    with:
      device_id: ${{ matrix.device.id }}
      device_name: ${{ matrix.device.name }}
      platform: ${{ matrix.device.platform }}
      firmware_type: ${{ github.event.inputs.firmware_type || 'all' }}
    secrets:
      NOSTR_SECRET_KEY: ${{ secrets.NOSTR_SECRET_KEY }}
      NOSTR_PUBLIC_KEY: ${{ secrets.NOSTR_PUBLIC_KEY }}
      NSECBECH: ${{ secrets.NSECBECH }}
      NSEC: ${{ secrets.NSEC }}

  # Create a summary job that depends on all other builds
  summary:
    name: Build Summary
    needs: [canary_build, build_other_devices]
    # This job runs even if the matrix build_other_devices was skipped or failed
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate build summary
        run: |
          echo "# Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Report on canary build
          if [[ "${{ needs.canary_build.result }}" == "success" ]]; then
            echo "✅ **D-Link COVR-X1860 (Canary)**: Success" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **D-Link COVR-X1860 (Canary)**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Other devices" >> $GITHUB_STEP_SUMMARY
          
          # Report on other device builds (if run)
          if [[ "${{ needs.build_other_devices.result }}" == "success" ]]; then
            echo "✅ All other device builds completed successfully" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.build_other_devices.result }}" == "skipped" ]]; then
            echo "⏭️ Other device builds were skipped (Canary build failed)" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Some device builds failed - check individual job logs" >> $GITHUB_STEP_SUMMARY
          fi