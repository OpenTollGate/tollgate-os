name: Build OpenWRT Firmware

on:
  push:
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # Run at midnight UTC every day

jobs:
  build:
    strategy:
      fail-fast: true
      max-parallel: 1 
      matrix:
        model: [
          # D-Link models
          'dlink_covr-x1860-a1',
          #'dlink_covr-c1200-a1',
          
          # GL.iNet models
          'glinet_gl-mt3000',
          #'glinet_gl-mt6000',
          'glinet_gl-ar300m-nand',
          #'glinet_gl-ar300m-nor',
          #'glinet_gl-ar300m16',
          #'glinet_gl-ar300m-lite',
          
          # ZyXEL models
          #'zyxel_nr7101',
        ]

    runs-on: ubuntu-latest
    name: Build ${{ matrix.model }}

    steps:
      - uses: actions/checkout@v4
      
      - name: Build OpenWRT Image
        id: build-openwrt-image
        uses: ./actions/build-firmware
        with:
          model: ${{ matrix.model }}
          nostr_secret_key: ${{ secrets.NOSTR_SECRET_KEY }}
          nostr_public_key: ${{ secrets.NOSTR_PUBLIC_KEY }}
          files_path: "./files"
          nsecbech: ${{ secrets.NSECBECH }}
          nsec: ${{ secrets.NSEC }}
      
      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.model }}.img
          path: ${{ steps.build-openwrt-image.outputs.firmware_path }}
          retention-days: 5
