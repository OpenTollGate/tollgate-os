name: Build OpenWRT Firmware (Simplified)

on:
  push:
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'Override OpenWRT version (leave empty for latest)'
        required: false
        type: string
  schedule:
    - cron: '0 0 * * *'  # Run at midnight UTC every day

jobs:
  # Step 1: Determine the OpenWRT version to use
  check-versions:
    runs-on: ubuntu-latest
    outputs:
      openwrt_version: ${{ steps.get-version.outputs.version }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      # Set version based on run type and available overrides
      - name: Get OpenWRT version
        id: get-version
        run: |
          # Start with hardcoded stable version as default
          OPENWRT_VERSION="23.05.5"
          
          # Check for manual override
          if [ -n "${{ github.event.inputs.openwrt_version }}" ]; then
            OPENWRT_VERSION="${{ github.event.inputs.openwrt_version }}"
            echo "Using manual override version: $OPENWRT_VERSION"
          fi
          
          # Output the final VERSION
          echo "version=$OPENWRT_VERSION" >> $GITHUB_OUTPUT
          echo "🔧 Using OpenWRT version: $OPENWRT_VERSION"

  # Step 2: Build firmware for each router model
  build:
    needs: [check-versions]
    strategy:
      matrix:
        model: [
          # D-Link models
          'dlink_covr-x1860-a1',
          
          # GL.iNet models
          'glinet_gl-mt3000',
          'glinet_gl-mt6000',
          'glinet_gl-ar300m-nand'
        ]
      fail-fast: true
      max-parallel: 1

    runs-on: ubuntu-latest
    name: Build ${{ matrix.model }}
    env:
      # Use default_packages from profiles.json (will be set in Set Build Variables step)
      # The below list is kept for documentation of what's typically included
      # BASE_PACKAGES: base-files busybox ca-bundle dnsmasq dropbear firewall4 fstools 
      #   kmod-gpio-button-hotplug kmod-leds-gpio kmod-nft-offload libc libgcc 
      #   libustream-mbedtls logd mtd netifd nftables odhcp6c opkg ppp 
      #   ppp-mod-pppoe procd procd-seccomp procd-ujail swconfig uci 
      #   uclient-fetch urandom-seed urngd openssh-sftp-server nodogsplash
      
      # Additional required packages to add regardless of default
      ADDITIONAL_PACKAGES: openssh-sftp-server nodogsplash
      
      # Nostr relay configuration
      NOSTR_RELAYS: 'wss://relay.damus.io,wss://nos.lol,wss://nostr.mom'
      
      # Default removed packages
      REMOVED_PACKAGES: -odhcpd -odhcpd-ipv6only -wpad-basic-wolfssl -wpad-basic-mbedtls -wpad-mini
      
      # Force flag to bypass distutils check on newer Ubuntu runners
      FORCE: 1

    steps:
      - uses: actions/checkout@v4
      
      # Set up Python with optimized pip caching
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          cache: 'pip'
          # The cache key is based on specific dependencies and runner OS
          cache-dependency-path: 'requirements.txt'
      
      # Install essential dependencies needed for workflow
      - name: Install Dependencies
        run: |
          echo "📦 Installing dependencies..."
          sudo apt-get update
          # Only install packages that aren't already installed 
          sudo apt-get install -y curl jq gawk build-essential zstd libssl-dev
          
          # We're explicitly timing the pip installation to track optimization progress
          start_time=$SECONDS
          python -m pip install -r requirements.txt
          end_time=$SECONDS
          echo "📊 Python dependencies installation took $((end_time-start_time)) seconds"
      
      # Use the openwrt-info action to get router details
      - name: Get Router Info
        id: router-info
        uses: ./actions/openwrt-info
        with:
          router_id: ${{ matrix.model }}
          openwrt_version: ${{ needs.check-versions.outputs.openwrt_version }}
      
      - name: Set Build Variables
        id: vars
        run: |
          # Extract target and split into platform/type
          TARGET="${{ steps.router-info.outputs.target }}"
          PLATFORM=$(echo "$TARGET" | cut -d'/' -f1)
          TYPE=$(echo "$TARGET" | cut -d'/' -f2)
          PROFILE="${{ matrix.model }}"
          
          # Get supported image types and filesystems
          SUPPORTED_TYPES="${{ steps.router-info.outputs.supported_image_types }}"
          SUPPORTED_FILESYSTEMS="${{ steps.router-info.outputs.supported_filesystems }}"
          
          # Default UBI setting - ImageBuilder will handle this automatically
          USES_UBI="false"
          
          echo "📊 Device filesystem information from profiles.json:"
          echo "- Supported filesystems: $SUPPORTED_FILESYSTEMS"
          
          IMAGE_PREFIX="${{ steps.router-info.outputs.image_prefix }}"
          
          # Verify that sysupgrade is supported
          if ! echo "$SUPPORTED_TYPES" | grep -q "sysupgrade"; then
            echo "❌ ERROR: 'sysupgrade' firmware type is not supported for this device ($PROFILE)"
            echo "Available types are: $SUPPORTED_TYPES"
            exit 1
          fi
          
          # Create build directory
          BUILDDIR="/tmp/openwrt-build"
          sudo mkdir -p $BUILDDIR
          sudo chown $USER:$USER $BUILDDIR
          
          # Define the imagebuilder name
          if [ "${PLATFORM}" = "ath79" ] && [ "${TYPE}" = "nand" ]; then
            IMAGEBUILDER_NAME="openwrt-imagebuilder-${{ needs.check-versions.outputs.openwrt_version }}-ath79-nand.Linux-x86_64"
          else
            IMAGEBUILDER_NAME="openwrt-imagebuilder-${{ needs.check-versions.outputs.openwrt_version }}-${PLATFORM}-${TYPE}.Linux-x86_64"
          fi
          
          # For snapshots, always use tar.zst, otherwise use tar.xz for stable versions
          if [ "${{ needs.check-versions.outputs.openwrt_version }}" = "snapshot" ]; then
            IMAGEBUILDER_NAME="openwrt-imagebuilder-${PLATFORM}-${TYPE}.Linux-x86_64"
            DOWNLOAD_URL="https://downloads.openwrt.org/snapshots/targets/${PLATFORM}/${TYPE}/${IMAGEBUILDER_NAME}.tar.zst"
            ARCHIVE_EXT="tar.zst"
          else
            DOWNLOAD_URL="https://downloads.openwrt.org/releases/${{ needs.check-versions.outputs.openwrt_version }}/targets/${PLATFORM}/${TYPE}/${IMAGEBUILDER_NAME}.tar.xz"
            ARCHIVE_EXT="tar.xz"
          fi
          
          # Get architecture from router-info
          ARCH_PACKAGES="${{ steps.router-info.outputs.arch_packages }}"
          
          # Get default packages from router-info and convert to space-separated list
          DEFAULT_PACKAGES=$(echo "${{ steps.router-info.outputs.default_packages }}" | tr ',' ' ')
          echo "📦 Default packages: $DEFAULT_PACKAGES"
          
          # Combine with additional required packages to form base packages
          BASE_PACKAGES="${DEFAULT_PACKAGES} ${ADDITIONAL_PACKAGES}"
          echo "BASE_PACKAGES=$BASE_PACKAGES" >> $GITHUB_ENV
          
          # Map to Blossom architecture using architecture_mapping.json
          ARCH_MAPPING_PATH="./files/etc/tollgate/architecture_mapping.json"
          if [ -f "${ARCH_MAPPING_PATH}" ]; then
            # First try direct mapping from architecture name
            BLOSSOM_ARCH=$(jq -r --arg arch "${ARCH_PACKAGES}" '.mappings[$arch] // ""' "${ARCH_MAPPING_PATH}")
            
            # If not found, use platform mapping
            if [ -z "${BLOSSOM_ARCH}" ] || [ "${BLOSSOM_ARCH}" = "null" ]; then
              PLATFORM_TYPE="${PLATFORM}_${TYPE}"
              BLOSSOM_ARCH=$(jq -r --arg platform "${PLATFORM_TYPE}" '.platform_mappings[$platform] // .default' "${ARCH_MAPPING_PATH}")
            fi
          else
            # Fallback mapping if file not found
            case "${ARCH_PACKAGES}" in
              "mipsel_24kc") BLOSSOM_ARCH="mips_24kc" ;;
              *) BLOSSOM_ARCH="${ARCH_PACKAGES}" ;;
            esac
          fi
          
          # Parse device packages
          DEVICE_PACKAGES=$(echo "${{ steps.router-info.outputs.device_packages }}" | tr ',' ' ')
          echo "📦 Device-specific packages: $DEVICE_PACKAGES"
          
          # Set cache key for imagebuilder
          CACHE_KEY="openwrt-v4-${{ needs.check-versions.outputs.openwrt_version }}-${PLATFORM}-${TYPE}"
          
          # Export all variables
          echo "TARGET=$TARGET" >> $GITHUB_ENV
          echo "PLATFORM=$PLATFORM" >> $GITHUB_ENV
          echo "TYPE=$TYPE" >> $GITHUB_ENV
          echo "PROFILE=$PROFILE" >> $GITHUB_ENV
          echo "BUILDDIR=$BUILDDIR" >> $GITHUB_ENV
          echo "IMAGEBUILDER_NAME=$IMAGEBUILDER_NAME" >> $GITHUB_ENV
          echo "DOWNLOAD_URL=$DOWNLOAD_URL" >> $GITHUB_ENV
          echo "ARCHIVE_EXT=$ARCHIVE_EXT" >> $GITHUB_ENV
          echo "BLOSSOM_ARCH=$BLOSSOM_ARCH" >> $GITHUB_ENV
          echo "DEVICE_PACKAGES=$DEVICE_PACKAGES" >> $GITHUB_ENV
          echo "CACHE_KEY=$CACHE_KEY" >> $GITHUB_ENV
          echo "SUPPORTED_TYPES=$SUPPORTED_TYPES" >> $GITHUB_ENV
          echo "SUPPORTED_FILESYSTEMS=$SUPPORTED_FILESYSTEMS" >> $GITHUB_ENV
          echo "USES_UBI=$USES_UBI" >> $GITHUB_ENV
          echo "IMAGE_PREFIX=$IMAGE_PREFIX" >> $GITHUB_ENV
      
      # Try to restore from cache
      - name: Restore ImageBuilder Setup from Cache
        id: cache-imagebuilder
        uses: actions/cache/restore@v3
        with:
          path: ${{ env.BUILDDIR }}
          key: ${{ env.CACHE_KEY }}-setup-complete
      
      # Try to restore OpenWrt package downloads cache
      - name: Restore OpenWrt Package Downloads Cache
        id: cache-packages
        uses: actions/cache/restore@v3
        with:
          path: |
            ${{ env.BUILDDIR }}/${{ env.IMAGEBUILDER_NAME }}/dl
            ${{ env.BUILDDIR }}/${{ env.IMAGEBUILDER_NAME }}/staging_dir
          # We can only use restore-keys here since PACKAGES_HASH isn't defined yet
          # The most specific match will be used if available
          key: ${{ env.CACHE_KEY }}-packages
          restore-keys: |
            ${{ env.CACHE_KEY }}-packages
      
      # Install build-specific dependencies only when cache misses
      - name: Install Build Dependencies
        if: steps.cache-imagebuilder.outputs.cache-hit != 'true'
        run: |
          echo "📦 Installing build-specific dependencies..."
          sudo apt-get install -y gawk build-essential zstd libssl-dev
      
      # Download and Extract ImageBuilder if cache miss
      - name: Download and Extract ImageBuilder
        if: steps.cache-imagebuilder.outputs.cache-hit != 'true'
        run: |
          cd $BUILDDIR
          
          echo "🔄 Downloading OpenWRT ImageBuilder from $DOWNLOAD_URL"
          curl -L -O "$DOWNLOAD_URL"
          
          echo "📦 Extracting OpenWRT ImageBuilder"
          if [[ "$ARCHIVE_EXT" == "tar.zst" ]]; then
            tar --zstd -xf "$(basename $DOWNLOAD_URL)"
          else
            tar xfJ "$(basename $DOWNLOAD_URL)"
          fi
          
          if [ ! -d "$IMAGEBUILDER_NAME" ]; then
            echo "❌ Failed to extract ImageBuilder"
            exit 1
          fi

      # Setup Custom Files and Packages
      - name: Setup Custom Files and Packages
        if: steps.cache-imagebuilder.outputs.cache-hit != 'true'
        run: |
          # Copy files directory
          mkdir -p $BUILDDIR/$IMAGEBUILDER_NAME/files
          cp -r ./files/* $BUILDDIR/$IMAGEBUILDER_NAME/files/
          
          # Create packages directory
          PACKAGES_DIR="$BUILDDIR/$IMAGEBUILDER_NAME/packages/local"
          mkdir -p "$PACKAGES_DIR"
          
          # Add U-Boot config for supported devices
          if [[ "${{ matrix.model }}" == *"gl-mt3000"* || "${{ matrix.model }}" == *"gl-mt6000"* ]]; then
            mkdir -p $BUILDDIR/$IMAGEBUILDER_NAME/files/etc
            echo "/dev/mtd1 0x0 0x1000 0x10000" > $BUILDDIR/$IMAGEBUILDER_NAME/files/etc/fw_env.config
          fi
          
          # Download TollGate packages
          touch "$PACKAGES_DIR/Packages"
          
          DOWNLOADED_PACKAGES=""
          for MODULE_NAME in $(jq -r '.modules[].name' files/etc/tollgate/release.json); do
            PACKAGE_URL=$(jq -r --arg module "$MODULE_NAME" --arg arch "$BLOSSOM_ARCH" \
              '.modules[] | select(.name == $module) | .versions[0].architectures[$arch].url' \
              files/etc/tollgate/release.json)
            
            if [[ -n "$PACKAGE_URL" && "$PACKAGE_URL" != "null" && "$PACKAGE_URL" != *"[HASH]"* ]]; then
              echo "⬇️ Downloading $MODULE_NAME from $PACKAGE_URL"
              
              if curl -L -f --connect-timeout 30 --max-time 60 -o "$PACKAGES_DIR/${MODULE_NAME}-${BLOSSOM_ARCH}.ipk" "$PACKAGE_URL"; then
                DOWNLOADED_PACKAGES="${DOWNLOADED_PACKAGES} ${MODULE_NAME}"
              fi
            fi
          done
          
          echo "TOLLGATE_PACKAGES=$DOWNLOADED_PACKAGES" >> $GITHUB_ENV
          echo "PACKAGES_DIR=$PACKAGES_DIR" >> $GITHUB_ENV

      # Generate Package Index
      - name: Generate Package Index
        if: steps.cache-imagebuilder.outputs.cache-hit != 'true'
        run: |
          cd $BUILDDIR/$IMAGEBUILDER_NAME
          sudo bash -c '
            mkhash() { 
              if [ "$1" = "sha256" ]; then 
                sha256sum "$2" | cut -d" " -f1
              else 
                sha256sum "$1" | cut -d" " -f1
              fi 
            }
            export -f mkhash
            export MKHASH=mkhash
            ./scripts/ipkg-make-index.sh packages/local > packages/local/Packages
            gzip -9c packages/local/Packages > packages/local/Packages.gz
          '
      
      # Save the setup to cache
      - name: Save ImageBuilder Setup to Cache
        if: steps.cache-imagebuilder.outputs.cache-hit != 'true'
        uses: actions/cache/save@v3
        with:
          path: ${{ env.BUILDDIR }}
          key: ${{ env.CACHE_KEY }}-setup-complete
      
      # Precache packages for faster builds
      - name: Precache OpenWrt Packages
        if: steps.cache-packages.outputs.cache-hit != 'true'
        run: |
          cd $BUILDDIR/$IMAGEBUILDER_NAME
          echo "📦 Precaching packages for faster builds..."
          
          # Create a temporary download directory for package caching
          mkdir -p dl
          
          # Create a combined package list for caching
          # We'll cache what we know, and let the ImageBuilder handle the rest
          CACHE_PACKAGES="${BASE_PACKAGES} ${DEVICE_PACKAGES} ${TOLLGATE_PACKAGES}"
          
          echo "📦 Packages to precache:"
          echo "${CACHE_PACKAGES}" | tr ' ' '\n' | sort | uniq
          
          # Use the ImageBuilder's native download mechanism to precache packages
          # This creates a dummy config to download packages without building the image
          # -j flag for parallel downloads
          echo "📦 Downloading package dependencies for caching..."
          
          # Run a dry-run build with the packages to trigger downloads without building
          make -j$(nproc) PROFILE="$PROFILE" \
            PACKAGES="${CACHE_PACKAGES}" \
            BIN_DIR="/tmp/dummy-output" \
            IGNORE_ERRORS=1 \
            download
          
          # Show what was downloaded
          echo "📦 Downloaded package files:"
          find dl/ -name "*.ipk" | wc -l
      
      # Build firmware with all packages
      - name: Build Firmware
        id: build
        run: |
          cd $BUILDDIR/$IMAGEBUILDER_NAME
          
          # Detect number of processors for parallelization
          NUM_PROCS=$(nproc)
          echo "🖥️ Detected $NUM_PROCS processors for parallel building"
          
          # Display each package list separately for easier debugging
          echo "📦 REMOVED_PACKAGES: ${REMOVED_PACKAGES}"
          echo "📦 BASE_PACKAGES: ${BASE_PACKAGES}"
          echo "📦 DEVICE_PACKAGES: ${DEVICE_PACKAGES}"
          echo "📦 TOLLGATE_PACKAGES: ${TOLLGATE_PACKAGES}"
          
          # Check for any suspicious package names that might cause errors
          echo "🔍 Checking for problematic package names..."
          for PKG in ${BASE_PACKAGES}; do
            if [[ "$PKG" == *" "* || "$PKG" == "" || "$PKG" == "basic" ]]; then
              echo "⚠️ WARNING: Potential issue with package: '$PKG'"
            fi
          done
          
          # Combine all packages, ensuring proper spacing
          COMBINED_PACKAGES="${REMOVED_PACKAGES} ${BASE_PACKAGES} ${DEVICE_PACKAGES} ${TOLLGATE_PACKAGES}"
          
          # Generate a hash of the combined packages for cache key
          PACKAGES_HASH=$(echo "$COMBINED_PACKAGES" | sort | sha256sum | cut -d ' ' -f1)
          echo "PACKAGES_HASH=$PACKAGES_HASH" >> $GITHUB_ENV
          
          echo "📦 Full package list for build:"
          echo "$COMBINED_PACKAGES" | tr ' ' '\n' | sort | uniq
          
          # Create output directory structure with absolute path
          OUTPUT_DIR="$BUILDDIR/$IMAGEBUILDER_NAME/bin"
          mkdir -p "$OUTPUT_DIR/targets/$PLATFORM/$TYPE"
          
          echo "🗂️ Using output directory: $OUTPUT_DIR"
          
          # Set build arguments - let the ImageBuilder determine filesystem needs
          BUILD_ARGS=()
          BUILD_ARGS+=(PROFILE="$PROFILE")
          BUILD_ARGS+=(PACKAGES="$COMBINED_PACKAGES")
          BUILD_ARGS+=(FILES="$BUILDDIR/$IMAGEBUILDER_NAME/files")
          BUILD_ARGS+=(BIN_DIR="$OUTPUT_DIR")
          BUILD_ARGS+=(EXTRA_IMAGE_NAME="sysupgrade")
          BUILD_ARGS+=(FORCE=1)
          
          # Show final build command
          echo "📋 Running build with arguments: ${BUILD_ARGS[@]}"
          
          # Execute the build with all arguments
          make -j$NUM_PROCS image "${BUILD_ARGS[@]}"
          
          # Debug - list build directory structure after build
          echo "📋 Checking build directory content:"
          find $BUILDDIR/$IMAGEBUILDER_NAME -type d | grep bin || echo "No bin directory found"
          
          # List all files recursively under bin directory
          echo "📋 Listing all files under bin directory (recursive):"
          find $BUILDDIR/$IMAGEBUILDER_NAME -name "*.bin" || echo "No .bin files found"
          
          # Determine expected sysupgrade file path based on image prefix
          if [ "$USES_UBI" = "true" ]; then
            # For UBI devices, the image name pattern might include "ubi" or "ubifs"
            EXPECTED_SYSUPGRADE_PATH=$(find $OUTPUT_DIR/targets/$PLATFORM/$TYPE/ -name "${IMAGE_PREFIX}*ubi*sysupgrade.bin" | head -1)
            if [ -z "$EXPECTED_SYSUPGRADE_PATH" ]; then
              # Try alternative UBI naming pattern
              EXPECTED_SYSUPGRADE_PATH=$(find $OUTPUT_DIR/targets/$PLATFORM/$TYPE/ -name "*${PROFILE}*ubi*sysupgrade.bin" | head -1)
            fi
          else
            # For standard squashfs devices
            EXPECTED_SYSUPGRADE_PATH="$OUTPUT_DIR/targets/$PLATFORM/$TYPE/${IMAGE_PREFIX}-squashfs-sysupgrade.bin"
          fi
          
          echo "🔍 Looking for sysupgrade image at: $EXPECTED_SYSUPGRADE_PATH"
          
          if [ -f "$EXPECTED_SYSUPGRADE_PATH" ]; then
            FIRMWARE_PATH="$EXPECTED_SYSUPGRADE_PATH"
            echo "✅ Found expected sysupgrade image at: $FIRMWARE_PATH"
          else
            # Fallback to other detection methods if the expected path is not found
            echo "⚠️ Expected sysupgrade image not found, trying alternative detection..."
            
            # For UBI devices, look for UBI-specific images first
            if [ "$USES_UBI" = "true" ]; then
              echo "🔍 Looking specifically for UBI images..."
              FIRMWARE_PATH=$(find $BUILDDIR/$IMAGEBUILDER_NAME -name "*ubi*sysupgrade*.bin" | head -1)
              
              if [ -z "$FIRMWARE_PATH" ]; then
                echo "🔍 Looking for any UBI or UBIFS images..."
                FIRMWARE_PATH=$(find $BUILDDIR/$IMAGEBUILDER_NAME -name "*ubi*.bin" | head -1)
              fi
            fi
            
            # If still not found, try standard detection methods
            if [ -z "$FIRMWARE_PATH" ]; then
              echo "🔍 Falling back to standard image detection..."
              
              # First, search in the current directory and its subdirectories
              FIRMWARE_PATH=$(find . -name "*sysupgrade*.bin" | head -1)
              
              # If not found, look in the build directory
              if [ -z "$FIRMWARE_PATH" ]; then
                echo "⚠️ Looking in build directory..."
                FIRMWARE_PATH=$(find $BUILDDIR/$IMAGEBUILDER_NAME -name "*sysupgrade*.bin" | head -1)
              fi
              
              # If still not found, look for any bin files
              if [ -z "$FIRMWARE_PATH" ]; then
                echo "⚠️ Looking for any .bin files..."
                FIRMWARE_PATH=$(find $BUILDDIR/$IMAGEBUILDER_NAME -name "*.bin" | grep -v "initramfs" | head -1)
              fi
              
              # If still not found, look for img files
              if [ -z "$FIRMWARE_PATH" ]; then
                echo "⚠️ No .bin files found, looking for .img files..."
                FIRMWARE_PATH=$(find $BUILDDIR/$IMAGEBUILDER_NAME -name "*.img" | head -1)
              fi
            fi
            
            # If still not found, look in the entire build directory for any relevant file
            if [ -z "$FIRMWARE_PATH" ]; then
              echo "⚠️ Listing all files in build directory that might be firmware:"
              find $BUILDDIR/$IMAGEBUILDER_NAME -type f -size +1M | grep -v "\.tar\."
              echo "⚠️ Checking build logs for clues..."
              find $BUILDDIR/$IMAGEBUILDER_NAME -name "*.log" -exec cat {} \; | grep -i "output"
            fi
          fi
          
          # If we found a firmware file
          if [ -n "$FIRMWARE_PATH" ]; then
            echo "✅ Build succeeded! Found firmware at: $FIRMWARE_PATH"
            FIRMWARE_NAME=$(basename $FIRMWARE_PATH)
            
            # Calculate firmware hash and size
            FIRMWARE_HASH=$(sha256sum "$FIRMWARE_PATH" | cut -d' ' -f1)
            FIRMWARE_SIZE=$(stat -c%s "$FIRMWARE_PATH")
            
            echo "firmware_path=$FIRMWARE_PATH" >> $GITHUB_OUTPUT
            echo "firmware_name=$FIRMWARE_NAME" >> $GITHUB_OUTPUT
            echo "firmware_hash=$FIRMWARE_HASH" >> $GITHUB_OUTPUT
            echo "firmware_size=$FIRMWARE_SIZE" >> $GITHUB_OUTPUT
            
            echo "FIRMWARE_HASH=$FIRMWARE_HASH" >> $GITHUB_ENV
            echo "FIRMWARE_SIZE=$FIRMWARE_SIZE" >> $GITHUB_ENV
          else
            echo "❌ Build succeeded but no firmware file found"
            echo "Build logs:"
            cat $BUILDDIR/$IMAGEBUILDER_NAME/build.log || echo "No build.log found"
            echo "Looking in logs directory:"
            find $BUILDDIR/$IMAGEBUILDER_NAME/logs -type f | xargs cat || echo "No log files found"
            exit 1
          fi

      # Save firmware as artifact
      - name: Save Firmware as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.model }}
          path: ${{ steps.build.outputs.firmware_path }}
          retention-days: 10
      
      # Save OpenWrt Package Downloads Cache
      - name: Save OpenWrt Package Downloads Cache
        if: always()  # Try to save cache even if the build fails
        uses: actions/cache/save@v3
        with:
          path: |
            ${{ env.BUILDDIR }}/${{ env.IMAGEBUILDER_NAME }}/dl
            ${{ env.BUILDDIR }}/${{ env.IMAGEBUILDER_NAME }}/staging_dir
          key: ${{ env.CACHE_KEY }}-packages-${{ env.PACKAGES_HASH }}

      # Upload firmware to Blossom
      - name: Upload Firmware to Blossom
        id: upload_firmware
        uses: c03rad0r/cli-blossom-uploader-go@main
        with:
          host: "https://blossom.swissdash.site"
          filePath: "${{ env.BUILDDIR }}/${{ env.IMAGEBUILDER_NAME }}/${{ steps.build.outputs.firmware_path }}"
          nostrPrivateKey: ${{ secrets.NSECBECH }}

      # Publish firmware metadata
      - name: Publish Firmware NIP-94 Metadata
        id: publish_firmware
        uses: OpenTollGate/nostr-publish-file-metadata-action/python@main
        with:
          relays: ${{ env.NOSTR_RELAYS }}
          url: ${{ steps.upload_firmware.outputs.url }}
          mimeType: "application/octet-stream"
          fileHash: ${{ steps.upload_firmware.outputs.hash }}
          originalHash: ${{ env.FIRMWARE_HASH }}
          filename: ${{ steps.build.outputs.firmware_name }}
          content: "TollGate OS Firmware for ${{ matrix.model }}"
          nsec: ${{ secrets.NSEC }}
          size: ${{ env.FIRMWARE_SIZE }}
          architecture: ${{ env.BLOSSOM_ARCH }}
          model: ${{ matrix.model }}
          version: ${{ needs.check-versions.outputs.openwrt_version }}
      
      # Verify publication
      - name: Verify Firmware Publication
        id: verify_firmware
        uses: OpenTollGate/nostr-publish-file-metadata-action/python/verify@main
        with:
          eventId: ${{ steps.publish_firmware.outputs.eventId }}
          relays: ${{ env.NOSTR_RELAYS }}