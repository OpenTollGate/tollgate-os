name: Build TollGate OS (OpenWRT Firmware)

on:
  push:
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # Run at midnight UTC every day

jobs:
  initialize:
    runs-on: ubuntu-latest
    name: "Set TollGate OS version + Release channel"
    outputs:
      os_version: ${{ steps.determine-os-version.os_version }}
      os_release_channel: ${{ steps.determine-release-channel.os_release_channel }}
    steps:
    - uses: actions/checkout@v4

    - id: commit-hash
      uses: prompt/actions-commit-hash@v3

    - name: Set version variable
      id: determine-os-version
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          # If this is a tag push, use the tag name
          echo "os_version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
        else
          # If this is a branch push, use branch-shortCommitHash format
          echo "os_version=${GITHUB_REF_NAME}-${{ steps.commit-hash.outputs.short }}" >> $GITHUB_OUTPUT
        fi

        echo "ℹ️ OS os_version set to ${os_version}"
      
    - name: Set OS release channel
      id: determine-release-channel
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          echo "os_release_channel=stable" >> $GITHUB_OUTPUT
        else
          echo "os_release_channel=dev" >> $GITHUB_OUTPUT
        fi

  build:
    needs: initialize
    strategy:
      matrix:
        device_id: [
          'glinet_gl-mt3000',
          'glinet_gl-mt6000',
          'glinet_gl-ar300m16', # don't know which is which (nand/nor)
          'glinet_gl-ar300m-nor', # don't know which is which (nand/nor) 

          #'gl-mt300n-v2',
          #'gl-ar300m16',
#          'gl-e750',
#          'archer_mr200'
        ]
      fail-fast: false

    runs-on: ubuntu-latest
    name: Build ${{ matrix.model }}

    steps:
      - name: Build TollGateOS for ${{ matrix.device_id }}
        id: build-os-image
        uses: ./actions/build-os
        with:
          device_id: ${{ matrix.device_id }}
          nostr_secret_key: ${{ secrets.NOSTR_SECRET_KEY }}
          nostr_public_key: ${{ secrets.NOSTR_PUBLIC_KEY }}
          os_files_path: "./files"
          nsecbech: ${{ secrets.NSECBECH }}
          nsec: ${{ secrets.NSEC }}
          openwrt_version: '24.10.1'
          tollgate_os_version: ${{ needs.initialize.outputs.os_version }}
          release_channel: ${{ needs.initialize.outputs.os_release_channel }}
      
      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tollgate-os-${{ matrix.device_id }}-${{ needs.initialize.outputs.version }}.img
          path: ${{ steps.build-os-image.outputs.firmware_path }}
          retention-days: 5
