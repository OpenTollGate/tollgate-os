name: Build OpenWRT Firmware

on:
  push:
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      device_model:
        description: 'Device model to build (use profile ID like glinet_gl-mt3000)'
        required: false
      firmware_type:
        description: 'Type of firmware to build (sysupgrade, factory, kernel, all)'
        default: 'all' 
        required: false
  schedule:
    - cron: '0 0 * * *'  # Run at midnight UTC every day

jobs:
  build:
    runs-on: ubuntu-22.04
    name: Build firmware for ${{ matrix.device.name || matrix.device.id }}
    strategy:
      matrix:
        device:
          - id: glinet_gl-mt3000
            name: GL.iNet GL-MT3000
            platform: mediatek/filogic
          - id: glinet_gl-mt6000
            name: GL.iNet GL-MT6000
            platform: mediatek/filogic
          - id: glinet_gl-ar300m-nor
            name: GL.iNet GL-AR300M (NOR)
            platform: ath79/nand
          - id: glinet_gl-ar300m-nand
            name: GL.iNet GL-AR300M (NAND)
            platform: ath79/nand
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      
      # Download OpenWrt profiles for each target platform
      - name: Fetch OpenWrt profiles
        run: |
          echo "===== FETCHING OPENWRT PROFILES ====="
          mkdir -p external_profiles/23.05.5
          
          echo "Fetching profiles for required platforms..."
          # The following lines are removed because profiles are already present in the repo:
          # bash ./download_profiles.sh 23.05.5 mediatek/filogic
          # bash ./download_profiles.sh 23.05.5 ath79/nand
          
          # Generate device search helper file
          echo "Generating device search file..."
          find external_profiles/23.05.5 -name "profiles.json" | xargs -I{} jq -r '.profiles | to_entries[] | .key + " | " + (.value.target_only // "unknown") + " | " + (.value.titles[0].vendor // "unknown") + " | " + (.value.titles[0].model // "unknown")' {} | sort > external_profiles/23.05.5/device-search.txt
          
          echo "Device search file contents:"
          grep -i "gl-" external_profiles/23.05.5/device-search.txt
      
      # Add debug information about the OS environment before building
      - name: Debug environment
        run: |
          echo "===== BUILD ENVIRONMENT DEBUG ====="
          echo "OS: $(uname -a)"
          echo "Available memory: $(free -h)"
          echo "Available disk space: $(df -h)"
          echo "Python version: $(python3 --version)"
          echo "Working directory: $(pwd)"
          
          # Debug the repository structure
          echo "===== REPOSITORY STRUCTURE ====="
          ls -la
          echo "===== FILES DIRECTORY STRUCTURE ====="
          ls -la files/etc || echo "No files/etc directory"
          
          # Search for the model in profiles.json files
          echo "===== SEARCHING FOR ROUTER PROFILE: ${{ matrix.device.id }} ====="
          MODEL_FOUND=0
          
          for PROFILE_PATH in $(find external_profiles -name "profiles.json"); do
            if jq -e --arg model "${{ matrix.device.id }}" '.profiles | has($model)' "$PROFILE_PATH" > /dev/null 2>&1; then
              MODEL_FOUND=1
              echo "✅ Found profile in: $PROFILE_PATH"
              
              # Extract platform and type from path
              REL_PATH=${PROFILE_PATH#external_profiles/}
              PARTS=($(echo "$REL_PATH" | tr '/' ' '))
              VERSION=${PARTS[0]}
              PLATFORM=${PARTS[1]}
              TYPE=${PARTS[2]}
              
              echo "✅ Version: $VERSION, Platform: $PLATFORM, Type: $TYPE"
              
              # Extract available image types for this device
              AVAILABLE_TYPES=$(jq -r --arg p "${{ matrix.device.id }}" '.profiles[$p].images | map(.type) | unique | join(", ")' "$PROFILE_PATH")
              echo "✅ Available image types: $AVAILABLE_TYPES"
              
              # Show device information from profile
              DEVICE_VENDOR=$(jq -r --arg p "${{ matrix.device.id }}" '.profiles[$p].titles[0].vendor // "unknown"' "$PROFILE_PATH")
              DEVICE_MODEL=$(jq -r --arg p "${{ matrix.device.id }}" '.profiles[$p].titles[0].model // "unknown"' "$PROFILE_PATH")
              echo "📌 Device: $DEVICE_VENDOR $DEVICE_MODEL"
              break
            fi
          done
          
          if [ $MODEL_FOUND -eq 0 ]; then
            echo "❌ ERROR: Could not find router profile for '${{ matrix.device.id }}'"
            echo "❌ Please check the device ID and ensure it matches the OpenWrt naming convention"
            exit 1
          fi
      
      - name: Build OpenWRT Image
        id: build-openwrt-image
        uses: ./actions/build-firmware
        with:
          model: ${{ matrix.device.id }}
          nostr_secret_key: ${{ secrets.NOSTR_SECRET_KEY }}
          nostr_public_key: ${{ secrets.NOSTR_PUBLIC_KEY }}
          files_path: "./files"
          nsecbech: ${{ secrets.NSECBECH }}
          nsec: ${{ secrets.NSEC }}
          firmware_type: ${{ github.event.inputs.firmware_type || 'all' }}
      
      # Add a step to collect and display build logs if available
      - name: Collect build logs
        if: always()
        run: |
          echo "===== BUILD LOGS COLLECTION ====="
          # Create a directory for the logs
          mkdir -p build_logs
          
          # Try to find and copy any logs from the build process
          find /tmp/openwrt-build -name "*.txt" -o -name "*.log" -type f | while read file; do
            echo "Found log file: $file"
            cp "$file" build_logs/ || echo "Failed to copy $file"
          done
          
          # If there are no log files, create a placeholder
          if [ ! "$(ls -A build_logs)" ]; then
            echo "No log files found in /tmp/openwrt-build"
            echo "Build process did not generate expected log files" > build_logs/no_logs_found.txt
          fi
      
      - name: Extract Firmware Types Information
        id: firmware-types
        run: |
          # Parse the all_firmware_paths JSON to get image types
          ALL_PATHS='${{ steps.build-openwrt-image.outputs.all_firmware_paths }}'
          echo "ALL_PATHS JSON: $ALL_PATHS"
          AVAILABLE_TYPES=$(echo "$ALL_PATHS" | jq -r 'keys | join(", ")')
          echo "Available firmware types: $AVAILABLE_TYPES"
          echo "available_types=$AVAILABLE_TYPES" >> $GITHUB_OUTPUT
          
          # Create directory for all firmware files
          mkdir -p firmware_files
          
          # Extract filesystem paths from the JSON and copy them
          echo "$ALL_PATHS" | jq -r 'to_entries | .[] | .value.path' | while read -r filepath; do
            if [ -f "$filepath" ]; then
              cp "$filepath" firmware_files/
              echo "Copied $(basename "$filepath") to firmware_files/"
            else
              echo "Warning: File $filepath not found"
            fi
          done
      
      # Upload all firmware files as a single artifact 
      - name: Upload All Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.device.id }}
          path: firmware_files/
          retention-days: 5
      
      # Also upload the build logs as artifacts for troubleshooting
      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.device.id }}
          path: build_logs/
          retention-days: 5
      
      # Upload each firmware type to Blossom and publish metadata
      - name: Upload Multiple Firmware Types
        id: multi-upload
        run: |
          # Parse the JSON from the build output
          ALL_PATHS='${{ steps.build-openwrt-image.outputs.all_firmware_paths }}'
          
          # Process each firmware type
          echo "$ALL_PATHS" | jq -r 'to_entries | .[] | @json' | while read -r json_entry; do
            # Extract information from the JSON entry
            TYPE=$(echo "$json_entry" | jq -r '.key')
            FILE_PATH=$(echo "$json_entry" | jq -r '.value.path')
            FILE_NAME=$(echo "$json_entry" | jq -r '.value.name')
            FILE_HASH=$(echo "$json_entry" | jq -r '.value.hash')
            FILE_SIZE=$(echo "$json_entry" | jq -r '.value.size')
            
            echo "Processing $TYPE firmware: $FILE_NAME"
            
            if [ -f "$FILE_PATH" ]; then
              echo "✅ Found file: $FILE_PATH"
              
              # Only upload additional types if they're not the primary type
              if [ "$TYPE" != "${{ env.PRIMARY_FIRMWARE_TYPE }}" ]; then
                echo "📤 Uploading $TYPE firmware to Blossom..."
                
                # Perform upload using the CLI tool 
                UPLOAD_RESULT=$(cd /tmp && \
                  NSEC="${{ secrets.NSECBECH }}" \
                  /home/runner/work/tollgate-os/tollgate-os/actions/update-from-nip94/blossom-uploader \
                  -f "$FILE_PATH" \
                  -u "https://blossom.swissdash.site")
                
                echo "Upload result: $UPLOAD_RESULT"
                
                # Extract URL and hash from the JSON result
                BLOSSOM_URL=$(echo "$UPLOAD_RESULT" | jq -r '.url')
                BLOSSOM_HASH=$(echo "$UPLOAD_RESULT" | jq -r '.hash')
                
                if [ -n "$BLOSSOM_URL" ] && [ "$BLOSSOM_URL" != "null" ]; then
                  echo "✅ Uploaded $TYPE firmware to $BLOSSOM_URL"
                  
                  # Publish NIP-94 metadata
                  echo "📝 Publishing NIP-94 metadata for $TYPE firmware..."
                  
                  # This uses the Python script directly instead of the action
                  python3 /home/runner/work/tollgate-os/tollgate-os/actions/update-from-nip94/publish_metadata.py \
                    --relays "${{ inputs.nostr_relays }}" \
                    --url "$BLOSSOM_URL" \
                    --mime-type "application/octet-stream" \
                    --file-hash "$BLOSSOM_HASH" \
                    --original-hash "$FILE_HASH" \
                    --filename "$FILE_NAME" \
                    --content "TollGate OS $TYPE firmware for ${{ env.DEVICE_VENDOR }} ${{ env.DEVICE_MODEL }} (${{ matrix.device.id }}, OpenWRT ${{ inputs.version }})" \
                    --nsec "${{ secrets.NSEC }}" \
                    --size "$FILE_SIZE" \
                    --architecture "${{ env.ARCH }}" \
                    --model "${{ matrix.device.id }}" \
                    --version "${{ inputs.version }}" \
                    --firmware-type "$TYPE"
                  
                  echo "✅ Published metadata for $TYPE firmware"
                else
                  echo "❌ Failed to upload $TYPE firmware"
                fi
              else
                echo "ℹ️ Skipping upload for primary firmware type ($TYPE) as it's already handled by the main action"
              fi
            else
              echo "⚠️ File not found: $FILE_PATH"
            fi
          done
