# .github/workflows/update-release-json.yml in tollgate-os
name: Update Release JSON with Real Events

on:
  workflow_dispatch:
    inputs:
      package_author:
        description: 'The author of the package'
        required: true
      package_name:
        description: 'The name of the package'
        required: true
      package_version:
        description: 'The version of the package'
        required: true
      package_release_channel:
        description: 'The package release channel (stable/dev)'
        required: true

  repository_dispatch:
    types: [update-release-json]

# Add permissions block here
permissions:
  contents: write

jobs:
  update:
    name: "Update ${{ github.event.inputs.package_name || github.event.client_payload.package_name }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check if package exists
        run: |
          PACKAGE_NAME="${{ github.event.inputs.package_name || github.event.client_payload.package_name }}"
          RELEASE_CHANNEL=${{ github.event.inputs.package_release_channel || github.event.client_payload.package_release_channel }}
          PACKAGE_VERSION=${{ github.event.inputs.package_version || github.event.client_payload.package_version }}
          PACKAGE_AUTHOR=${{ github.event.inputs.package_author || github.event.client_payload.package_author }}

          PACKAGES_FILE="packages_${RELEASE_CHANNEL}.json"
          
          
          # Check if the package exists in the appropriate packages file
          PACKAGE_EXISTS=$(jq -r --arg name "$PACKAGE_NAME" '.[] | select(.name == $name) | .name' "$PACKAGES_FILE")
          
          if [[ -n "$PACKAGE_EXISTS" ]]; then
            echo "✅ Package '$PACKAGE_NAME' exists in $PACKAGES_FILE"
            echo "package_exists=true" >> $GITHUB_ENV
          else
            echo "❌ Package '$PACKAGE_NAME' does not exist in $PACKAGES_FILE"
            echo "package_exists=false" >> $GITHUB_ENV
          fi

          echo "PACKAGE_AUTHOR=$PACKAGE_AUTHOR" >> $GITHUB_ENV
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV
          echo "RELEASE_CHANNEL=$RELEASE_CHANNEL" >> $GITHUB_ENV
          echo "PACKAGES_FILE=$PACKAGES_FILE" >> $GITHUB_ENV

      - name: Create if package not exists
        if: ${{ env.package_exists == 'false' }}
        run: |
          echo "🆕 Adding new package to ${{ env.PACKAGES_FILE }}:"
          echo "  Name: ${{ env.PACKAGE_NAME }}"
          echo "  Author: ${{ env.PACKAGE_AUTHOR }}"
          echo "  Version: ${{ env.PACKAGE_VERSION }}"
          
          # Create a temporary file with the new package entry
          TEMP_FILE=$(mktemp)
          
          # Add the new package to the JSON file
          jq --arg author "${{ env.PACKAGE_AUTHOR }}" \
             --arg name "${{ env.PACKAGE_NAME }}" \
             --arg version "${{ env.PACKAGE_VERSION }}" \
             '. += [{"author": $author, "name": $name, "version": $version}]' \
             "${{ env.PACKAGES_FILE }}" > "$TEMP_FILE"
          
          # Replace the original file with the updated one
          mv "$TEMP_FILE" "${{ env.PACKAGES_FILE }}"
          
          echo "✅ Package added successfully to ${{ env.PACKAGES_FILE }}"
          
          # Show the updated file content
          echo "Updated ${{ env.PACKAGES_FILE }} content:"
          cat "${{ env.PACKAGES_FILE }}"

      - name: Update if package exists
        if: ${{ env.package_exists == 'true' }}
        run: |
          echo "🔄 Updating existing package in ${{ env.PACKAGES_FILE }}:"
          echo "  Name: ${{ env.PACKAGE_NAME }}"
          echo "  New Version: ${{ env.PACKAGE_VERSION }}"
          
          # Get the existing package info
          EXISTING_AUTHOR=$(jq -r --arg name "${{ env.PACKAGE_NAME }}" '.[] | select(.name == $name) | .author' "${{ env.PACKAGES_FILE }}")
          EXISTING_VERSION=$(jq -r --arg name "${{ env.PACKAGE_NAME }}" '.[] | select(.name == $name) | .version' "${{ env.PACKAGES_FILE }}")
          
          echo "  Current Author: $EXISTING_AUTHOR"
          echo "  Current Version: $EXISTING_VERSION"
          
          # Check if author has changed
          if [[ "$EXISTING_AUTHOR" != "${{ env.PACKAGE_AUTHOR }}" ]]; then
            echo "⚠️ WARNING: Author has changed!"
            echo "  Old author: $EXISTING_AUTHOR"
            echo "  New author: ${{ env.PACKAGE_AUTHOR }}"
            
            # Set GitHub Actions warning annotation
            echo "::warning::Author has changed for package ${{ env.PACKAGE_NAME }}. Old: $EXISTING_AUTHOR, New: ${{ env.PACKAGE_AUTHOR }}"
            
            # Set warning flag in environment
            echo "author_changed=true" >> $GITHUB_ENV
          else
            echo "author_changed=false" >> $GITHUB_ENV
          fi
          
          # Create a temporary file for the updated JSON
          TEMP_FILE=$(mktemp)
          
          # Update the package entry
          jq --arg name "${{ env.PACKAGE_NAME }}" \
             --arg author "${{ env.PACKAGE_AUTHOR }}" \
             --arg version "${{ env.PACKAGE_VERSION }}" \
             'map(if .name == $name then {"author": $author, "name": $name, "version": $version} else . end)' \
             "${{ env.PACKAGES_FILE }}" > "$TEMP_FILE"
          
          # Replace the original file with the updated one
          mv "$TEMP_FILE" "${{ env.PACKAGES_FILE }}"
          
          echo "✅ Package updated successfully in ${{ env.PACKAGES_FILE }}"
          
          # Show the updated file content
          echo "Updated ${{ env.PACKAGES_FILE }} content:"
          cat "${{ env.PACKAGES_FILE }}"

