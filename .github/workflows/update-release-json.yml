# .github/workflows/update-release-json.yml in tollgate-os
name: Update Release JSON

on:
  push:
    branches:
      - '*'
    paths:
      - '.github/workflows/update-release-json.yml'
      - 'actions/update-release-json/**'
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Run ID of the build workflow'
        required: true
  repository_dispatch:
    types: [update-release-json]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: update-release-json

      - name: Create Test Artifacts
        run: |
          # Create artifacts directory
          mkdir -p artifacts/package-gl-mt3000-tollgate-module-relay-go
          
          # Create a dummy IPK file
          echo "This is a test IPK file" > artifacts/package-gl-mt3000-tollgate-module-relay-go/test-package.ipk
          
          # Calculate and display the hash
          HASH=$(sha256sum artifacts/package-gl-mt3000-tollgate-module-relay-go/test-package.ipk | cut -d' ' -f1)
          echo "Created test IPK with hash: $HASH"
          
          # Create a mock event ID file
          echo "{\"eventId\":\"1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef\",\"hash\":\"$HASH\"}" > artifacts/event-info.json
          
          echo "Test artifacts created successfully:"
          find artifacts -type f | sort

      - name: Debug Directory Structure
        run: |
          echo "Current directory: $(pwd)"
          echo "Repository contents:"
          ls -la
          echo "Actions directory:"
          ls -la actions || echo "Actions directory not found"
          echo "Update release json action directory:"
          ls -la actions/update-release-json || echo "Update release json action directory not found"
          echo "Artifacts directory:"
          find artifacts -type f | sort
        
      - name: Update Release JSON
        uses: ./actions/update-release-json
        with:
          artifacts_path: artifacts
          release_json_path: release.json
          target_branch: develop  # Pass the target branch to the action