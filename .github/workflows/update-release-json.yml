# .github/workflows/update-release-json.yml in tollgate-os
name: Update Release JSON with Real Events

on:
  push:
    branches:
      - '*'
      - '!develop'
    paths:
      - '.github/workflows/update-release-json.yml'
      - 'actions/update-from-nip94/**'
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Run ID of the build workflow'
        required: true
  repository_dispatch:
    types: [update-release-json]

# Add permissions block here
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current branch (with action code)
        uses: actions/checkout@v4
        with:
          path: current-branch
          fetch-depth: 1

      - name: Checkout develop branch (for release.json)
        uses: actions/checkout@v4
        with:
          ref: develop
          path: develop-branch
          token: ${{ secrets.REPOSCOPE }}
          fetch-depth: 1

      - name: Copy release.json to working directory
        run: |
          cp develop-branch/release.json current-branch/
          echo "Copied release.json from develop to current branch"

      - name: Install nak and process events in current branch
        working-directory: current-branch
        run: |
          sudo wget https://github.com/fiatjaf/nak/releases/download/v0.12.4/nak-v0.12.4-linux-amd64 -O /usr/local/bin/nak
          sudo chmod +x /usr/local/bin/nak
          
          # Get the pubkey from secrets
          PUBKEY="${{ secrets.NIP_94_PUBKEY }}"
          
          if [ -z "$PUBKEY" ]; then
            echo "::error::NIP_94_PUBKEY secret is not set"
            exit 1
          fi
          
          echo "Fetching recent NIP-94 events for pubkey: $PUBKEY"
          # Rest of your event fetching and processing code
          # [Existing code from your workflow]
          
          # Create newest_events directory with processed events
          mkdir -p newest_events
          # [Process events as per your existing workflow]

      - name: Update release.json using the action
        uses: ./current-branch/actions/update-from-nip94
        with:
          artifacts_path: current-branch/newest_events
          release_json_path: current-branch/release.json
          target_branch: ''
          github_token: ${{ secrets.REPOSCOPE }}
          commit_message: "Update release.json with latest NIP-94 events"
          verbose: 'true'

      - name: Copy updated release.json back to develop and push
        run: |
          cp current-branch/release.json develop-branch/
          
          cd develop-branch
          
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if git diff --exit-code release.json; then
            echo "No changes to commit."
            exit 0
          fi
          
          git add release.json
          git commit -m "Update release.json with latest NIP-94 events"
          git push origin develop

      # Debug the action parameters
      - name: Debug Action Parameters
        run: |
          echo "Action will use artifacts_path: newest_events"
          echo "File list in newest_events:"
          find newest_events -type f | sort
          echo "Contents of the first file (if any):"
          if [ -f "$(find newest_events -type f | head -n1)" ]; then
            cat "$(find newest_events -type f | head -n1)"
          else
            echo "No files found"
          fi
          
          echo "Current release.json state:"
          cat release.json | jq .
          
          echo "Action will be called with these parameters:"
          echo "artifacts_path: newest_events"
          echo "release_json_path: release.json"
          echo "target_branch: develop"
          echo "github_token: [REDACTED]"
          echo "commit_message: 'Update release.json with latest NIP-94 events'"
          
          echo "Verifying release.json schema:"
          jq '.modules[].versions[].architectures | keys' release.json

      - name: Ensure Python Script is Executable
        run: |
          chmod +x actions/update-from-nip94/update_release_json.py
          echo "Python script permissions updated"
          ls -la actions/update-from-nip94/
